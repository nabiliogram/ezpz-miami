<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EZPZ Miami — Event Details</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300&family=Montserrat:wght@800;900&display=swap" rel="stylesheet" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-W4T15HS0Z0"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-W4T15HS0Z0');
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --flamingo:     #FF4477;
      --coral:        #FF8C70;
      --violet:       #8B5CF6;
      --yellow:       #FACC15;
      --bg:           #FDFCFB;
      --bg-white:     #FFFFFF;
      --text-1:       #0F172A;
      --text-2:       #475569;
      --text-3:       #94A3B8;
      --border:       #F1F5F9;
      --border-med:   #E2E8F0;
      --free:         #059669;
      --free-bg:      #ECFDF5;
      --header-h:     54px;
      --cta-h:        76px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .display { font-family: 'Montserrat', sans-serif; }

    /* ─────────────────────────────────────────────
       TOP NAV
    ───────────────────────────────────────────── */
    .topnav {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--header-h);
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-3);
      padding: 6px 0;
      transition: color 0.12s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .back-btn:hover { color: var(--flamingo); }
    .back-btn svg { flex-shrink: 0; }
    .nav-logo {
      font-family: 'Montserrat', sans-serif;
      font-size: 15px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.04em;
      color: var(--flamingo);
      text-decoration: none;
    }

    /* ─────────────────────────────────────────────
       BILLBOARD HERO (compact, no image)
    ───────────────────────────────────────────── */
    .hero-billboard {
      width: 100%;
      position: relative;
      overflow: hidden;
      background: var(--text-1);
      padding: 28px 24px 24px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .hero-billboard::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.08;
      background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28"><rect width="28" height="28" fill="none"/><rect x="0" y="0" width="14" height="14" fill="white" fill-opacity="0.15"/><rect x="14" y="14" width="14" height="14" fill="white" fill-opacity="0.15"/></svg>');
      background-size: 28px 28px;
    }
    .hero-content {
      position: relative;
      z-index: 2;
    }
    .hero-date {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.45);
      margin-bottom: 10px;
    }
    .hero-category {
      display: inline-block;
      font-family: 'Montserrat', sans-serif;
      font-size: 7px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 3px 8px;
      border-radius: 3px;
      background: var(--bg-white);
      color: var(--text-1);
      margin-bottom: 12px;
    }
    .hero-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 32px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.04em;
      line-height: 1;
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-image: linear-gradient(to right, var(--coral), var(--flamingo));
    }
    .hero-organizer {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.4);
      margin-top: 8px;
    }
    .hero-ghost {
      position: absolute;
      bottom: -12px;
      right: -12px;
      font-family: 'Montserrat', sans-serif;
      font-size: 80px;
      font-weight: 900;
      text-transform: uppercase;
      color: rgba(255,255,255,0.03);
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
      line-height: 1;
    }
    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }
    .hero-meta-item {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .hero-meta-item svg { opacity: 0.5; }
    .hero-pill {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 5px;
    }
    .hero-pill.free { background: var(--free-bg); color: var(--free); }
    .hero-pill.paid { background: rgba(255,140,112,0.15); color: var(--coral); }

    /* ─────────────────────────────────────────────
       PAGE
    ───────────────────────────────────────────── */
    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px calc(var(--cta-h) + 24px);
    }

    /* ─────────────────────────────────────────────
       SECTIONS
    ───────────────────────────────────────────── */
    .section {
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
    }
    .section:last-child { border-bottom: none; }
    .section-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-3);
      margin-bottom: 14px;
    }

    /* Summary */
    .summary-text {
      font-size: 16px;
      font-weight: 400;
      line-height: 1.75;
      color: var(--text-1);
      padding-left: 16px;
      border-left: 3px solid var(--flamingo);
    }
    .practical-notes {
      font-size: 13.5px;
      line-height: 1.65;
      color: var(--text-2);
      margin-top: 14px;
      padding: 12px 14px;
      background: var(--bg-white);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    /* Info rows */
    .info-rows {
      display: flex;
      flex-direction: column;
    }
    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .info-row:last-child { border-bottom: none; }
    .info-icon { font-size: 18px; line-height: 1; flex-shrink: 0; margin-top: 1px; }
    .info-body { flex: 1; min-width: 0; }
    .info-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 8px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-3);
      margin-bottom: 3px;
    }
    .info-value {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-1);
      line-height: 1.35;
    }
    .info-value.accent { color: var(--flamingo); }
    .info-value.green  { color: var(--free); }
    .info-sub {
      font-size: 12.5px;
      font-weight: 500;
      color: var(--text-3);
      margin-top: 2px;
    }
    .map-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 8px;
      font-size: 13px;
      font-weight: 700;
      color: var(--flamingo);
      text-decoration: none;
      padding: 6px 14px;
      border: 1.5px solid var(--flamingo);
      border-radius: 8px;
      transition: background 0.12s, color 0.12s;
    }
    .map-link:hover { background: var(--flamingo); color: white; }

    /* Description */
    .description-text {
      font-size: 14.5px;
      line-height: 1.75;
      color: var(--text-2);
      white-space: pre-wrap;
    }

    /* Tags */
    .tags-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tag {
      font-size: 12px;
      font-weight: 600;
      background: var(--bg-white);
      color: var(--text-2);
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid var(--border-med);
    }

    /* Sessions table */
    .sessions-list {
      border: 1px solid var(--border-med);
      border-radius: 12px;
      overflow: hidden;
    }
    .sessions-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: var(--bg-white);
      border-bottom: 1px solid var(--border);
    }
    .sh-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 8px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-3);
    }
    .session-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 13.5px;
    }
    .session-row:last-child { border-bottom: none; }
    .session-age { font-weight: 600; color: var(--text-1); min-width: 82px; flex-shrink: 0; }
    .session-venue { flex: 1; color: var(--text-2); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .session-time { color: var(--text-2); white-space: nowrap; flex-shrink: 0; }
    .session-link { color: var(--flamingo); font-weight: 700; text-decoration: none; white-space: nowrap; flex-shrink: 0; font-size: 13px; margin-left: auto; }
    .session-link:hover { text-decoration: underline; }
    .session-program { font-weight: 600; color: var(--text-1); flex: 0 1 130px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sessions-header .session-program { flex: 0 1 130px; }
    .sessions-header .session-age  { min-width: 82px; flex-shrink: 0; }
    .sessions-header .session-venue { flex: 1; }
    .sessions-header .session-time { flex-shrink: 0; }
    .sessions-header .session-link { margin-left: auto; }

    /* ─────────────────────────────────────────────
       CTA BAR
    ───────────────────────────────────────────── */
    .cta-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 50;
      height: var(--cta-h);
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      display: none;
      align-items: center;
      gap: 10px;
    }
    .btn-primary {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      height: 48px;
      background: var(--text-1);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      background: var(--bg-white);
      border: 1.5px solid var(--border-med);
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
      color: var(--text-2);
      text-decoration: none;
      transition: border-color 0.12s, background 0.12s, color 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-icon:hover { border-color: var(--text-1); color: var(--text-1); }
    .btn-icon.wa { color: #25D366; border-color: #25D366; }
    .btn-icon.wa:hover { background: #25D366; color: white; }

    /* ─────────────────────────────────────────────
       LOADING / ERROR
    ───────────────────────────────────────────── */
    .spinner-wrap { display: flex; justify-content: center; padding: 80px 0; }
    .spinner {
      width: 30px; height: 30px;
      border: 3px solid var(--border-med);
      border-top-color: var(--flamingo);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-state { text-align: center; padding: 80px 24px; }
    .error-icon { font-size: 36px; margin-bottom: 16px; }
    .error-state h3 { font-size: 17px; font-weight: 700; color: var(--text-1); margin-bottom: 8px; }
    .error-state p { font-size: 14px; color: var(--text-2); margin-bottom: 24px; }
    .error-link { font-size: 14px; font-weight: 700; color: var(--flamingo); text-decoration: none; }

    /* ─────────────────────────────────────────────
       RESPONSIVE
    ───────────────────────────────────────────── */
    @media (max-width: 480px) {
      .page { padding: 0 18px calc(var(--cta-h) + 20px); }
      .hero-billboard { padding: 24px 18px 20px; }
      .hero-title { font-size: 26px; }
      .hero-ghost { font-size: 60px; }
    }
    @media (min-width: 600px) {
      .topnav { padding: 0 28px; }
      .page { padding: 0 28px calc(var(--cta-h) + 28px); }
      .hero-billboard { padding: 32px 28px 28px; }
      .hero-title { font-size: 36px; }
    }
    @media (max-width: 380px) {
      .session-age { min-width: 70px; }
      .sessions-header .session-age { min-width: 70px; }
    }
  </style>
</head>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────
const SUPABASE_URL = 'https://pomjqbjxosbfozvbvgsj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_8-9VIQPLrYfqxsoyGWjf8A_BO7UCLso';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// Gradient palette for hero titles
const GRADIENTS = [
  'linear-gradient(to right, #FF8C70, #FF4477)',
  'linear-gradient(to right, #FF4477, #8B5CF6)',
  'linear-gradient(to right, #FACC15, #FF8C70)',
];

let currentEvent = null;

// ─── LOAD ─────────────────────────────────────────────────────────
async function loadEvent() {
  const params = new URLSearchParams(window.location.search);
  const ids    = params.get('ids');
  const id     = params.get('id');

  if (ids) {
    const idList = ids.split(',').filter(Boolean);
    const { data, error } = await db.from('events').select('*').in('id', idList);
    if (error || !data?.length) { renderError('Event not found.'); return; }
    data.sort((a, b) => (a.age_min ?? 99) - (b.age_min ?? 99));
    const _repTitle = data[0].title;
    const _fam = familyMatch(_repTitle);
    const _isHetero = _fam && data.some(e => cleanProgramTitle(e.title) !== cleanProgramTitle(_repTitle));
    const _groupTitle = _isHetero ? _fam.label : cleanProgramTitle(_repTitle);
    document.title = `${_groupTitle} — EZPZ Miami`;
    renderGroup(data);
    gtag('event', 'view_event_group', { group_title: _groupTitle, session_count: data.length });
    return;
  }

  if (!id) { renderError('No event ID provided.'); return; }
  const { data, error } = await db.from('events').select('*').eq('id', id).single();
  if (error || !data) { renderError('Event not found.'); return; }
  currentEvent = data;
  document.title = `${data.editorial_headline || data.title} — EZPZ Miami`;
  renderEvent(data);
  gtag('event', 'view_event', {
    event_title: data.editorial_headline || data.title,
    event_source: data.source,
    venue: data.venue_name || '',
    neighborhood: data.neighborhood || '',
    is_free: data.is_free,
    activity_type: data.activity_type || ''
  });
}

// ─── RENDER SINGLE EVENT ─────────────────────────────────────────
function renderEvent(ev) {
  const root = document.getElementById('root');
  const gradient = pickGradient(ev.activity_type);

  const dateLabel = fmtFullDate(ev.start_date);
  const timeStr   = fmtTime(ev.start_date);
  const endTime   = ev.end_date ? fmtTime(ev.end_date) : '';
  const dur       = fmtDuration(ev.start_date, ev.end_date);
  const category  = ev.activity_type ? titleCase(ev.activity_type) : 'Event';
  const headline  = ev.editorial_headline || ev.title;

  // Price pill for hero
  const priceHtml = (() => {
    if (ev.is_free) return `<span class="hero-pill free">Free</span>`;
    const label = priceStr(ev);
    if (label && label !== 'See event for pricing') return `<span class="hero-pill paid">${esc(label)}</span>`;
    return '';
  })();

  // Hero meta items
  const metaParts = [];
  if (timeStr) metaParts.push(`<span class="hero-meta-item"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${timeStr}${endTime ? ' – ' + endTime : ''}</span>`);
  if (ev.venue_name) metaParts.push(`<span class="hero-meta-item"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${esc(ev.venue_name)}</span>`);
  if (priceHtml) metaParts.push(priceHtml);

  // Billboard hero
  const heroHtml = `
    <div class="hero-billboard">
      <div class="hero-content">
        <div class="hero-date">${esc(dateLabel)}</div>
        <span class="hero-category">${esc(category)}</span>
        <h1 class="hero-title" style="background-image: ${gradient}">${esc(headline)}</h1>
        ${ev.editorial_headline ? `<div class="hero-organizer">${esc(ev.title)}</div>` : (ev.organizer_name ? `<div class="hero-organizer">by ${esc(ev.organizer_name)}</div>` : '')}
        ${metaParts.length ? `<div class="hero-meta">${metaParts.join('')}</div>` : ''}
      </div>
      <span class="hero-ghost">${esc(headline)}</span>
    </div>`;

  // What to expect
  const summarySection = (ev.parent_summary || ev.description) ? `
    <div class="section">
      <div class="section-label">What to expect</div>
      <p class="summary-text">${esc(ev.parent_summary || ev.description)}</p>
      ${ev.practical_notes ? `<div class="practical-notes">${renderNotes(ev.practical_notes)}</div>` : ''}
    </div>` : '';

  // Plan your visit
  const infoRows = [];
  infoRows.push(`<div class="info-row"><span class="info-icon">📅</span><div class="info-body"><div class="info-label">Date</div><div class="info-value accent">${esc(dateLabel)}</div></div></div>`);
  if (timeStr) infoRows.push(`<div class="info-row"><span class="info-icon">🕐</span><div class="info-body"><div class="info-label">Time</div><div class="info-value">${timeStr}${endTime ? ' – ' + endTime : ''}</div>${dur ? `<div class="info-sub">${dur}</div>` : ''}</div></div>`);
  infoRows.push(`<div class="info-row"><span class="info-icon">📍</span><div class="info-body"><div class="info-label">Location</div><div class="info-value">${esc(ev.neighborhood || ev.venue_name || 'TBA')}</div>${ev.neighborhood && ev.venue_name ? `<div class="info-sub">${esc(ev.venue_name)}</div>` : ''}${(ev.address || ev.venue_name) ? `${ev.address ? `<div class="info-sub" style="margin-top:4px">${esc(ev.address)}</div>` : ''}<a class="map-link" href="${mapsUrl(ev)}" target="_blank" rel="noopener">Open in Maps →</a>` : ''}</div></div>`);
  infoRows.push(`<div class="info-row"><span class="info-icon">💵</span><div class="info-body"><div class="info-label">Cost</div><div class="info-value ${ev.is_free ? 'green' : ''}">${esc(priceStr(ev))}</div></div></div>`);
  const ageTxt = ageLabel(ev.age_min, ev.age_max);
  infoRows.push(`<div class="info-row"><span class="info-icon">👶</span><div class="info-body"><div class="info-label">Ages</div><div class="info-value">${esc(ageTxt)}</div>${ev.activity_type ? `<div class="info-sub" style="text-transform:capitalize">${esc(ev.activity_type)}</div>` : ''}</div></div>`);
  if (ev.indoor_outdoor) infoRows.push(`<div class="info-row"><span class="info-icon">${ev.indoor_outdoor === 'indoor' ? '🏠' : ev.indoor_outdoor === 'outdoor' ? '☀️' : '🔄'}</span><div class="info-body"><div class="info-label">Setting</div><div class="info-value" style="text-transform:capitalize">${esc(ev.indoor_outdoor)}</div></div></div>`);

  const infoSection = `<div class="section"><div class="section-label">Plan your visit</div><div class="info-rows">${infoRows.join('')}</div></div>`;

  // About
  const fullDesc = ev.full_description || (ev.parent_summary ? ev.description : '') || '';
  const aboutSection = fullDesc ? `<div class="section"><div class="section-label">About this event</div><p class="description-text">${esc(fullDesc.trim())}</p></div>` : '';

  // Tags
  const tagsSection = (ev.tags || []).length > 0 ? `<div class="section"><div class="tags-row">${ev.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div></div>` : '';

  root.innerHTML = `${heroHtml}<div class="page">${summarySection}${infoSection}${aboutSection}${tagsSection}</div>`;

  // CTA bar
  const ctaLink = document.getElementById('cta-link');
  if (ev.source_url) {
    ctaLink.href = ev.source_url;
    ctaLink.textContent = ev.is_free ? 'Register / RSVP' : 'View & Get Tickets';
    ctaLink.onclick = function() {
      gtag('event', 'ticket_click', {
        event_title: ev.editorial_headline || ev.title,
        event_source: ev.source,
        is_free: ev.is_free,
        venue: ev.venue_name || '',
        page: 'detail'
      });
    };
  } else {
    ctaLink.style.display = 'none';
  }
  const mapsBtn = document.getElementById('maps-btn');
  if (ev.address || ev.venue_name) {
    mapsBtn.href = mapsUrl(ev);
    mapsBtn.style.display = 'flex';
    mapsBtn.onclick = function() {
      gtag('event', 'maps_click', { event_title: ev.editorial_headline || ev.title, venue: ev.venue_name || '', page: 'detail' });
    };
  }
  document.getElementById('cta-bar').style.display = 'flex';
}

// ─── RENDER GROUP ────────────────────────────────────────────────
function renderGroup(events) {
  const root = document.getElementById('root');
  const rep  = events[0];
  const gradient = pickGradient(rep.activity_type);

  const dateLabel = fmtFullDate(rep.start_date);
  const famMatch  = familyMatch(rep.title);
  const isHeteroFamily = famMatch && events.some(e => cleanProgramTitle(e.title) !== cleanProgramTitle(rep.title));
  const programTitle   = isHeteroFamily ? famMatch.label : cleanProgramTitle(rep.title);
  const category = rep.activity_type ? titleCase(rep.activity_type) : 'Event';

  const allFree = events.every(e => e.is_free);
  const priceHtml = allFree
    ? `<span class="hero-pill free">Free</span>`
    : (() => { const l = priceStr(rep); return (l && l !== 'See event page') ? `<span class="hero-pill paid">${esc(l)}</span>` : ''; })();

  const heroHtml = `
    <div class="hero-billboard">
      <div class="hero-content">
        <div class="hero-date">${esc(dateLabel)}</div>
        <span class="hero-category">${esc(category)}</span>
        <h1 class="hero-title" style="background-image: ${gradient}">${esc(programTitle)}</h1>
        ${priceHtml ? `<div class="hero-meta">${priceHtml}</div>` : ''}
      </div>
      <span class="hero-ghost">${esc(programTitle)}</span>
    </div>`;

  // Summary
  const ageWords = /\btoddler|\bpreschooler|\bbabies?\b|\binfant|\bteen|\btween|\byour\s+\d/i;
  const withSummary = events.filter(e => e.parent_summary);
  const summaryEv = withSummary.find(e => !ageWords.test(e.parent_summary)) || withSummary[0];
  const summary = summaryEv?.parent_summary || rep.description || '';
  const summarySection = summary ? `<div class="section"><div class="section-label">What to expect</div><p class="summary-text">${esc(summary)}</p></div>` : '';

  // Sessions table
  const ageKeys  = new Set(events.map(e => `${e.age_min ?? ''}-${e.age_max ?? ''}`));
  const timeKeys = new Set(events.map(e => fmtTime(e.start_date)));
  const showProgram = isHeteroFamily;
  const showAges    = !isHeteroFamily && ageKeys.size > 1;
  const showTimes   = timeKeys.size > 1;

  const sessionRows = events.map(e => {
    const ageTxt  = ageLabel(e.age_min, e.age_max);
    const progTxt = cleanProgramTitle(e.title);
    const venue   = e.venue_name || e.neighborhood || '—';
    const timeStr = fmtTime(e.start_date) || '—';
    const label   = e.is_free ? 'Register' : 'Tickets';
    return `<div class="session-row">${showProgram ? `<div class="session-program">${esc(progTxt)}</div>` : ''}${showAges ? `<div class="session-age">${esc(ageTxt)}</div>` : ''}<div class="session-venue">${esc(venue)}</div>${showTimes ? `<div class="session-time">${esc(timeStr)}</div>` : ''}<a class="session-link" href="${esc(e.source_url || '#')}" target="_blank" rel="noopener">${esc(label)} →</a></div>`;
  }).join('');

  const sessionsSection = `<div class="section"><div class="section-label">Sessions</div><div class="sessions-list"><div class="sessions-header">${showProgram ? '<div class="session-program sh-label">Program</div>' : ''}${showAges ? '<div class="session-age sh-label">Age group</div>' : ''}<div class="session-venue sh-label">Location</div>${showTimes ? '<div class="session-time sh-label">Time</div>' : ''}<div class="session-link sh-label"></div></div>${sessionRows}</div></div>`;

  // Plan your visit
  const locationNote = events.length === 1
    ? esc(rep.neighborhood || rep.venue_name || 'TBA')
    : `${events.length} Miami-Dade locations — see sessions above`;

  const infoSection = `<div class="section"><div class="section-label">Plan your visit</div><div class="info-rows">
    <div class="info-row"><span class="info-icon">📅</span><div class="info-body"><div class="info-label">Date</div><div class="info-value accent">${esc(dateLabel)}</div></div></div>
    <div class="info-row"><span class="info-icon">📍</span><div class="info-body"><div class="info-label">Location</div><div class="info-value">${locationNote}</div></div></div>
    <div class="info-row"><span class="info-icon">💵</span><div class="info-body"><div class="info-label">Cost</div><div class="info-value ${allFree ? 'green' : ''}">${allFree ? 'Free' : esc(priceStr(rep))}</div></div></div>
    <div class="info-row"><span class="info-icon">👶</span><div class="info-body"><div class="info-label">Ages</div><div class="info-value">${(showAges || showProgram) ? 'Multiple age groups — see sessions above' : esc(ageLabel(rep.age_min, rep.age_max))}</div></div></div>
  </div></div>`;

  root.innerHTML = `${heroHtml}<div class="page">${summarySection}${sessionsSection}${infoSection}</div>`;
  document.getElementById('cta-bar').style.display = 'none';
}

// ─── ACTIONS ──────────────────────────────────────────────────────
function mapsUrl(ev) {
  if (!ev) return '#';
  const q = ev.address || (ev.venue_name ? ev.venue_name + ', Miami, FL' : 'Miami, FL');
  return 'https://maps.google.com/?q=' + encodeURIComponent(q);
}

function shareWhatsApp() {
  const ev = currentEvent;
  if (!ev) return;
  const title = ev.editorial_headline || ev.title;
  const date  = fmtFullDate(ev.start_date);
  const time  = fmtTime(ev.start_date);
  const venue = ev.venue_name ? '📍 ' + ev.venue_name : '';
  const url   = ev.source_url || window.location.href;
  const text  = [title, date + (time ? ' at ' + time : ''), venue, '', 'Found on EZPZ Miami 🌴', url]
    .filter(Boolean).join('\n');
  window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
  gtag('event', 'share', { method: 'whatsapp', event_title: title, page: 'detail' });
}

function addToCalendar() {
  const ev = currentEvent;
  if (!ev) return;
  const fmt = iso => iso ? new Date(iso).toISOString().replace(/[-:]/g,'').split('.')[0]+'Z' : '';
  const url = `https://calendar.google.com/calendar/render?action=TEMPLATE`
    + `&text=${encodeURIComponent(ev.title)}`
    + `&dates=${fmt(ev.start_date)}/${fmt(ev.end_date || ev.start_date)}`
    + `&location=${encodeURIComponent(ev.address || ev.venue_name || '')}`
    + `&details=${encodeURIComponent((ev.parent_summary || ev.description || '').slice(0,200))}`;
  window.open(url, '_blank');
  gtag('event', 'add_to_calendar', { event_title: ev.editorial_headline || ev.title, page: 'detail' });
}

// ─── HELPERS ──────────────────────────────────────────────────────
function pickGradient(activityType) {
  const map = {
    'craft': GRADIENTS[0], 'workshop': GRADIENTS[0],
    'performance': GRADIENTS[1], 'storytime': GRADIENTS[1], 'music': GRADIENTS[1],
    'outdoor': GRADIENTS[2], 'sports': GRADIENTS[2], 'festival': GRADIENTS[2],
  };
  return map[(activityType || '').toLowerCase()] || GRADIENTS[0];
}

function titleCase(str) {
  if (!str) return str;
  return str.replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
}

function fmtFullDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${days[d.getUTCDay()]}, ${months[d.getUTCMonth()]} ${d.getUTCDate()}, ${d.getUTCFullYear()}`;
}

function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const h = d.getUTCHours(), m = d.getUTCMinutes();
  if (h === 0 && m === 0) return '';
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12  = h % 12 || 12;
  const mm   = m === 0 ? '' : `:${String(m).padStart(2, '0')}`;
  return `${h12}${mm} ${ampm}`;
}

function fmtDuration(start, end) {
  if (!start || !end) return null;
  const mins = Math.round((new Date(end) - new Date(start)) / 60000);
  if (mins <= 0 || mins > 600) return null;
  if (mins < 60) return `${mins} min`;
  const h = Math.floor(mins / 60), m = mins % 60;
  return m ? `${h}h ${m}m` : `${h}h`;
}

function ageLabel(min, max) {
  if (min == null && max == null) return 'All ages welcome';
  if (min == null) min = 0;
  if (min === max) max = null;
  if (min === 0 && (max == null || max >= 12)) return 'All ages welcome';
  if (max == null) return `Ages ${min}+`;
  return `Ages ${min}–${max}`;
}

function priceStr(ev) {
  if (ev.is_free) return 'Free';
  if (ev.price_min != null && ev.price_max != null && ev.price_min === ev.price_max) return `$${ev.price_min}`;
  if (ev.price_min != null && ev.price_max != null) return `$${ev.price_min}–$${ev.price_max}`;
  if (ev.price_min != null) return `From $${ev.price_min}`;
  return 'See event page';
}

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function renderNotes(notes) {
  if (!notes) return '';
  try {
    const parsed = JSON.parse(notes);
    if (Array.isArray(parsed)) return parsed.map(item => esc(item)).join('<br>');
  } catch (e) {}
  return esc(notes);
}

// ─── PROGRAM FAMILIES ────────────────────────────────────────────
const PROGRAM_FAMILIES = [
  { key: 'storytime',  label: 'Storytime at the Library', pattern: /\bstoryt(ime|elling)\b|story time|hora de los cuentos|furry tales/i },
  { key: 'chess',      label: 'Chess Club',               pattern: /\bchess\b/i },
  { key: 'scavenger',  label: 'Scavenger Hunt',           pattern: /scavenger hunt/i },
  { key: 'craft-kits', label: 'Take-Home Craft Kits',     pattern: /craft kit|take and make/i },
];

function familyMatch(title) {
  for (const f of PROGRAM_FAMILIES) { if (f.pattern.test(title)) return f; }
  return null;
}

function cleanProgramTitle(title) {
  if (!title) return '';
  return title
    .replace(/^Online Event:\s*/i, '')
    .replace(/^New[!\s]+/i, '')
    .replace(/\s*for\s+(Babies|Toddlers|Preschoolers|Infants|Teens|Tweens|Kids|Children|Families|All Ages)(\s+and\s+(Caregivers|Adults))?(\s+en dos idiomas.*)?$/i, '')
    .replace(/\s+en dos idiomas.*$/i, '')
    .replace(/\s+y\s+m[aá]s.*$/i, '')
    .trim();
}

function renderError(msg) {
  document.getElementById('root').innerHTML = `
    <div class="error-state">
      <div class="error-icon">🔍</div>
      <h3>Event not found</h3>
      <p>${esc(msg)}</p>
      <a class="error-link" href="index.html">← Back to all events</a>
    </div>`;
}
