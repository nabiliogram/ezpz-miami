<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EZPZ Miami — The Play-Book for Miami Parents</title>
  <meta name="description" content="The easiest way to find kid-friendly events in Miami this weekend." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400&family=Montserrat:wght@800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    :root {
      --flamingo: #FF4477;
      --yellow: #FACC15;
      --teal: #0D9488;
      --violet: #8B5CF6;
      --bg: #FDFCFB;
      --text-1: #0F172A;
      --text-2: #475569;
      --text-3: #94A3B8;
      --border: #F1F5F9;
      --header-h: 64px;
      --strip-h: 64px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text-1);min-height:100vh;-webkit-font-smoothing:antialiased;padding-top:calc(var(--header-h) + var(--strip-h))}

    /* ─── Header (matches live site) ─── */
    .hdr{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--header-h);background:rgba(255,255,255,0.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);transform:translateZ(0)}
    .hdr-in{max-width:720px;margin:0 auto;padding:0 20px;height:100%;display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;flex-direction:column;text-decoration:none}
    .logo-name{font-family:'Montserrat',sans-serif;font-size:24px;font-weight:900;letter-spacing:-0.04em;text-transform:uppercase;color:var(--flamingo);line-height:1}
    .logo-tag{font-family:'Montserrat',sans-serif;font-size:8px;font-weight:800;color:var(--yellow);text-transform:uppercase;letter-spacing:0.25em;line-height:1;margin-top:3px}

    /* ─── Date Strip (matches live site) ─── */
    .date-strip{position:fixed;top:var(--header-h);left:0;right:0;z-index:90;background:linear-gradient(180deg,#FFF8E1 0%,#FFFBEB 100%);border-bottom:2px solid #FCD34D;border-top:1px solid #FDE68A;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;box-shadow:0 2px 8px rgba(250,204,21,0.15);transform:translateZ(0)}
    .date-strip::-webkit-scrollbar{display:none}
    .date-strip-in{display:flex;min-width:max-content;max-width:720px;margin:0 auto;padding:0 4px}
    .d-btn{flex-shrink:0;width:52px;padding:8px 0 6px;display:flex;flex-direction:column;align-items:center;gap:1px;border:none;background:transparent;cursor:pointer;border-radius:8px;margin:4px 1px;transition:background 0.15s}
    .d-btn:hover{background:rgba(255,255,255,0.6)}
    .d-btn.active{background:rgba(255,255,255,0.85);box-shadow:0 1px 4px rgba(0,0,0,0.08)}
    .d-btn .dn{font-family:'Montserrat',sans-serif;font-size:7.5px;font-weight:900;text-transform:uppercase;letter-spacing:-0.03em;color:var(--text-3)}
    .d-btn.active .dn{color:var(--text-1)}
    .d-btn .dd{font-family:'Montserrat',sans-serif;font-size:15px;font-weight:900;color:var(--text-3)}
    .d-btn.active .dd{color:var(--flamingo)}
    .d-btn .dot{width:12px;height:2px;border-radius:2px;background:var(--flamingo);opacity:0;margin-top:1px}
    .d-btn.active .dot{opacity:1}
    .d-btn .cnt{font-size:8px;font-weight:600;color:var(--text-3);min-height:10px}
    .d-btn .cnt.has{color:var(--text-2)}

    /* ─── Modal ─── */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:500;opacity:0;pointer-events:none;transition:opacity 0.2s ease;display:flex;align-items:flex-end;justify-content:center}
    @media(min-width:700px){.modal-overlay{align-items:center}}
    .modal-overlay.open{opacity:1;pointer-events:auto}
    .bsheet{width:100%;max-height:85vh;background:white;border-radius:20px 20px 0 0;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);overflow-y:auto;box-shadow:0 -4px 30px rgba(0,0,0,0.15)}
    .bsheet.open{transform:translateY(0)}
    @media(min-width:700px){.bsheet{max-width:540px;border-radius:16px;transform:scale(0.95) translateY(10px);opacity:0;box-shadow:0 8px 40px rgba(0,0,0,0.15)}.bsheet.open{transform:scale(1) translateY(0);opacity:1}}

    /* ─── Loader ─── */
    .loader{display:flex;align-items:center;justify-content:center;min-height:50vh;flex-direction:column;gap:12px}
    .spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--flamingo);border-radius:50%;animation:sp 0.7s linear infinite}
    @keyframes sp{to{transform:rotate(360deg)}}

    /* ─── Image treatment ─── */
    .ev-img{position:relative;overflow:hidden;background:#E8E6E1}
    .ev-img img{width:100%;height:100%;object-fit:cover;display:block;filter:saturate(0.85) contrast(1.05) brightness(1.02)}
    .ev-img::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,240,230,0.08) 0%,rgba(0,0,0,0.02) 40%,rgba(0,0,0,0.5) 100%);pointer-events:none}
    .ev-ph{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px}

    /* ─── Location prompt ─── */
    .loc-overlay{position:fixed;inset:0;background:rgba(15,23,42,0.65);backdrop-filter:blur(6px);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

/* ═══════════════ SUPABASE ═══════════════ */
const SUPA_URL = 'https://pomjqbjxosbfozvbvgsj.supabase.co';
const SUPA_KEY = 'sb_publishable_8-9VIQPLrYfqxsoyGWjf8A_BO7UCLso';
const db = supabase.createClient(SUPA_URL, SUPA_KEY);

async function fetchEvents() {
  const today = new Date().toISOString().slice(0,10);
  const { data, error } = await db.from('events')
    .select('id,title,editorial_headline,description,parent_summary,practical_notes,start_date,end_date,age_min,age_max,image_url,venue_name,neighborhood,is_free,price_min,price_max,source,activity_type,address,source_url,lat,lng')
    .eq('is_canceled',false).eq('is_kid_friendly',true).gte('start_date',today)
    .order('start_date',{ascending:true}).limit(400);
  if (error) throw error;
  return (data||[]).filter(e=>{
    if(e.age_min!=null&&e.age_min>=13&&(e.age_max==null||e.age_max>=13)) return false;
    return true;
  });
}

/* ═══════════════ LOCATION ═══════════════ */
const HOODS = [
  {l:"Edgewater",la:25.7958,ln:-80.1867},{l:"Downtown",la:25.7743,ln:-80.1937},
  {l:"Brickell",la:25.7580,ln:-80.1917},{l:"Wynwood",la:25.8016,ln:-80.1988},
  {l:"Midtown",la:25.8050,ln:-80.1910},{l:"Design District",la:25.8122,ln:-80.1927},
  {l:"Little Havana",la:25.7657,ln:-80.2190},{l:"Coconut Grove",la:25.7260,ln:-80.2405},
  {l:"Coral Gables",la:25.7215,ln:-80.2684},{l:"South Miami",la:25.7076,ln:-80.2937},
  {l:"Pinecrest",la:25.6659,ln:-80.3077},{l:"Kendall",la:25.6793,ln:-80.3472},
  {l:"Doral",la:25.8195,ln:-80.3553},{l:"Miami Beach",la:25.7907,ln:-80.1300},
  {l:"North Miami",la:25.8901,ln:-80.1867},{l:"Aventura",la:25.9565,ln:-80.1392},
  {l:"Key Biscayne",la:25.6937,ln:-80.1628},{l:"Homestead",la:25.4687,ln:-80.4776},
];
function getCk(n){const m=document.cookie.match(new RegExp('(?:^|; )'+n+'=([^;]*)'));return m?decodeURIComponent(m[1]):null;}
function setCk(n,v){document.cookie=`${n}=${encodeURIComponent(v)};path=/;max-age=${60*60*24*90};SameSite=Lax`;}
function getSavedLoc(){const r=getCk('ezpz_loc');if(!r)return null;try{const o=JSON.parse(r);if(o&&typeof o.la==='number'&&typeof o.ln==='number'&&!isNaN(o.la)&&!isNaN(o.ln))return o;return null;}catch{return null;}}
function saveLoc(loc){setCk('ezpz_loc',JSON.stringify(loc));}
function hav(la1,ln1,la2,ln2){la1=+la1;ln1=+ln1;la2=+la2;ln2=+ln2;if([la1,ln1,la2,ln2].some(isNaN))return null;const R=3959,dLa=(la2-la1)*Math.PI/180,dLn=(ln2-ln1)*Math.PI/180,a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLn/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function driveMin(mi){return Math.round(mi*2.5);}

/* ═══════════════ DATA TRANSFORM ═══════════════ */
const DN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const FDN=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const TL={museum:"Museum",outdoor:"Outdoor",festival:"Festival",craft:"Art & Craft",storytime:"Storytime",workshop:"Workshop",performance:"Film & Stage",sports:"Sports",class:"Music & Class",camp:"Camp",games:"Games",other:"Other"};
const PG={museum:"linear-gradient(135deg,#FECDD3,#E11D48)",outdoor:"linear-gradient(135deg,#CCFBF1,#0D9488)",festival:"linear-gradient(135deg,#F5D0FE,#D946EF)",craft:"linear-gradient(135deg,#FEF3C7,#F59E0B)",storytime:"linear-gradient(135deg,#EDE9FE,#8B5CF6)",workshop:"linear-gradient(135deg,#DBEAFE,#3B82F6)",performance:"linear-gradient(135deg,#FCE7F3,#EC4899)",sports:"linear-gradient(135deg,#D1FAE5,#10B981)",class:"linear-gradient(135deg,#FFEDD5,#F97316)",camp:"linear-gradient(135deg,#D1FAE5,#059669)",games:"linear-gradient(135deg,#E0E7FF,#6366F1)",other:"linear-gradient(135deg,#F1F5F9,#94A3B8)"};

function etDate(d){return d.toLocaleDateString('en-CA',{timeZone:'America/New_York'});}
function etTime(d){return d.toLocaleTimeString('en-US',{timeZone:'America/New_York',hour:'numeric',minute:'2-digit'});}
function fmtDate(d){return `${FDN[d.getDay()]}, ${MN[d.getMonth()]} ${d.getDate()}`;}

function norm(e,uLoc){
  const sd=new Date(e.start_date);
  const dStr=etDate(sd), tStr=etTime(sd);
  let tm=tStr;
  if(e.end_date){tm=`${tStr} – ${etTime(new Date(e.end_date))}`;}
  let pr='Free',free=e.is_free;
  if(!free){
    if(e.price_min&&e.price_max&&e.price_min!==e.price_max) pr=`$${Math.round(e.price_min)}–$${Math.round(e.price_max)}`;
    else if(e.price_min) pr=`$${Math.round(e.price_min)}`;
    else if(e.price_max) pr=`$${Math.round(e.price_max)}`;
    else{pr='Free';free=true;}
  }
  let age=null;
  if(e.age_min!=null&&e.age_max!=null) age=`${e.age_min}–${e.age_max}`;
  else if(e.age_min!=null) age=`${e.age_min}+`;
  let mi=null,dm=null;
  if(uLoc&&e.lat&&e.lng){mi=hav(uLoc.la,uLoc.ln,e.lat,e.lng);dm=driveMin(mi);}
  const feat=!!(e.editorial_headline&&e.image_url);
  const isLib=e.source==='miami_dade_libraries';
  let blurb=e.parent_summary||(e.description?e.description.slice(0,120):'');
  if(blurb.length>100){const c=blurb.lastIndexOf(' ',100);blurb=blurb.slice(0,c>60?c:100);}
  return{id:e.id,t:e.editorial_headline||e.title,v:e.venue_name||'TBA',tm,d:dStr,mi,dm,pr,free,
    lib:isLib,at:e.activity_type||'other',ed:blurb,fullEd:e.parent_summary||e.description||'',
    img:e.image_url,feat,age,hood:e.neighborhood,srcUrl:e.source_url,
    notes:e.practical_notes,addr:e.address,lat:e.lat,lng:e.lng};
}

function filterLibs(evs){
  const libs=evs.filter(e=>e.lib),rest=evs.filter(e=>!e.lib);
  if(!libs.length) return evs;
  const vm={};
  libs.forEach(e=>{if(!vm[e.v])vm[e.v]={d:e.mi??9999,evs:[]};if(e.mi!=null&&e.mi<vm[e.v].d)vm[e.v].d=e.mi;vm[e.v].evs.push(e);});
  const top3=Object.entries(vm).sort((a,b)=>a[1].d-b[1].d).slice(0,3).map(([n])=>n);
  return[...rest,...libs.filter(e=>top3.includes(e.v))].sort((a,b)=>a.d.localeCompare(b.d)||(a.dm??999)-(b.dm??999));
}

/* ═══════════════ IMAGE ═══════════════ */
function Img({src,at,h,br,children}){
  if(src) return <div className="ev-img" style={{height:h,borderRadius:br||0,position:'relative'}}><img src={src} alt="" loading="lazy" style={{borderRadius:br||0}}/>{children}</div>;
  return <div className="ev-img ev-ph" style={{height:h,borderRadius:br||0,background:PG[at]||PG.other,position:'relative'}}><span style={{fontSize:h>130?32:24,opacity:0.6}}>{TL[at]||'Event'}</span>{children}</div>;
}

/* ═══════════════ DISTANCE ═══════════════ */
function Dist({mi,dm}){
  if(mi==null) return null;
  const c=mi<=3?'#0D9488':mi<=8?'var(--text-2)':'var(--text-3)';
  return <span style={{fontSize:11,color:c,fontWeight:600,display:'inline-flex',alignItems:'center',gap:3}}>
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.5"><rect x="1" y="6" width="22" height="12" rx="3"/><circle cx="6.5" cy="18" r="2"/><circle cx="17.5" cy="18" r="2"/></svg>
    {mi<10?mi.toFixed(1):Math.round(mi)} mi
  </span>;
}

/* ═══════════════ LOCATION PROMPT ═══════════════ */
function LocPrompt({onSelect}){
  const[mode,setMode]=useState('init');
  const[err,setErr]=useState('');
  function geo(){
    if(!navigator.geolocation){setMode('err');setErr('Not supported');return;}
    setMode('wait');
    navigator.geolocation.getCurrentPosition(
      p=>{const loc={la:p.coords.latitude,ln:p.coords.longitude,l:'My Location'};
        let b=HOODS[0],bd=999;HOODS.forEach(n=>{const d=hav(loc.la,loc.ln,n.la,n.ln);if(d<bd){bd=d;b=n;}});
        loc.l=b.l;saveLoc(loc);onSelect(loc);},
      e=>{setMode('err');setErr(e.code===1?'Location denied.':'Could not get location.');},
      {enableHighAccuracy:false,timeout:8000}
    );
  }
  function pick(n){const loc={la:n.la,ln:n.ln,l:n.l};saveLoc(loc);onSelect(loc);}
  return(
    <div className="loc-overlay">
      <div style={{background:'white',borderRadius:20,padding:'32px 28px',maxWidth:380,width:'100%',boxShadow:'0 16px 48px rgba(0,0,0,0.2)'}}>
        <div style={{textAlign:'center',marginBottom:20}}>
          <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:24,fontWeight:900,color:'var(--flamingo)',letterSpacing:'-0.04em',textTransform:'uppercase'}}>EZPZ Miami</div>
          <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:8,fontWeight:800,color:'var(--yellow)',textTransform:'uppercase',letterSpacing:'0.25em',marginBottom:14}}>THE PARENT CHEAT SHEET</div>
          <h2 style={{fontSize:17,fontWeight:700,color:'var(--text-1)',margin:'0 0 4px'}}>Where are you in Miami?</h2>
          <p style={{fontSize:13,color:'var(--text-3)',margin:0}}>We'll show drive times and your nearest libraries</p>
        </div>
        {(mode==='init'||mode==='err')&&<>
          {mode==='err'&&<div style={{fontSize:12,color:'#E11D48',background:'#FFF1F2',padding:'8px 12px',borderRadius:8,marginBottom:12,textAlign:'center'}}>{err}</div>}
          <button onClick={geo} style={{width:'100%',padding:14,borderRadius:12,border:'none',background:'var(--flamingo)',color:'white',fontSize:15,fontWeight:700,cursor:'pointer',marginBottom:10}}>📍 Use My Location</button>
          <button onClick={()=>setMode('pick')} style={{width:'100%',padding:12,borderRadius:12,border:'1.5px solid var(--border)',background:'white',color:'var(--text-1)',fontSize:14,fontWeight:600,cursor:'pointer'}}>Pick My Neighborhood</button>
        </>}
        {mode==='wait'&&<div style={{textAlign:'center',padding:'24px 0'}}><div className="spin" style={{margin:'0 auto 12px'}}/><p style={{fontSize:13,color:'var(--text-2)'}}>Finding you...</p></div>}
        {mode==='pick'&&<div style={{maxHeight:320,overflowY:'auto'}}>
          <button onClick={()=>setMode('init')} style={{fontSize:12,fontWeight:600,color:'var(--flamingo)',background:'none',border:'none',cursor:'pointer',marginBottom:8}}>← Back</button>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
            {HOODS.map(n=><button key={n.l} onClick={()=>pick(n)} style={{padding:'10px 8px',borderRadius:10,border:'1.5px solid var(--border)',background:'white',cursor:'pointer',fontSize:13,fontWeight:500,color:'var(--text-1)',textAlign:'left',transition:'all 0.15s'}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--flamingo)';e.currentTarget.style.background='#FFF5F7'}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.background='white'}}>📍 {n.l}</button>)}
          </div>
        </div>}
      </div>
    </div>
  );
}

/* ═══════════════ DATE STRIP ═══════════════ */
function DateStrip({dates,activeDate,onTap,eventCounts}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current) return;
    const el=ref.current.querySelector(`[data-d="${activeDate}"]`);
    if(el) el.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  },[activeDate]);
  const dayN=['SUN','MON','TUE','WED','THU','FRI','SAT'];
  return(
    <nav className="date-strip"><div className="date-strip-in" ref={ref}>
      {dates.map(ds=>{
        const d=new Date(ds+'T12:00:00');
        const cnt=eventCounts[ds]||0;
        const isAct=ds===activeDate;
        return <button key={ds} data-d={ds} className={`d-btn${isAct?' active':''}`} onClick={()=>onTap(ds)}>
          <span className="dn">{dayN[d.getDay()]}</span>
          <span className="dd">{String(d.getDate()).padStart(2,'0')}</span>
          <span className="dot"/>
          <span className={`cnt${cnt?' has':''}`}>{cnt?`(${cnt})`:''}</span>
        </button>;
      })}
    </div></nav>
  );
}

/* ═══════════════ EVENT CARD ═══════════════ */
function EventCard({ev,onClick}){
  const isLib=ev.lib;
  return(
    <div onClick={()=>onClick(ev)} style={{
      background:isLib?'#F9F7FF':'white',
      borderRadius:12,padding:'14px 16px',cursor:'pointer',
      border:isLib?'1px solid #E8E0F5':'1px solid #F0EDE8',
      transition:'box-shadow 0.15s',
    }}
    onMouseEnter={e=>e.currentTarget.style.boxShadow='0 2px 12px rgba(0,0,0,0.06)'}
    onMouseLeave={e=>e.currentTarget.style.boxShadow='none'}>
      {/* Headline */}
      <div style={{fontSize:14.5,fontWeight:700,color:'var(--text-1)',lineHeight:1.4,marginBottom:4,letterSpacing:'-0.01em'}}>
        {isLib&&<span style={{color:'var(--violet)',fontWeight:800,marginRight:5}}>📚</span>}
        {ev.t}
      </div>
      {/* Editorial blurb */}
      {ev.ed&&<div style={{fontSize:13,color:isLib?'#7C6DB0':'var(--text-2)',lineHeight:1.55,marginBottom:10}}>{ev.ed}</div>}
      {/* Metadata row */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:4,fontSize:11.5,color:'var(--text-3)'}}>
          <span style={{fontWeight:500}}>{ev.v}</span>
          <span style={{color:'#E2E8F0'}}>·</span>
          <span>{ev.tm.split('–')[0].trim()}</span>
          {ev.age&&<><span style={{color:'#E2E8F0'}}>·</span><span style={{color:'var(--violet)',fontWeight:500}}>{ev.age} yrs</span></>}
        </div>
        <Dist mi={ev.mi} dm={ev.dm}/>
      </div>
    </div>
  );
}

/* ═══════════════ FEATURED CARD ═══════════════ */
function FeatCard({ev,onClick,wide}){
  return(
    <div onClick={()=>onClick(ev)} style={{
      background:'white',borderRadius:14,overflow:'hidden',cursor:'pointer',
      boxShadow:'0 2px 12px rgba(0,0,0,0.06)',border:'1px solid #F0EDE8',
      width:wide?'auto':'min(290px,78vw)',flexShrink:0,
    }}>
      <Img src={ev.img} at={ev.at} h={wide?155:130} br="14px 14px 0 0">
        <div style={{position:'absolute',bottom:10,left:12,right:12,zIndex:1}}>
          <h3 style={{fontSize:15,fontWeight:800,color:'white',lineHeight:1.25,margin:0,fontFamily:"'Montserrat',sans-serif",textShadow:'0 1px 4px rgba(0,0,0,0.35)'}}>{ev.t}</h3>
        </div>
      </Img>
      <div style={{padding:'10px 14px 14px'}}>
        {ev.ed&&<p style={{fontSize:12.5,color:'var(--text-2)',lineHeight:1.5,margin:'0 0 10px'}}>{ev.ed}</p>}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{fontSize:11,color:'var(--text-3)',fontWeight:500}}>{ev.v}</span>
          <Dist mi={ev.mi} dm={ev.dm}/>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════ HERO TEASER ═══════════════ */
function HeroTeaser({ev,label,onClick}){
  return(
    <div onClick={()=>onClick(ev)} style={{margin:'12px 16px',borderRadius:16,overflow:'hidden',cursor:'pointer',background:'white',boxShadow:'0 2px 16px rgba(0,0,0,0.07)',border:'1px solid #F0EDE8'}}>
      <Img src={ev.img} at={ev.at} h={160} br="16px 16px 0 0">
        <div style={{position:'absolute',top:10,left:10,zIndex:1}}>
          <span style={{fontSize:10,fontWeight:700,color:'white',background:'rgba(0,0,0,0.3)',backdropFilter:'blur(8px)',padding:'4px 10px',borderRadius:6,textTransform:'uppercase',letterSpacing:'0.05em'}}>{label}</span>
        </div>
        <div style={{position:'absolute',bottom:12,left:14,right:14,zIndex:1}}>
          <h3 style={{fontSize:19,fontWeight:800,color:'white',lineHeight:1.25,margin:0,fontFamily:"'Montserrat',sans-serif",textShadow:'0 1px 6px rgba(0,0,0,0.4)'}}>{ev.t}</h3>
        </div>
      </Img>
      <div style={{padding:'12px 16px 14px'}}>
        {ev.ed&&<p style={{fontSize:13.5,color:'var(--text-2)',lineHeight:1.55,margin:'0 0 10px'}}>{ev.ed}</p>}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{fontSize:12,color:'var(--text-3)',fontWeight:500}}>{ev.v} · {ev.tm.split('–')[0].trim()}</span>
          <Dist mi={ev.mi} dm={ev.dm}/>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════ DETAIL SHEET ═══════════════ */
function Detail({ev,onClose}){
  if(!ev) return null;
  const d=new Date(ev.d+'T12:00:00');
  const mUrl=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(ev.addr||ev.v+' Miami')}`;
  return(
    <div className="modal-overlay open" onClick={onClose}>
      <div className="bsheet open" onClick={e=>e.stopPropagation()}>
        <div style={{width:36,height:4,borderRadius:2,background:'#E2E8F0',margin:'10px auto 6px'}}/>
        <Img src={ev.img} at={ev.at} h={180}/>
        <div style={{padding:'16px 20px 28px'}}>
          <div style={{display:'flex',gap:6,marginBottom:8,flexWrap:'wrap'}}>
            <span style={{fontSize:10,fontWeight:600,color:'var(--text-2)',background:'var(--border)',padding:'3px 8px',borderRadius:5}}>{TL[ev.at]||'Event'}</span>
            {ev.lib&&<span style={{fontSize:10,fontWeight:600,color:'var(--violet)',background:'#F3F0FF',padding:'3px 8px',borderRadius:5}}>📚 Library</span>}
            {ev.age&&<span style={{fontSize:10,fontWeight:600,color:'var(--violet)',background:'#EDE9FE',padding:'3px 8px',borderRadius:5}}>Ages {ev.age}</span>}
          </div>
          <h2 style={{fontSize:21,fontWeight:900,color:'var(--text-1)',lineHeight:1.25,margin:'0 0 8px',fontFamily:"'Montserrat',sans-serif"}}>{ev.t}</h2>
          {ev.fullEd&&<p style={{fontSize:14,color:'var(--text-2)',lineHeight:1.65,margin:'0 0 12px'}}>{ev.fullEd}</p>}
          {ev.notes&&<p style={{fontSize:13,color:'var(--text-3)',lineHeight:1.55,margin:'0 0 16px',fontStyle:'italic'}}>{ev.notes}</p>}
          <div style={{background:'#FAFAF8',borderRadius:12,border:'1px solid #F0EDE8',overflow:'hidden',marginBottom:16}}>
            {[
              {i:'📍',l:ev.v,r:ev.mi!=null?<Dist mi={ev.mi} dm={ev.dm}/>:ev.hood},
              {i:'🗓',l:fmtDate(d),r:ev.tm},
              {i:'💰',l:ev.pr},
              ev.age?{i:'👶',l:`Ages ${ev.age}`}:null,
            ].filter(Boolean).map((r,i,a)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'11px 16px',borderBottom:i<a.length-1?'1px solid #F0EDE8':'none'}}>
                <span style={{fontSize:14}}>{r.i}</span>
                <span style={{fontSize:13,fontWeight:600,color:'var(--text-1)',flex:1}}>{r.l}</span>
                {r.r&&<span style={{fontSize:12,color:'var(--text-3)'}}>{typeof r.r==='string'?r.r:r.r}</span>}
              </div>
            ))}
          </div>
          {ev.srcUrl&&<a href={ev.srcUrl} target="_blank" rel="noopener" style={{display:'block',textAlign:'center',fontSize:14,fontWeight:700,color:'white',background:'var(--flamingo)',textDecoration:'none',padding:13,borderRadius:12,marginBottom:10}}>View & Get Tickets →</a>}
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>window.open(mUrl,'_blank')} style={{flex:1,fontSize:12,fontWeight:600,color:'var(--text-2)',background:'white',border:'1.5px solid #E2E8F0',borderRadius:10,padding:'10px 6px',cursor:'pointer'}}>🗺 Directions</button>
            <button onClick={()=>{const t=`Check out ${ev.t} at ${ev.v}!${ev.srcUrl?' '+ev.srcUrl:''}`;if(navigator.share)navigator.share({title:ev.t,text:t,url:ev.srcUrl});else window.open(`https://wa.me/?text=${encodeURIComponent(t)}`,'_blank');}} style={{flex:1,fontSize:12,fontWeight:600,color:'var(--text-2)',background:'white',border:'1.5px solid #E2E8F0',borderRadius:10,padding:'10px 6px',cursor:'pointer'}}>↗ Share</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════ DAY SECTION ═══════════════ */
function DaySection({dateStr,evs,label,onClick}){
  const feat=evs.filter(e=>e.feat&&!e.lib);
  const standard=evs.filter(e=>!e.feat&&!e.lib);
  const libEvs=evs.filter(e=>e.lib);
  const empty=evs.length===0;
  return(
    <div id={`day-${dateStr}`} data-day={dateStr} style={{paddingTop:8,paddingBottom:empty?8:20}}>
      {/* Day header */}
      <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',marginBottom:empty?0:12}}>
        <h2 style={{fontFamily:"'Montserrat',sans-serif",fontSize:18,fontWeight:900,color:'var(--text-1)',letterSpacing:'-0.02em',margin:0}}>{label}</h2>
        {!empty&&<span style={{fontSize:12,color:'var(--text-3)'}}>{evs.length} {evs.length===1?'event':'events'}</span>}
      </div>

      {empty?(
        <div style={{padding:'16px 0',fontSize:13,color:'var(--text-3)'}}>No events this day</div>
      ):<>
        {feat.length>=2?(
          <div style={{display:'flex',gap:12,overflowX:'auto',scrollbarWidth:'none',marginBottom:14,WebkitOverflowScrolling:'touch',padding:'2px 0'}}>
            {feat.map(e=><FeatCard key={e.id} ev={e} onClick={onClick}/>)}
          </div>
        ):feat.length===1?(
          <div style={{marginBottom:14}}><FeatCard ev={feat[0]} onClick={onClick} wide/></div>
        ):null}

        {standard.length>0&&(
          <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:libEvs.length?14:0}}>
            {standard.map(e=><EventCard key={e.id} ev={e} onClick={onClick}/>)}
          </div>
        )}

        {libEvs.length>0&&(
          <div style={{padding:'14px 16px',background:'#F9F7FF',borderRadius:14,border:'1px solid #E8E0F5'}}>
            <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:12}}>
              <span style={{fontSize:14}}>📚</span>
              <span style={{fontFamily:"'Montserrat',sans-serif",fontSize:10,fontWeight:800,color:'var(--violet)',textTransform:'uppercase',letterSpacing:'0.06em'}}>At Your Library</span>
              <div style={{flex:1,height:1,background:'#E8E0F5'}}/>
              <span style={{fontSize:10,color:'#9B8EC4'}}>{libEvs.length}</span>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {libEvs.map(e=><EventCard key={e.id} ev={e} onClick={onClick}/>)}
            </div>
          </div>
        )}
      </>}

      {/* Day separator */}
      <div style={{height:1,background:'#E8E5DE',marginTop:empty?8:16}}/>
    </div>
  );
}

/* ═══════════════ APP ═══════════════ */
function App(){
  const[raw,setRaw]=useState([]);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState(null);
  const[sel,setSel]=useState(null);
  const[uLoc,setULoc]=useState(()=>getSavedLoc());
  const[showLoc,setShowLoc]=useState(false);
  const[activeDate,setActiveDate]=useState(null);
  const scrollingRef=useRef(false); // prevents observer from fighting tap-scroll
  const oc=useCallback(e=>setSel(e),[]);

  useEffect(()=>{fetchEvents().then(d=>{setRaw(d);setLoading(false);}).catch(e=>{setError(e.message);setLoading(false);});},[]);
  useEffect(()=>{if(!loading&&!error&&!uLoc)setShowLoc(true);},[loading,error,uLoc]);

  const events=useMemo(()=>{let e=raw.map(x=>norm(x,uLoc));if(uLoc)e=filterLibs(e);return e;},[raw,uLoc]);

  // 14-day date list
  const dates=useMemo(()=>{
    const out=[];const t=new Date();
    for(let i=0;i<14;i++){const d=new Date(t);d.setDate(t.getDate()+i);out.push(etDate(d));}
    return out;
  },[]);

  // Events grouped by date
  const byDate=useMemo(()=>{
    const m={};dates.forEach(d=>m[d]=[]);
    events.forEach(e=>{if(m[e.d])m[e.d].push(e);});
    // Sort each day by distance
    Object.values(m).forEach(arr=>arr.sort((a,b)=>(a.dm??999)-(b.dm??999)));
    return m;
  },[events,dates]);

  const eventCounts=useMemo(()=>{
    const m={};dates.forEach(d=>m[d]=(byDate[d]||[]).length);return m;
  },[byDate,dates]);

  // Set initial active date
  useEffect(()=>{
    if(!activeDate&&dates.length){
      const first=dates.find(d=>(byDate[d]||[]).length>0)||dates[0];
      setActiveDate(first);
    }
  },[dates,byDate,activeDate]);

  // IntersectionObserver: update activeDate as user scrolls
  useEffect(()=>{
    if(loading) return;
    const stickyH = 128; // header + strip height
    const els=dates.map(d=>document.getElementById(`day-${d}`)).filter(Boolean);
    if(!els.length) return;
    const obs=new IntersectionObserver((entries)=>{
      if(scrollingRef.current) return; // ignore during programmatic scroll
      // Find the topmost visible day section
      let topDate=null, topY=Infinity;
      entries.forEach(en=>{
        if(en.isIntersecting && en.boundingClientRect.top < topY){
          topY=en.boundingClientRect.top;
          topDate=en.target.dataset.day;
        }
      });
      if(topDate) setActiveDate(topDate);
    },{rootMargin:`-${stickyH}px 0px -60% 0px`,threshold:0});
    els.forEach(el=>obs.observe(el));
    return()=>obs.disconnect();
  },[loading,dates]);

  // Day label helper
  function dayLabel(ds){
    const today=etDate(new Date());
    if(ds===today) return 'Today';
    const tom=new Date();tom.setDate(tom.getDate()+1);
    if(ds===etDate(tom)) return 'Tomorrow';
    return fmtDate(new Date(ds+'T12:00:00'));
  }

  // Tap date → scroll to that day section
  function handleDateTap(ds){
    setActiveDate(ds);
    const el=document.getElementById(`day-${ds}`);
    if(!el) return;
    scrollingRef.current=true;
    const stickyH=128;
    const y=el.getBoundingClientRect().top+window.scrollY-stickyH;
    window.scrollTo({top:y,behavior:'smooth'});
    setTimeout(()=>{scrollingRef.current=false;},800);
  }

  if(loading) return <div className="loader"><div className="spin"/><div style={{fontSize:13,color:'var(--text-3)',fontWeight:500}}>Loading events...</div></div>;
  if(error) return <div style={{maxWidth:400,margin:'80px auto',padding:24,background:'white',borderRadius:12,textAlign:'center'}}><div style={{fontSize:24,marginBottom:8}}>😵</div><div style={{fontWeight:600,marginBottom:4}}>Failed to load events</div><div style={{color:'var(--text-3)'}}>{error}</div></div>;

  return(
    <div style={{minHeight:'100vh'}}>
      {/* ─── Header ─── */}
      <header className="hdr"><div className="hdr-in">
        <a className="logo" href="#">
          <span className="logo-name">EZPZ Miami</span>
          <span className="logo-tag">The Parent Cheat Sheet</span>
        </a>
        <button onClick={()=>setShowLoc(true)} style={{display:'flex',alignItems:'center',gap:5,fontSize:12,fontWeight:600,color:'var(--text-1)',background:'#F8F7F5',padding:'7px 12px',borderRadius:8,border:'1px solid var(--border)',cursor:'pointer'}}>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--flamingo)" strokeWidth="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          {uLoc?uLoc.l:'Set Location'}
        </button>
      </div></header>

      {/* ─── Date Strip ─── */}
      <DateStrip dates={dates} activeDate={activeDate} onTap={handleDateTap} eventCounts={eventCounts}/>

      {/* ─── Continuous scroll content ─── */}
      <div style={{maxWidth:720,margin:'0 auto',padding:'8px 16px 80px'}}>
        {dates.map(ds=>(
          <DaySection key={ds} dateStr={ds} evs={byDate[ds]||[]} label={dayLabel(ds)} onClick={oc}/>
        ))}

        <div style={{padding:'28px 0',textAlign:'center'}}>
          <p style={{fontSize:12,color:'var(--text-3)',margin:'0 0 10px'}}>Know about an event we're missing?</p>
          <button style={{background:'white',color:'var(--flamingo)',border:'1.5px solid var(--flamingo)',borderRadius:10,padding:'10px 22px',fontSize:12,fontWeight:700,cursor:'pointer'}}>Submit an Event</button>
        </div>
      </div>

      {sel&&<Detail ev={sel} onClose={()=>setSel(null)}/>}
      {showLoc&&<LocPrompt onSelect={loc=>{setULoc(loc);setShowLoc(false);}}/>}
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
