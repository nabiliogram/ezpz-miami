<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;

/* ═══════════════════════════════════ SUPABASE ═══════════════════════════════════ */
const SUPABASE_URL = 'https://pomjqbjxosbfozvbvgsj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_8-9VIQPLrYfqxsoyGWjf8A_BO7UCLso';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function fetchEvents() {
  const todayStr = new Date().toISOString().slice(0, 10);
  const { data, error } = await db
    .from('events')
    .select('id, title, editorial_headline, description, parent_summary, practical_notes, start_date, end_date, age_min, age_max, image_url, venue_name, neighborhood, is_free, price_min, price_max, source, activity_type, address, source_url, lat, lng')
    .eq('is_canceled', false)
    .eq('is_kid_friendly', true)
    .gte('start_date', todayStr)
    .order('start_date', { ascending: true })
    .limit(400);
  if (error) throw error;
  return (data || []).filter(e => {
    const amin = e.age_min, amax = e.age_max;
    if (amin != null && amin >= 13 && (amax == null || amax >= 13)) return false;
    return true;
  });
}

/* ═══════════════════════════════════ LOCATION ═══════════════════════════════════ */
const NEIGHBORHOODS = [
  { label:"Edgewater", lat:25.7958, lng:-80.1867 },
  { label:"Downtown", lat:25.7743, lng:-80.1937 },
  { label:"Brickell", lat:25.7580, lng:-80.1917 },
  { label:"Wynwood", lat:25.8016, lng:-80.1988 },
  { label:"Midtown", lat:25.8050, lng:-80.1910 },
  { label:"Design District", lat:25.8122, lng:-80.1927 },
  { label:"Little Havana", lat:25.7657, lng:-80.2190 },
  { label:"Coconut Grove", lat:25.7260, lng:-80.2405 },
  { label:"Coral Gables", lat:25.7215, lng:-80.2684 },
  { label:"South Miami", lat:25.7076, lng:-80.2937 },
  { label:"Pinecrest", lat:25.6659, lng:-80.3077 },
  { label:"Kendall", lat:25.6793, lng:-80.3472 },
  { label:"Doral", lat:25.8195, lng:-80.3553 },
  { label:"Miami Beach", lat:25.7907, lng:-80.1300 },
  { label:"North Miami", lat:25.8901, lng:-80.1867 },
  { label:"Aventura", lat:25.9565, lng:-80.1392 },
  { label:"Key Biscayne", lat:25.6937, lng:-80.1628 },
  { label:"Homestead", lat:25.4687, lng:-80.4776 },
];

function getCookie(name) {
  const m = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
  return m ? decodeURIComponent(m[1]) : null;
}
function setCookie(name, val) {
  document.cookie = `${name}=${encodeURIComponent(val)};path=/;max-age=${60*60*24*90};SameSite=Lax`;
}
function getSavedLocation() {
  const raw = getCookie('ezpz_loc');
  if (!raw) return null;
  try { return JSON.parse(raw); } catch { return null; }
}
function saveLocation(loc) { setCookie('ezpz_loc', JSON.stringify(loc)); }

function haversine(lat1, lng1, lat2, lng2) {
  const R = 3959;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function driveMin(miles) { return Math.round(miles * 2.5); }

/* ═══════════════════════════════════ DATA TRANSFORM ═══════════════════════════════════ */
function normalizeEvent(e, userLoc) {
  const sd = new Date(e.start_date);
  const etDate = sd.toLocaleDateString('en-CA', { timeZone: 'America/New_York' });
  const etTime = sd.toLocaleTimeString('en-US', { timeZone: 'America/New_York', hour: 'numeric', minute: '2-digit' });
  let timeStr = etTime;
  if (e.end_date) {
    const ed = new Date(e.end_date);
    timeStr = `${etTime} – ${ed.toLocaleTimeString('en-US', { timeZone: 'America/New_York', hour: 'numeric', minute: '2-digit' })}`;
  }

  let prStr = 'Free', isFree = e.is_free;
  if (!isFree) {
    if (e.price_min && e.price_max && e.price_min !== e.price_max) prStr = `$${Math.round(e.price_min)}–$${Math.round(e.price_max)}`;
    else if (e.price_min) prStr = `$${Math.round(e.price_min)}`;
    else if (e.price_max) prStr = `$${Math.round(e.price_max)}`;
    else { prStr = 'Free'; isFree = true; }
  }

  let ageStr = null;
  if (e.age_min != null && e.age_max != null) ageStr = `${e.age_min}–${e.age_max}`;
  else if (e.age_min != null) ageStr = `${e.age_min}+`;

  let distMi = null, distMin = null;
  if (userLoc && e.lat && e.lng) {
    distMi = haversine(userLoc.lat, userLoc.lng, e.lat, e.lng);
    distMin = driveMin(distMi);
  }

  const isFeatured = !!(e.editorial_headline && e.image_url);
  const isLib = e.source === 'miami_dade_libraries';

  // Build a clean 2-line editorial blurb (never truncated)
  let blurb = e.parent_summary || (e.description ? e.description.slice(0, 120) : '');
  // Cap at ~100 chars for a clean 2-line display
  if (blurb.length > 100) {
    const cut = blurb.lastIndexOf(' ', 100);
    blurb = blurb.slice(0, cut > 60 ? cut : 100);
  }

  return {
    id: e.id, t: e.editorial_headline || e.title, rawTitle: e.title,
    v: e.venue_name || 'TBA', tm: timeStr, d: etDate,
    distMi, dm: distMin, pr: prStr, free: isFree,
    tp: isLib ? 'library' : 'event', at: e.activity_type || 'other',
    ed: blurb, fullEd: e.parent_summary || e.description || '',
    img: e.image_url, w: isFeatured ? 'f' : 's', age: ageStr,
    neighborhood: e.neighborhood, source_url: e.source_url,
    practical_notes: e.practical_notes, address: e.address,
    source: e.source, lat: e.lat, lng: e.lng,
  };
}

function filterLibraryByRadius(events) {
  const libs = events.filter(e => e.tp === 'library');
  const nonLibs = events.filter(e => e.tp !== 'library');
  if (libs.length === 0) return events;
  const venueMap = {};
  libs.forEach(e => {
    if (!venueMap[e.v]) venueMap[e.v] = { minDist: e.distMi ?? 9999, events: [] };
    if (e.distMi != null && e.distMi < venueMap[e.v].minDist) venueMap[e.v].minDist = e.distMi;
    venueMap[e.v].events.push(e);
  });
  const sortedVenues = Object.entries(venueMap).sort((a,b) => a[1].minDist - b[1].minDist).slice(0, 3).map(([n]) => n);
  return [...nonLibs, ...libs.filter(e => sortedVenues.includes(e.v))].sort((a,b) => a.d.localeCompare(b.d) || (a.dm??999)-(b.dm??999));
}

/* ═══════════════════════════════════ CONSTANTS ═══════════════════════════════════ */
const IC = { museum:"🏛️", outdoor:"🌴", festival:"🎪", craft:"🎨", storytime:"📖", workshop:"🔧", performance:"🎬", sports:"🏃", class:"🎵", camp:"⛺", games:"🎲", other:"📌" };
const TC = { museum:"#E11D48", outdoor:"#0D9488", festival:"#D946EF", craft:"#F59E0B", storytime:"#8B5CF6", workshop:"#3B82F6", performance:"#EC4899", sports:"#10B981", class:"#F97316", camp:"#059669", games:"#6366F1", other:"#94A3B8" };
const TL = { museum:"Museum", outdoor:"Outdoor", festival:"Festival", craft:"Art & Craft", storytime:"Storytime", workshop:"Workshop", performance:"Film & Stage", sports:"Sports", class:"Music & Class", camp:"Camp", games:"Games", other:"Other" };
const DN = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MN = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const PG = {
  museum:"linear-gradient(135deg, #FECDD3 0%, #FDA4AF 50%, #E11D48 100%)",
  outdoor:"linear-gradient(135deg, #CCFBF1 0%, #5EEAD4 50%, #0D9488 100%)",
  festival:"linear-gradient(135deg, #F5D0FE 0%, #E879F9 50%, #D946EF 100%)",
  craft:"linear-gradient(135deg, #FEF3C7 0%, #FDE68A 50%, #F59E0B 100%)",
  storytime:"linear-gradient(135deg, #EDE9FE 0%, #C4B5FD 50%, #8B5CF6 100%)",
  workshop:"linear-gradient(135deg, #DBEAFE 0%, #93C5FD 50%, #3B82F6 100%)",
  performance:"linear-gradient(135deg, #FCE7F3 0%, #F9A8D4 50%, #EC4899 100%)",
  sports:"linear-gradient(135deg, #D1FAE5 0%, #6EE7B7 50%, #10B981 100%)",
  class:"linear-gradient(135deg, #FFEDD5 0%, #FDBA74 50%, #F97316 100%)",
  camp:"linear-gradient(135deg, #D1FAE5 0%, #6EE7B7 50%, #059669 100%)",
  games:"linear-gradient(135deg, #E0E7FF 0%, #A5B4FC 50%, #6366F1 100%)",
  other:"linear-gradient(135deg, #F1F5F9 0%, #CBD5E1 50%, #94A3B8 100%)",
};

/* Miami day-section palettes — calm, warm, beachy */
const DAY_PALETTES = {
  sat: { bg:"linear-gradient(180deg, #FFF8F0 0%, #FDF6F0 50%, #F5F3F0 100%)", accent:"#E8764B", head:"#C4572E" },
  sun: { bg:"linear-gradient(180deg, #FFF5F6 0%, #FDF2F3 50%, #F5F3F0 100%)", accent:"#D4577A", head:"#B8405E" },
  weekday: { bg:"linear-gradient(180deg, #F2F8F7 0%, #EFF6F4 50%, #F5F3F0 100%)", accent:"#2A9D8F", head:"#1E7A6D" },
  library: { bg:"#F9F7FF", border:"#E8E0F5" },
};
function dayPalette(dateStr) {
  const d = new Date(dateStr+"T12:00:00");
  if (d.getDay()===6) return DAY_PALETTES.sat;
  if (d.getDay()===0) return DAY_PALETTES.sun;
  return DAY_PALETTES.weekday;
}

function dsET(d){ return d.toLocaleDateString('en-CA', { timeZone: 'America/New_York' }); }
function isWE(d){ return d.getDay()===0||d.getDay()===6; }
function fmt(d){ return `${DN[d.getDay()]}, ${MN[d.getMonth()]} ${d.getDate()}`; }
function shortD(d){ return DN[d.getDay()].slice(0,3); }
function relLabel(d, today) {
  const ts = dsET(today), es = dsET(d);
  if (es===ts) return "Today";
  const tom = new Date(today); tom.setDate(tom.getDate()+1);
  if (es===dsET(tom)) return "Tomorrow";
  return fmt(d);
}

/* ─── Build layout ─── */
function buildLayout(events, today) {
  const ts = dsET(today);
  const future = events.filter(e=>e.d>=ts).sort((a,b)=>a.d.localeCompare(b.d)||(a.dm??999)-(b.dm??999));
  const bestFeatured = future.find(e=>e.w==="f" && e.img);
  let nxSat = new Date(today); while(nxSat.getDay()!==6) nxSat.setDate(nxSat.getDate()+1);
  const nxSun = new Date(nxSat); nxSun.setDate(nxSun.getDate()+1);
  const isWknd = isWE(today);
  const sections = [];
  const todayEvents = future.filter(e=>e.d===ts);
  const todayFeatured = todayEvents.filter(e=>e.w==="f");
  if ((!isWknd || todayFeatured.length===0) && bestFeatured && bestFeatured.d!==ts) {
    const hDate = new Date(bestFeatured.d+"T12:00:00");
    sections.push({ type:"hero-teaser", event:bestFeatured, label:relLabel(hDate,today)==="Today"?"Today":(isWE(hDate)?"This Weekend":shortD(hDate)) });
  }
  const allDays = [...new Set(future.map(e=>e.d))].sort();
  if (todayEvents.length) sections.push({ type:"day", date:new Date(ts+"T12:00:00"), events:todayEvents, isToday:true });
  const preWeekend = allDays.filter(d=>d>ts && d<dsET(nxSat));
  if (preWeekend.length) sections.push({ type:"weekgroup", label:isWknd?"Next Week":"This Week", days:preWeekend, events:future.filter(e=>preWeekend.includes(e.d)) });
  if (!isWknd || dsET(nxSat)!==ts) {
    [dsET(nxSat),dsET(nxSun)].filter(d=>d>ts||(isWknd&&d>=ts)).filter(d=>d!==ts).forEach((d,i,arr)=>{
      const evs=future.filter(e=>e.d===d);
      if(evs.length) sections.push({ type:"day", date:new Date(d+"T12:00:00"), events:evs, isToday:false, sectionTag:d===arr[0]?"This Weekend":null });
    });
  }
  const beyond = allDays.filter(d=>d>dsET(nxSun));
  if (beyond.length) {
    const bWd=beyond.filter(d=>!isWE(new Date(d+"T12:00:00"))), bWe=beyond.filter(d=>isWE(new Date(d+"T12:00:00")));
    if(bWd.length) sections.push({ type:"weekgroup", label:"Next Week", days:bWd, events:future.filter(e=>bWd.includes(e.d)) });
    bWe.forEach((d,i)=>{ const evs=future.filter(e=>e.d===d); if(evs.length) sections.push({ type:"day", date:new Date(d+"T12:00:00"), events:evs, isToday:false, sectionTag:i===0?"Next Weekend":null }); });
  }
  return sections;
}


/* ═══════════════════════════════════ IMAGE COMPONENT ═══════════════════════════════════ */
function EvImage({ src, at, venue, height, borderRadius, children }) {
  const h = height||140, br = borderRadius||0;
  if (src) return (
    <div className="ev-img-wrap" style={{ height:h, borderRadius:br, position:"relative" }}>
      <img src={src} alt="" loading="lazy" style={{ borderRadius:br }} />
      {children}
    </div>
  );
  return (
    <div className="ev-img-wrap ev-img-placeholder" style={{ height:h, borderRadius:br, background:PG[at]||PG.other, position:"relative" }}>
      <span style={{ fontSize:h>130?36:28, opacity:0.7 }}>{IC[at]||"📌"}</span>
      {venue && <span style={{ fontSize:10, fontWeight:600, color:"rgba(255,255,255,0.85)", textAlign:"center", maxWidth:"80%", lineHeight:1.3 }}>{venue}</span>}
      {children}
    </div>
  );
}


/* ═══════════════════════════════════ SHARED ATOMS ═══════════════════════════════════ */
function DistChip({ mi, dm }) {
  if (mi==null) return null;
  const col = mi<=3?"#0D9488":mi<=8?"#64748B":"#94A3B8";
  return (
    <span style={{ display:"inline-flex", alignItems:"center", gap:3, fontSize:11, color:col, fontWeight:600 }}>
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={col} strokeWidth="2.5" strokeLinecap="round"><rect x="1" y="6" width="22" height="12" rx="3"/><circle cx="6.5" cy="18" r="2"/><circle cx="17.5" cy="18" r="2"/></svg>
      {mi<10?mi.toFixed(1):Math.round(mi)} mi
    </span>
  );
}

function Price({ e }) {
  return <span style={{ fontSize:11, fontWeight:700, padding:"3px 8px", borderRadius:6, color:e.free?"#059669":"#64748B", background:e.free?"#ECFDF5":"#F1F5F9" }}>{e.pr}</span>;
}

function AgeChip({ age }) {
  if (!age) return null;
  return <span style={{ fontSize:10, fontWeight:600, color:"#6D28D9", background:"#EDE9FE", padding:"2px 6px", borderRadius:4 }}>Ages {age}</span>;
}


/* ═══════════════════════════════════ LOCATION PROMPT ═══════════════════════════════════ */
function LocationPrompt({ onSelect }) {
  const [mode, setMode] = useState('initial');
  const [errMsg, setErrMsg] = useState('');
  function handleGeo() {
    if (!navigator.geolocation) { setMode('error'); setErrMsg('Geolocation not supported'); return; }
    setMode('locating');
    navigator.geolocation.getCurrentPosition(
      pos => {
        const loc = { lat:pos.coords.latitude, lng:pos.coords.longitude, label:'My Location' };
        let best=NEIGHBORHOODS[0], bestD=999;
        NEIGHBORHOODS.forEach(n=>{ const d=haversine(loc.lat,loc.lng,n.lat,n.lng); if(d<bestD){bestD=d;best=n;} });
        loc.label = best.label;
        saveLocation(loc); onSelect(loc);
      },
      err => { setMode('error'); setErrMsg(err.code===1?'Location denied. Pick your neighborhood instead.':'Could not get location.'); },
      { enableHighAccuracy:false, timeout:8000 }
    );
  }
  function handlePick(n) { const loc={lat:n.lat,lng:n.lng,label:n.label}; saveLocation(loc); onSelect(loc); }

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(15,23,42,0.65)", backdropFilter:"blur(6px)", zIndex:600, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
      <div style={{ background:"white", borderRadius:20, padding:"32px 28px", maxWidth:380, width:"100%", boxShadow:"0 16px 48px rgba(0,0,0,0.2)" }}>
        <div style={{ textAlign:"center", marginBottom:20 }}>
          <div style={{ fontFamily:"Montserrat,sans-serif", fontSize:28, fontWeight:900, color:"#FF4477", letterSpacing:"-0.04em", textTransform:"uppercase" }}>EZPZ</div>
          <div style={{ fontFamily:"Montserrat,sans-serif", fontSize:8, fontWeight:800, color:"#FACC15", textTransform:"uppercase", letterSpacing:"0.2em", marginBottom:14 }}>MIAMI</div>
          <h2 style={{ fontSize:18, fontWeight:700, color:"#0F172A", margin:"0 0 6px" }}>Where are you in Miami?</h2>
          <p style={{ fontSize:13, color:"#94A3B8", margin:0, lineHeight:1.5 }}>We'll show drive times and your nearest libraries</p>
        </div>
        {(mode==='initial'||mode==='error') && <>
          {mode==='error' && <div style={{ fontSize:12, color:"#E11D48", background:"#FFF1F2", padding:"8px 12px", borderRadius:8, marginBottom:12, textAlign:"center" }}>{errMsg}</div>}
          <button onClick={handleGeo} style={{ width:"100%", padding:"14px", borderRadius:12, border:"none", background:"#FF4477", color:"white", fontSize:15, fontWeight:700, cursor:"pointer", marginBottom:10, display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
            Use My Location
          </button>
          <button onClick={()=>setMode('picking')} style={{ width:"100%", padding:"12px", borderRadius:12, border:"1.5px solid #E2E8F0", background:"white", color:"#0F172A", fontSize:14, fontWeight:600, cursor:"pointer" }}>Pick My Neighborhood</button>
        </>}

/* ═══════════════════════════════════ MAIN APP ═══════════════════════════════════ */
function App() {
  const [vp, setVp] = useState(window.innerWidth<700?"mobile":"desktop");
  const [rawEvents, setRawEvents] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [sel, setSel] = useState(null);
  const [simOverride, setSimOverride] = useState(null);
  const [userLoc, setUserLoc] = useState(()=>getSavedLocation());
  const [showLocPrompt, setShowLocPrompt] = useState(false);
  const oc = useCallback(e=>setSel(e),[]);
  const cl = useCallback(()=>setSel(null),[]);

  useEffect(()=>{
    fetchEvents().then(d=>{setRawEvents(d);setLoading(false);}).catch(e=>{setError(e.message);setLoading(false);});
  },[]);
  useEffect(()=>{ if(!loading&&!error&&!userLoc) setShowLocPrompt(true); },[loading,error,userLoc]);
  useEffect(()=>{ const h=()=>setVp(window.innerWidth<700?"mobile":"desktop"); window.addEventListener('resize',h); return()=>window.removeEventListener('resize',h); },[]);

  const events = useMemo(()=>{
    let evs = rawEvents.map(e=>normalizeEvent(e,userLoc));
    if(userLoc) evs = filterLibraryByRadius(evs);
    return evs;
  },[rawEvents,userLoc]);

  const libBranches = useMemo(()=>{
    if(!userLoc) return 0;
    return new Set(events.filter(e=>e.tp==='library').map(e=>e.v)).size;
  },[events,userLoc]);

  const today = simOverride ? new Date(simOverride+"T12:00:00") : new Date();
  const layout = buildLayout(events, today);
  const mob = vp==="mobile";

  const uniqueDates = [...new Set(events.map(e=>e.d))].sort().slice(0,8);
  const simDays = uniqueDates.map(d=>{ const dt=new Date(d+"T12:00:00"); return { k:d, l:`${shortD(dt)} ${dt.getDate()}` }; });

  if (loading) return <div className="loader"><div className="spin"/><div style={{fontSize:13,color:"#8B95A5",fontWeight:500}}>Loading events...</div></div>;
  if (error) return <div style={{maxWidth:400,margin:"80px auto",padding:24,background:"white",borderRadius:12,textAlign:"center",color:"#5A6577",fontSize:14}}><div style={{fontSize:24,marginBottom:8}}>😵</div><div style={{fontWeight:600,color:"#1A1A2E",marginBottom:4}}>Failed to load events</div><div>{error}</div></div>;

  function LocButton({style:s}) {
    return <button onClick={()=>setShowLocPrompt(true)} style={{ display:"flex", alignItems:"center", gap:5, fontSize:s?.fontSize||11, fontWeight:600, color:"#1A1A2E", background:"#F8F7F5", padding:s?.padding||"6px 10px", borderRadius:8, border:"1px solid #E8E5DE", cursor:"pointer", ...s }}>
      <svg width={s?.iconSize||12} height={s?.iconSize||12} viewBox="0 0 24 24" fill="none" stroke="#FF4477" strokeWidth="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      {userLoc ? userLoc.label : "Set Location"}
    </button>;
  }

  /* ─── Render a day section (mobile) ─── */
  function renderDayMobile(s, i) {
    const nonLib = s.events.filter(e=>e.tp!=='library');
    const libEvs = s.events.filter(e=>e.tp==='library');
    const feat = nonLib.filter(e=>e.w==='f');
    const standard = nonLib.filter(e=>e.w!=='f');
    const pal = dayPalette(s.events[0].d);
    const heroId = layout[0]?.type==="hero-teaser" ? layout[0].event.id : null;
    const showFeat = feat.filter(e=>e.id!==heroId);

    return (
      <div key={i} style={{ background:pal.bg, padding:"0 0 6px" }}>
        <DayHead label={relLabel(s.date,today)} count={s.events.length} pal={pal} isToday={s.isToday} tag={s.sectionTag} />
        {/* Featured carousel */}
        {showFeat.length >= 2 ? (
          <div style={{ display:"flex", gap:12, overflowX:"auto", scrollbarWidth:"none", padding:"6px 16px 10px", WebkitOverflowScrolling:"touch" }}>
            {showFeat.map(e=><FeatCard key={e.id} event={e} onClick={oc} />)}
          </div>
        ) : showFeat.length===1 ? (
          <div style={{ padding:"6px 16px 10px" }}><FeatCard event={showFeat[0]} onClick={oc} wide /></div>
        ) : null}
        {/* Standard event cards */}
        <div style={{ display:"flex", flexDirection:"column", gap:8, padding:"2px 16px 4px" }}>
          {standard.map(e=><EventCard key={e.id} event={e} onClick={oc} isLibrary={false} />)}
        </div>
        {/* Library mini-section */}
        <LibrarySection events={libEvs} onClick={oc} />
      </div>
    );
  }

  function renderMobile() {
    return (
      <div style={{ width:"100%", maxWidth:430, margin:"0 auto", background:"#FDFCFA", borderRadius:mob?0:20, overflow:"hidden", boxShadow:mob?"none":"0 4px 24px rgba(0,0,0,0.12)", minHeight:700 }}>
        {/* Header */}
        <div style={{ padding:"14px 16px", background:"white", display:"flex", alignItems:"center", justifyContent:"space-between", borderBottom:"1px solid #F0EDE8" }}>
          <div>
            <div style={{ fontFamily:"Montserrat,sans-serif", fontSize:22, fontWeight:900, color:"#FF4477", letterSpacing:"-0.04em", textTransform:"uppercase", lineHeight:1 }}>EZPZ</div>
            <div style={{ fontFamily:"Montserrat,sans-serif", fontSize:7, fontWeight:800, color:"#FACC15", textTransform:"uppercase", letterSpacing:"0.2em", marginTop:1 }}>MIAMI</div>
          </div>
          <LocButton />
        </div>

        {events.length===0 ? (
          <div style={{ padding:"60px 20px", textAlign:"center", color:"#8B95A5" }}>
            <div style={{ fontSize:32, marginBottom:8 }}>🌴</div>
            <div style={{ fontSize:14, fontWeight:600, color:"#1A1A2E" }}>No upcoming events found</div>
            <div style={{ fontSize:12, marginTop:4 }}>Check back soon — we update twice daily!</div>
          </div>
        ) : layout.map((s,i) => {
          if (s.type==="hero-teaser") return <HeroTeaser key={i} event={s.event} label={s.label} onClick={oc} />;
          if (s.type==="day") return renderDayMobile(s, i);
          if (s.type==="weekgroup") {
            const byDay = {}; s.events.forEach(e=>{(byDay[e.d]=byDay[e.d]||[]).push(e);});
            const sorted = Object.keys(byDay).sort();
            return (
              <div key={i} style={{ background:DAY_PALETTES.weekday.bg, padding:"0 0 6px" }}>
                <div style={{ padding:"20px 16px 6px" }}>
                  <h2 style={{ fontFamily:"Montserrat,sans-serif", fontSize:17, fontWeight:900, color:"#1A1A2E", margin:0 }}>{s.label}</h2>
                  <div style={{ display:"flex", alignItems:"center", gap:6, marginTop:4 }}>
                    <div style={{ height:2, width:20, borderRadius:1, background:DAY_PALETTES.weekday.accent }} />
                    <span style={{ fontSize:11, color:"#B0B8C5" }}>{s.events.length} events near you</span>
                  </div>
                </div>
                {sorted.map(dk => {
                  const d = new Date(dk+"T12:00:00");
                  const evs = byDay[dk];
                  const nonLib = evs.filter(e=>e.tp!=='library');
                  const libEvs = evs.filter(e=>e.tp==='library');
                  return (
                    <div key={dk}>
                      <div style={{ padding:"10px 16px 4px", display:"flex", alignItems:"center", gap:6 }}>
                        <span style={{ fontFamily:"Montserrat,sans-serif", fontSize:11, fontWeight:800, color:"#5A6577", textTransform:"uppercase" }}>{shortD(d)}</span>
                        <span style={{ fontSize:11, color:"#B0B8C5" }}>{MN[d.getMonth()]} {d.getDate()}</span>
                        <div style={{ flex:1, height:1, background:"#E8E5DE" }} />
                      </div>
                      <div style={{ display:"flex", flexDirection:"column", gap:8, padding:"4px 16px 4px" }}>
                        {nonLib.map(e=><EventCard key={e.id} event={e} onClick={oc} isLibrary={false} />)}
                      </div>
                      {libEvs.length > 0 && <LibrarySection events={libEvs} onClick={oc} />}
                    </div>
                  );
                })}
              </div>
            );
          }
          return null;
        })}

        <div style={{ padding:"24px 16px 32px", textAlign:"center", background:"linear-gradient(180deg, #FDFCFA 0%, #FFF5F6 100%)" }}>
          <p style={{ fontSize:12, color:"#8B95A5", margin:"0 0 10px" }}>Know about an event we're missing?</p>
          <button style={{ background:"white", color:"#FF4477", border:"1.5px solid #FF4477", borderRadius:10, padding:"10px 22px", fontSize:12, fontWeight:700, cursor:"pointer" }}>Submit an Event</button>
        </div>
      </div>
    );
  }

  function renderDesktop() {
    return (
      <div style={{ maxWidth:1100, margin:"0 auto", padding:"0 32px" }}>
        <div style={{ padding:"20px 0 18px", display:"flex", alignItems:"center", justifyContent:"space-between", borderBottom:"1px solid #F0EDE8" }}>
          <div>
            <div style={{ fontFamily:"Montserrat,sans-serif", fontSize:28, fontWeight:900, color:"#FF4477", letterSpacing:"-0.04em", textTransform:"uppercase", lineHeight:1 }}>EZPZ</div>
            <div style={{ fontFamily:"Montserrat,sans-serif", fontSize:8, fontWeight:800, color:"#FACC15", textTransform:"uppercase", letterSpacing:"0.2em", marginTop:2 }}>THE PLAYBOOK FOR MIAMI PARENTS</div>
          </div>
          <LocButton style={{fontSize:13,padding:"8px 14px",iconSize:14}} />
        </div>

        {events.length===0 ? (
          <div style={{padding:"80px 20px",textAlign:"center",color:"#8B95A5"}}><div style={{fontSize:40,marginBottom:12}}>🌴</div><div style={{fontSize:16,fontWeight:600,color:"#1A1A2E"}}>No upcoming events found</div></div>
        ) : layout.map((s,i) => {
          if (s.type==="hero-teaser") {
            const e = s.event;
            return (
              <div key={i} onClick={()=>oc(e)} style={{ margin:"24px 0 16px", borderRadius:16, overflow:"hidden", cursor:"pointer", display:"flex", background:"white", boxShadow:"0 2px 16px rgba(0,0,0,0.06)", border:"1px solid #F0EDE8", transition:"box-shadow 0.2s" }}
                onMouseEnter={ev=>ev.currentTarget.style.boxShadow="0 6px 28px rgba(0,0,0,0.1)"}
                onMouseLeave={ev=>ev.currentTarget.style.boxShadow="0 2px 16px rgba(0,0,0,0.06)"}>
                <EvImage src={e.img} at={e.at} venue={e.v} height={260}>
                  <div style={{position:"absolute",top:14,left:14,zIndex:1}}>
                    <span style={{fontSize:11,fontWeight:700,color:"white",background:"rgba(0,0,0,0.3)",backdropFilter:"blur(8px)",padding:"4px 12px",borderRadius:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>{s.label}</span>
                  </div>
                </EvImage>
                <div style={{ flex:1, padding:"28px 32px", display:"flex", flexDirection:"column", justifyContent:"center" }}>
                  <h3 style={{ fontFamily:"Montserrat,sans-serif", fontSize:23, fontWeight:900, color:"#1A1A2E", lineHeight:1.25, margin:"0 0 10px", letterSpacing:"-0.02em" }}>{e.t}</h3>
                  {e.ed && <p style={{ fontSize:14.5, color:"#5A6577", lineHeight:1.6, margin:"0 0 16px" }}>{e.ed}</p>}
                  <div style={{ display:"flex", alignItems:"center", gap:12, fontSize:12.5, color:"#8B95A5" }}>
                    <span style={{fontWeight:500}}>{e.v}</span>
                    <span style={{color:"#D4D8E0"}}>·</span>
                    <span>{e.tm}</span>
                    {e.distMi!=null && <><span style={{color:"#D4D8E0"}}>·</span><DistChip mi={e.distMi} dm={e.dm}/></>}
                  </div>
                </div>
              </div>
            );
          }
          if (s.type==="day") {
            const nonLib = s.events.filter(e=>e.tp!=='library');
            const libEvs = s.events.filter(e=>e.tp==='library');
            const feat = nonLib.filter(e=>e.w==='f');
            const standard = nonLib.filter(e=>e.w!=='f');
            const pal = dayPalette(s.events[0].d);
            const heroId = layout[0]?.type==="hero-teaser"?layout[0].event.id:null;
            const showFeat = feat.filter(e=>e.id!==heroId);

            return (
              <div key={i} style={{ margin:"24px 0", padding:"20px 24px", background:pal.bg, borderRadius:16, border:"1px solid #F0EDE8" }}>
                <div style={{ display:"flex", alignItems:"baseline", gap:10, marginBottom:16 }}>
                  {s.sectionTag && <span style={{ fontFamily:"Montserrat,sans-serif", fontSize:10, fontWeight:800, color:pal.accent, textTransform:"uppercase", letterSpacing:"0.1em" }}>{s.sectionTag}</span>}
                  {s.sectionTag && <span style={{color:"#D4D8E0"}}>·</span>}
                  <h2 style={{ fontFamily:"Montserrat,sans-serif", fontSize:20, fontWeight:900, color:pal.head, margin:0 }}>{relLabel(s.date,today)}</h2>
                  {s.isToday && <span style={{fontSize:10,fontWeight:700,color:"white",background:pal.accent,padding:"2px 8px",borderRadius:4,textTransform:"uppercase"}}>Today</span>}
                  <div style={{flex:1}}/>
                  <span style={{fontSize:12,color:"#B0B8C5"}}>{s.events.length} events</span>
                </div>
                {/* Featured cards grid */}
                {showFeat.length>0 && (
                  <div style={{ display:"grid", gridTemplateColumns:`repeat(${Math.min(showFeat.length,3)}, 1fr)`, gap:16, marginBottom:16 }}>
                    {showFeat.map(e=><DCard key={e.id} event={e} onClick={oc} />)}
                  </div>
                )}
                {/* Standard + library event cards */}
                <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                  {standard.map(e=><DEventCard key={e.id} event={e} onClick={oc} isLibrary={false} />)}
                  {libEvs.map(e=><DEventCard key={e.id} event={e} onClick={oc} isLibrary={true} />)}
                </div>
              </div>
            );
          }
          if (s.type==="weekgroup") {
            const byDay={}; s.events.forEach(e=>{(byDay[e.d]=byDay[e.d]||[]).push(e);});
            const sorted=Object.keys(byDay).sort();
            return (
              <div key={i} style={{ margin:"24px 0", padding:"20px 24px", background:DAY_PALETTES.weekday.bg, borderRadius:16, border:"1px solid #E0ECE8" }}>
                <div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:16}}>
                  <h2 style={{fontFamily:"Montserrat,sans-serif",fontSize:20,fontWeight:900,color:"#1A1A2E",margin:0}}>{s.label}</h2>
                  <span style={{fontSize:12,color:"#B0B8C5"}}>{s.events.length} events near you</span>
                </div>
                <div style={{ display:"grid", gridTemplateColumns:sorted.length<=2?"1fr 1fr":`repeat(${Math.min(sorted.length,3)}, 1fr)`, gap:14 }}>
                  {sorted.map(dk=>{
                    const d=new Date(dk+"T12:00:00"), evs=byDay[dk];
                    const nonLib=evs.filter(e=>e.tp!=='library'), libEvs=evs.filter(e=>e.tp==='library');
                    return (
                      <div key={dk} style={{ background:"white", borderRadius:12, padding:"14px 16px", border:"1px solid #F0EDE8" }}>
                        <div style={{ fontFamily:"Montserrat,sans-serif", fontSize:11, fontWeight:800, color:"#1A1A2E", textTransform:"uppercase", marginBottom:10 }}>
                          {shortD(d)} <span style={{fontWeight:500,color:"#B0B8C5",textTransform:"none"}}>{MN[d.getMonth()]} {d.getDate()}</span>
                        </div>
                        {nonLib.map(e=>(
                          <div key={e.id} onClick={()=>oc(e)} style={{ display:"flex", gap:8, padding:"8px 0", cursor:"pointer", borderBottom:"1px solid #F8F7F5" }}>
                            <span style={{fontSize:14}}>{IC[e.at]}</span>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontSize:13,fontWeight:600,color:"#1A1A2E",lineHeight:1.35,marginBottom:2}}>{e.t}</div>
                              {e.ed && <div style={{fontSize:11.5,color:"#8B95A5",lineHeight:1.45,marginBottom:3}}>{e.ed}</div>}
                              <div style={{display:"flex",justifyContent:"space-between",fontSize:10.5,color:"#B0B8C5"}}>
                                <span>{e.tm.split("–")[0].trim()}</span>
                                <DistChip mi={e.distMi} dm={e.dm}/>
                              </div>
                            </div>
                          </div>
                        ))}
                        {libEvs.length>0 && (
                          <div style={{marginTop:8,padding:"8px 0 0",borderTop:"1px dashed #E8E0F5"}}>
                            <div style={{fontSize:9,fontWeight:700,color:"#7C3AED",textTransform:"uppercase",marginBottom:6}}>📚 Library</div>
                            {libEvs.map(e=>(
                              <div key={e.id} onClick={()=>oc(e)} style={{display:"flex",gap:6,padding:"5px 0",cursor:"pointer"}}>
                                <span style={{fontSize:12}}>{IC[e.at]}</span>
                                <div style={{flex:1,minWidth:0}}>
                                  <div style={{fontSize:12,fontWeight:600,color:"#1A1A2E",lineHeight:1.3}}>{e.t}</div>
                                  <div style={{fontSize:10.5,color:"#9B8EC4"}}>{e.tm.split("–")[0].trim()}{e.age?` · ${e.age} yrs`:''}</div>
                                </div>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          }
          return null;
        })}

        <div style={{padding:"32px 0 48px",textAlign:"center"}}>
          <p style={{fontSize:13,color:"#B0B8C5",margin:"0 0 10px"}}>Know about an event we're missing?</p>
          <button style={{background:"white",color:"#FF4477",border:"1.5px solid #FF4477",borderRadius:10,padding:"10px 24px",fontSize:13,fontWeight:700,cursor:"pointer"}}>Submit an Event</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight:"100vh" }}>
      <div className="ctrl">
        <span className="l">Sim Day:</span>
        <div className="ct">
          <button className={!simOverride?"a":""} onClick={()=>setSimOverride(null)}>Live</button>
          {simDays.map(d=>(<button key={d.k} className={simOverride===d.k?"a":""} onClick={()=>setSimOverride(d.k)}>{d.l}</button>))}
        </div>
        <span className="l" style={{marginLeft:8}}>View:</span>
        <div className="ct">
          {["mobile","desktop"].map(v=>(<button key={v} className={vp===v?"a":""} onClick={()=>setVp(v)}>{v==="mobile"?"📱 Mobile":"🖥 Desktop"}</button>))}
        </div>
        <span className="l" style={{marginLeft:8}}>{events.length} events · {libBranches} libraries</span>
      </div>

      <div style={{ padding:mob?"0 0 60px":"24px 0 40px" }}>
        {mob ? renderMobile() : renderDesktop()}
      </div>

      {sel && <Detail event={sel} vp={vp} onClose={cl} />}
      {showLocPrompt && <LocationPrompt onSelect={loc=>{setUserLoc(loc);setShowLocPrompt(false);}} />}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
