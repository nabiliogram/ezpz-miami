<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EZPZ Miami — The Play-Book for Miami Parents</title>
  <meta name="description" content="The easiest way to find kid-friendly events in Miami this weekend." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300&family=Montserrat:wght@800;900&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --flamingo:     #FF4477;
      --coral:        #FF8C70;
      --violet:       #8B5CF6;
      --teal:         #0D9488;
      --yellow:       #FACC15;
      --bg:           #FDFCFB;
      --bg-white:     #FFFFFF;
      --bg-date:      #FFFBEB;
      --bg-yellow:    #FFFBEB;
      --text-1:       #0F172A;
      --text-2:       #475569;
      --text-3:       #94A3B8;
      --border:       #F1F5F9;
      --border-med:   #E2E8F0;
      --free:         #059669;
      --free-bg:      #ECFDF5;
      --header-h:     68px;
      --date-h:       72px;
      --tab-h:        68px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .display { font-family: 'Montserrat', sans-serif; }

    /* ─────────────────────────────────────────────
       HEADER
    ───────────────────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--header-h);
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: none;
    }
    .header-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 20px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      flex-direction: column;
      text-decoration: none;
    }
    .logo-name {
      font-family: 'Montserrat', sans-serif;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      color: var(--flamingo);
      line-height: 1;
    }
    .logo-tag {
      font-family: 'Montserrat', sans-serif;
      font-size: 8px;
      font-weight: 800;
      color: var(--yellow);
      text-transform: uppercase;
      letter-spacing: 0.25em;
      line-height: 1;
      margin-top: 3px;
    }
    /* Calendar button removed — space reserved for disclaimer link */

    /* ─────────────────────────────────────────────
       TAB BAR — Accent Line + Hanging Tag Cards
    ───────────────────────────────────────────── */
    .tab-accent-line {
      height: 3px;
      background: var(--flamingo);
      transition: background 0.2s ease;
    }
    .tab-accent-line[data-active="library"] { background: var(--violet); }
    .tab-accent-line[data-active="places"] { background: var(--teal); }

    .tab-bar-wrap {
      position: sticky;
      top: var(--header-h);
      z-index: 95;
      background: var(--bg-white);
      padding: 0 12px 10px;
    }
    .tab-bar {
      display: flex;
      gap: 8px;
      max-width: 720px;
      margin: 0 auto;
    }
    .tab-btn {
      flex: 1;
      border: 1.5px solid #E8E6E3;
      border-top: none;
      background: #FAFAF9;
      border-radius: 0 0 14px 14px;
      padding: 10px 6px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-family: 'Inter', -apple-system, sans-serif;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-icon {
      font-size: 16px;
      line-height: 1;
    }
    .tab-label {
      font-size: 11px;
      font-weight: 800;
      color: var(--text-2);
      text-align: center;
      line-height: 1.25;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .tab-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 18px;
      padding: 0 7px;
      border-radius: 10px;
      background: #E5E4E1;
      font-size: 10.5px;
      font-weight: 800;
      color: var(--text-2);
      line-height: 1;
    }
    .tab-btn:hover { background: #F5F4F2; }
    /* Active states — colored fill + border + shadow */
    .tab-btn[data-tab="events"].active {
      background: rgba(255, 68, 119, 0.06);
      border-color: var(--flamingo);
      box-shadow: 0 3px 8px rgba(255, 68, 119, 0.1);
    }
    .tab-btn[data-tab="events"].active .tab-label { color: var(--flamingo); }
    .tab-btn[data-tab="events"].active .tab-badge { background: var(--flamingo); color: white; }

    .tab-btn[data-tab="library"].active {
      background: rgba(139, 92, 246, 0.06);
      border-color: var(--violet);
      box-shadow: 0 3px 8px rgba(139, 92, 246, 0.1);
    }
    .tab-btn[data-tab="library"].active .tab-label { color: var(--violet); }
    .tab-btn[data-tab="library"].active .tab-badge { background: var(--violet); color: white; }

    .tab-btn[data-tab="places"].active {
      background: rgba(13, 148, 136, 0.06);
      border-color: var(--teal);
      box-shadow: 0 3px 8px rgba(13, 148, 136, 0.1);
    }
    .tab-btn[data-tab="places"].active .tab-label { color: var(--teal); }
    .tab-btn[data-tab="places"].active .tab-badge { background: var(--teal); color: white; }

    /* ─────────────────────────────────────────────
       DATE PICKER STRIP
    ───────────────────────────────────────────── */
    .date-strip {
      position: sticky;
      top: calc(var(--header-h) + var(--tab-h));
      z-index: 90;
      background: linear-gradient(180deg, #FFF8E1 0%, #FFFBEB 100%);
      border-bottom: 2px solid #FCD34D;
      border-top: 1px solid #FDE68A;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      box-shadow: 0 2px 8px rgba(250, 204, 21, 0.15);
    }
    .date-strip.hidden { display: none; }
    .date-strip::-webkit-scrollbar { display: none; }
    .date-strip-inner {
      display: flex;
      min-width: max-content;
      max-width: 720px;
      margin: 0 auto;
      padding: 0 4px;
    }
    .date-btn {
      flex-shrink: 0;
      width: 56px;
      padding: 10px 0 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 2px;
      border: none;
      background: transparent;
      cursor: pointer;
      transition: background 0.15s, transform 0.12s;
      border-radius: 8px;
      margin: 4px 1px;
    }
    .date-btn:hover { background: rgba(255, 255, 255, 0.6); }
    .date-btn.active {
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .date-btn .day-name {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      color: var(--text-3);
    }
    .date-btn.active .day-name { color: var(--text-1); }
    .date-btn .day-num {
      font-family: 'Montserrat', sans-serif;
      font-size: 20px;
      font-weight: 900;
      color: var(--text-3);
    }
    .date-btn.active .day-num { color: var(--flamingo); }
    .date-btn .day-dot {
      width: 18px;
      height: 3px;
      border-radius: 2px;
      background: var(--flamingo);
      opacity: 0;
      margin-top: 1px;
    }
    .date-btn.active .day-dot { opacity: 1; }
    .date-btn .day-count {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      font-weight: 800;
      color: var(--text-3);
      margin-top: 1px;
      min-height: 10px;
      opacity: 0;
      transition: opacity 0.15s;
      line-height: 1;
    }
    .date-btn .day-count.has-events { opacity: 0.55; }
    .date-btn.active .day-count.has-events { opacity: 1; color: var(--flamingo); }
    /* Date color variants */
    .date-strip[data-tab="library"] .date-btn.active .day-num { color: var(--violet); }
    .date-strip[data-tab="library"] .date-btn.active .day-dot { background: var(--violet); }
    .date-strip[data-tab="library"] .date-btn.active .day-count.has-events { color: var(--violet); }
    .date-strip[data-tab="places"] .date-btn.active .day-num { color: var(--teal); }
    .date-strip[data-tab="places"] .date-btn.active .day-dot { background: var(--teal); }

    /* ─────────────────────────────────────────────
       AGE FILTER BAR (Library tab)
    ───────────────────────────────────────────── */
    .age-filter-bar {
      display: none;
      position: sticky;
      top: calc(var(--header-h) + var(--tab-h) + var(--date-h));
      z-index: 85;
      max-width: 720px;
      margin: 0 auto;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .age-filter-bar::-webkit-scrollbar { display: none; }
    .age-filter-bar.visible { display: flex; }
    .age-filter-inner {
      display: flex;
      gap: 8px;
      min-width: max-content;
    }
    .age-chip {
      flex-shrink: 0;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1.5px solid var(--border-med);
      background: var(--bg-white);
      color: var(--text-2);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .age-chip:hover { border-color: var(--violet); }
    .age-chip.active {
      border-color: var(--violet);
      background: var(--violet);
      color: white;
    }

    /* Neighborhood pill */
    .hood-pill {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1.5px solid var(--border-med);
      background: var(--bg-white);
      color: var(--text-2);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }
    .hood-pill:hover { border-color: var(--teal); }
    .hood-pill.filtered {
      border-color: var(--teal);
      background: var(--teal);
      color: white;
    }
    .hood-pill .hood-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      background: rgba(255,255,255,0.3);
      font-size: 11px;
      font-weight: 700;
      padding: 0 4px;
    }
    .hood-pill:not(.filtered) .hood-count { display: none; }

    /* Neighborhood dropdown */
    .hood-dropdown-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 199;
      background: rgba(0,0,0,0.3);
    }
    .hood-dropdown-overlay.open { display: block; }

    .hood-dropdown {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 200;
      max-height: 55vh;
      background: white;
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.28s ease;
    }
    .hood-dropdown-overlay.open .hood-dropdown { transform: translateY(0); }

    .hood-dropdown-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .hood-dropdown-title {
      font-weight: 700;
      font-size: 16px;
      color: var(--text-1);
    }
    .hood-dropdown-clear {
      font-size: 13px;
      font-weight: 600;
      color: var(--teal);
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px 8px;
    }
    .hood-dropdown-list {
      overflow-y: auto;
      padding: 8px 12px 28px;
      -webkit-overflow-scrolling: touch;
    }
    .hood-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 8px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .hood-option:last-child { border-bottom: none; }
    .hood-checkbox {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid var(--border-med);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .hood-option.selected .hood-checkbox {
      background: var(--teal);
      border-color: var(--teal);
    }
    .hood-checkbox-check {
      display: none;
      width: 12px;
      height: 12px;
    }
    .hood-option.selected .hood-checkbox-check { display: block; }
    .hood-option-label {
      flex: 1;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-1);
    }
    .hood-option-count {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-3);
    }

    /* ─────────────────────────────────────────────
       PAGE & SECTION HEADER
    ───────────────────────────────────────────── */
    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 12px 0;
    }
    .section-header {
      padding: 28px 12px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }
    .section-header-left {
      flex: 1;
    }
    .section-date {
      font-family: 'Montserrat', sans-serif;
      font-size: 36px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--text-1);
    }
    .section-bar {
      width: 56px;
      height: 6px;
      background: var(--flamingo);
      margin-top: 10px;
    }
    .section-bar.violet { background: var(--violet); }
    .section-bar.teal { background: var(--teal); }
    .section-count {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-3);
      margin-top: 6px;
    }

    /* ─────────────────────────────────────────────
       EVENT CARD
    ───────────────────────────────────────────── */
    .events-list {
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .event-card {
      background: var(--bg-white);
      border-radius: 16px;
      overflow: hidden;
      border: 1.5px solid var(--border-med);
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: box-shadow 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
    }
    .event-card:active { opacity: 0.85; }
    @media (hover: hover) {
      .event-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.08); border-color: #CBD5E1; }
    }

    /* Billboard header */
    .card-billboard {
      width: 100%;
      position: relative;
      overflow: hidden;
      background: var(--text-1);
      padding: 20px 24px;
    }
    .card-billboard::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.08;
      background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28"><rect width="28" height="28" fill="none"/><rect x="0" y="0" width="14" height="14" fill="white" fill-opacity="0.15"/><rect x="14" y="14" width="14" height="14" fill="white" fill-opacity="0.15"/></svg>');
      background-size: 28px 28px;
    }
    .billboard-content {
      position: relative;
      z-index: 2;
      width: 100%;
    }
    .category-pill {
      display: inline-block;
      font-family: 'Montserrat', sans-serif;
      font-size: 7px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 2px 7px;
      border-radius: 3px;
      background: var(--bg-white);
      color: var(--text-1);
      margin-bottom: 10px;
    }
    .card-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 26px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      line-height: 1.1;
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-image: linear-gradient(to right, var(--coral), var(--flamingo));
      word-break: break-word;
      overflow-wrap: break-word;
    }
    .billboard-ghost {
      position: absolute;
      bottom: -8px;
      right: -8px;
      font-family: 'Montserrat', sans-serif;
      font-size: 72px;
      font-weight: 900;
      text-transform: uppercase;
      color: rgba(255,255,255,0.03);
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
      line-height: 1;
    }

    /* Card body */
    .card-body {
      padding: 20px 24px 24px;
    }
    .card-summary {
      font-size: 14px;
      font-weight: 500;
      font-style: italic;
      line-height: 1.65;
      color: var(--text-2);
      margin-bottom: 24px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Metadata grid */
    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 28px;
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }
    .meta-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .meta-icon {
      flex-shrink: 0;
      margin-top: 2px;
      color: var(--text-3);
    }
    .meta-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 8px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-3);
    }
    .meta-value {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      color: var(--text-1);
      margin-top: 1px;
    }
    .meta-value.is-free { color: var(--free); }

    /* ─────────────────────────────────────────────
       LIBRARY SECTION (Card-based)
    ───────────────────────────────────────────── */
    .library-list-wrap {
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .library-group {
      margin-bottom: 0;
      background: var(--bg-white);
      border-radius: 16px;
      border: 1.5px solid var(--border-med);
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
      cursor: pointer;
      transition: box-shadow 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .library-group:active { opacity: 0.85; }
    @media (hover: hover) {
      .library-group:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.08); border-color: #CBD5E1; }
    }
    .library-billboard {
      position: relative;
      overflow: hidden;
      background: var(--text-1);
      padding: 18px 20px;
    }
    .library-billboard::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.08;
      background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28"><rect width="28" height="28" fill="none"/><rect x="0" y="0" width="14" height="14" fill="white" fill-opacity="0.15"/><rect x="14" y="14" width="14" height="14" fill="white" fill-opacity="0.15"/></svg>');
      background-size: 28px 28px;
    }
    .library-billboard-inner {
      position: relative;
      z-index: 2;
    }
    .library-billboard .library-pill {
      display: inline-block;
      font-family: 'Montserrat', sans-serif;
      font-size: 7px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 2px 7px;
      border-radius: 3px;
      background: var(--bg-white);
      color: var(--text-1);
      margin-bottom: 8px;
    }
    .library-title-name {
      font-family: 'Montserrat', sans-serif;
      font-size: 20px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      line-height: 1.1;
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      word-break: break-word;
      overflow-wrap: break-word;
    }
    .library-card-top {
      padding: 16px 20px 0;
    }
    .library-summary {
      font-size: 14px;
      font-weight: 500;
      font-style: italic;
      line-height: 1.65;
      color: var(--text-2);
      padding: 16px 20px 0;
      margin: 0;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .library-meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 24px;
      padding-bottom: 16px;
    }
    .library-meta-item {
      display: flex;
      align-items: flex-start;
      gap: 7px;
    }
    .library-meta-icon {
      flex-shrink: 0;
      margin-top: 2px;
      color: var(--violet);
    }
    .library-meta-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 8px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-3);
    }
    .library-meta-value {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      color: var(--text-1);
      margin-top: 1px;
    }
    .library-card-actions {
      padding: 0 20px 16px;
      display: flex;
      gap: 8px;
    }
    .library-details-btn {
      padding: 8px 16px;
      background: var(--violet);
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .library-details-btn:hover { opacity: 0.85; }
    .library-locations-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 8px 14px;
      background: rgba(139, 92, 246, 0.08);
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      color: var(--violet);
      cursor: pointer;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .library-locations-btn:hover { background: rgba(139, 92, 246, 0.14); }
    .library-locations-btn .chevron {
      font-size: 10px;
      transition: transform 0.2s;
    }
    .library-group.expanded .library-locations-btn .chevron { transform: rotate(180deg); }
    .library-meta-value .chevron {
      font-size: 10px;
      display: inline-block;
      transition: transform 0.2s;
      color: var(--violet);
    }
    .library-group.expanded .library-meta-value .chevron { transform: rotate(180deg); }
    .library-branches {
      display: none;
      flex-direction: column;
      gap: 0;
      border-top: 1px solid var(--border);
    }
    .library-group.expanded .library-branches { display: flex; }
    .library-branch {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .library-branch:first-child { border-top: none; }
    .library-branch-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
      min-width: 0;
    }
    .library-branch-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-1);
    }
    .library-branch-meta {
      font-size: 12px;
      color: var(--text-2);
    }
    .library-branch-btn {
      flex-shrink: 0;
      padding: 6px 12px;
      border: none;
      background: var(--violet);
      color: white;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .library-branch-btn:hover { opacity: 0.85; }

    /* ─────────────────────────────────────────────
       VENUES SECTION (Places Tab)
    ───────────────────────────────────────────── */
    .venues-list {
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    /* ── Venue card — billboard style (no logo) ── */
    .venue-card {
      background: var(--bg-white);
      border-radius: 16px;
      overflow: hidden;
      border: 1.5px solid var(--border-med);
      display: flex;
      flex-direction: column;
      color: inherit;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.04);
    }
    .venue-billboard {
      padding: 18px 20px 16px;
      background: linear-gradient(135deg, #F0FDFA 0%, #CCFBF1 100%);
      border-bottom: 1px solid rgba(13,148,136,0.12);
    }
    .venue-type-pill {
      display: inline-flex;
      align-items: center;
      padding: 3px 9px;
      border-radius: 20px;
      background: rgba(13,148,136,0.15);
      font-family: 'Montserrat', sans-serif;
      font-size: 8px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--teal);
    }
    .venue-name {
      font-family: 'Montserrat', sans-serif;
      font-size: 20px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      line-height: 1.1;
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-image: linear-gradient(to right, #0D9488, #0f766e);
      margin-top: 8px;
    }
    .venue-card-body {
      padding: 16px 20px 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .venue-meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 16px;
    }
    .venue-meta-item {
      display: flex;
      align-items: flex-start;
      gap: 7px;
    }
    .venue-meta-icon {
      flex-shrink: 0;
      margin-top: 2px;
      color: var(--teal);
    }
    .venue-meta-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 8px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-3);
    }
    .venue-meta-value {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      color: var(--text-1);
      margin-top: 1px;
    }
    .venue-meta-value.is-free { color: var(--free); }
    .venue-desc {
      font-size: 14px;
      font-weight: 500;
      font-style: italic;
      line-height: 1.6;
      color: var(--text-2);
      margin: 0;
    }
    .venue-footer-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: auto;
      padding-top: 4px;
    }
    .venue-visit-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 8px 14px;
      background: transparent;
      border: 1.5px solid var(--teal);
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      color: var(--teal);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .venue-visit-btn:hover { background: rgba(13, 148, 136, 0.06); }
    .venue-cta {
      display: inline-flex;
      align-items: center;
      padding: 8px 14px;
      background: var(--teal);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .venue-cta:hover { background: #0f766e; }
    .venue-events {
      display: none;
      flex-direction: column;
      background: var(--bg-yellow);
      border-top: 1px solid #FEE9AA;
    }
    .venue-card.expanded .venue-events { display: flex; }
    .venue-event-row {
      padding: 12px 16px;
      border-top: 1px solid #FEE9AA;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .venue-event-badge {
      display: inline-block;
      padding: 2px 6px;
      background: var(--teal);
      color: white;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      max-width: fit-content;
    }
    .venue-event-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-1);
    }
    .venue-event-desc {
      font-size: 12px;
      color: var(--text-2);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .venue-event-link {
      align-self: flex-start;
      font-size: 12px;
      font-weight: 600;
      color: var(--teal);
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .venue-event-link:hover { opacity: 0.7; }

    /* ─────────────────────────────────────────────
       LOADING & EMPTY STATES
    ───────────────────────────────────────────── */
    .spinner-wrap {
      display: flex;
      justify-content: center;
      padding: 80px 0;
    }
    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid var(--border-med);
      border-top-color: var(--flamingo);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 90px 20px;
    }
    .empty-icon { font-size: 38px; margin-bottom: 18px; }
    .empty-state h3 { font-size: 17px; font-weight: 700; color: var(--text-1); margin-bottom: 8px; }
    .empty-state p { font-size: 14px; color: var(--text-2); line-height: 1.6; }

    /* ─────────────────────────────────────────────
       FOOTER
    ───────────────────────────────────────────── */
    .footer {
      padding: 32px 0 12px;
      text-align: center;
    }
    .footer-text {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.35em;
      color: var(--yellow);
      font-style: italic;
    }

    /* ─────────────────────────────────────────────
       MODAL OVERLAY
    ───────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.26s ease;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal-sheet {
      background: var(--bg);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-height: 93dvh;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      overflow: hidden;
    }
    .modal-overlay.open .modal-sheet {
      transform: translateY(0);
    }
    @media (min-width: 640px) {
      .modal-overlay { align-items: center; }
      .modal-sheet {
        border-radius: 16px;
        max-width: 660px;
        width: calc(100% - 48px);
        max-height: 88dvh;
        transform: scale(0.94);
        opacity: 0;
        transition: transform 0.26s ease, opacity 0.26s ease;
      }
      .modal-overlay.open .modal-sheet {
        transform: scale(1);
        opacity: 1;
      }
    }
    .modal-handle {
      width: 36px;
      height: 4px;
      background: var(--border-med);
      border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0;
    }
    @media (min-width: 640px) { .modal-handle { display: none; } }
    .modal-topbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 10px 14px 0;
      flex-shrink: 0;
    }
    .modal-close {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: none;
      background: var(--border);
      color: var(--text-2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s;
    }
    .modal-close:hover { background: var(--border-med); color: var(--text-1); }
    .modal-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* Modal billboard hero */
    .m-billboard {
      width: 100%;
      position: relative;
      overflow: hidden;
      background: var(--text-1);
      padding: 24px 22px 20px;
    }
    .m-billboard::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.08;
      background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28"><rect width="28" height="28" fill="none"/><rect x="0" y="0" width="14" height="14" fill="white" fill-opacity="0.15"/><rect x="14" y="14" width="14" height="14" fill="white" fill-opacity="0.15"/></svg>');
      background-size: 28px 28px;
    }
    .m-billboard-inner { position: relative; z-index: 2; }
    .m-billboard-ghost {
      position: absolute;
      bottom: -10px;
      right: -10px;
      font-family: 'Montserrat', sans-serif;
      font-size: 72px;
      font-weight: 900;
      text-transform: uppercase;
      color: rgba(255,255,255,0.03);
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
      line-height: 1;
    }
    .m-date-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.4);
      margin-bottom: 8px;
    }
    .m-category {
      display: inline-block;
      font-family: 'Montserrat', sans-serif;
      font-size: 7px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 3px 8px;
      border-radius: 3px;
      background: var(--bg-white);
      color: var(--text-1);
      margin-bottom: 10px;
    }
    .m-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 28px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      line-height: 1.1;
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-image: linear-gradient(to right, var(--coral), var(--flamingo));
      word-break: break-word;
    }
    .m-organizer {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.4);
      margin-top: 6px;
    }

    /* Modal body */
    .m-body {
      padding: 20px 22px 24px;
    }
    .m-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
    }
    .m-meta-item {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-2);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .m-meta-sep {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--border-med);
    }
    .m-pill {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 5px;
    }
    .m-pill.free { background: var(--free-bg); color: var(--free); }
    .m-pill.paid { background: rgba(255,140,112,0.12); color: var(--coral); }

    .m-summary-wrap {
      border-top: 1px solid var(--border);
      padding-top: 16px;
      margin-bottom: 16px;
    }
    .m-summary {
      font-size: 15px;
      font-weight: 400;
      line-height: 1.75;
      color: var(--text-1);
      padding-left: 14px;
      border-left: 3px solid var(--flamingo);
    }
    .m-practical {
      font-size: 13px;
      line-height: 1.65;
      color: var(--text-2);
      margin-top: 12px;
      padding: 10px 13px;
      background: var(--bg-white);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .m-info {
      border: 1px solid var(--border-med);
      border-radius: 12px;
      overflow: hidden;
    }
    .m-info-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }
    .m-info-row:last-child { border-bottom: none; }
    .m-info-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; line-height: 1; }
    .m-info-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 8px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-3);
      margin-bottom: 2px;
    }
    .m-info-value {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-1);
      line-height: 1.35;
    }
    .m-info-value.accent { color: var(--flamingo); }
    .m-info-value.green { color: var(--free); }
    .m-info-sub {
      font-size: 12px;
      color: var(--text-3);
      margin-top: 1px;
    }

    /* Modal CTA bar */
    .modal-cta {
      flex-shrink: 0;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      display: none;
      align-items: center;
      gap: 8px;
    }
    .m-btn-primary {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 48px;
      background: var(--text-1);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .m-btn-primary:hover { opacity: 0.85; }
    .m-btn-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      background: var(--bg-white);
      border: 1.5px solid var(--border-med);
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
      text-decoration: none;
      color: var(--text-2);
      transition: border-color 0.12s, background 0.12s, color 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .m-btn-icon:hover { border-color: var(--text-1); color: var(--text-1); }
    .m-btn-icon.wa { color: #25D366; border-color: #25D366; }
    .m-btn-icon.wa:hover { background: #25D366; color: white; }

    /* ─────────────────────────────────────────────
       RESPONSIVE — Small screens
    ───────────────────────────────────────────── */
    @media (max-width: 480px) {
      .section-date { font-size: 30px; }
      .card-title { font-size: 22px; }
      .billboard-ghost { font-size: 56px; }
    }

    /* ─────────────────────────────────────────────
       RESPONSIVE — Desktop (960px+)
       Mobile layout is untouched. Everything below
       is additive, scoped to large viewports only.
    ───────────────────────────────────────────── */
    @media (min-width: 960px) {

      /* === LAYOUT WIDTH BUMP === */
      .header-inner,
      .tab-bar,
      .date-strip-inner,
      .age-filter-bar,
      .page {
        max-width: 960px;
      }

      /* === HEADER — taller, with inline tabs === */
      .header {
        height: auto;
        border-bottom: 3px solid var(--flamingo);
        transition: border-color 0.2s ease;
      }
      .header.tab-library { border-bottom-color: var(--violet); }
      .header.tab-places  { border-bottom-color: var(--teal); }
      .header-inner {
        height: 64px;
        padding: 0 32px;
      }
      .logo-name { font-size: 28px; }
      .logo-tag  { font-size: 9px; }

      /* Move tab-bar into header via visual positioning */
      .tab-bar-wrap {
        position: fixed;
        top: 0;
        right: 0;
        left: 0;
        z-index: 100;
        background: transparent;
        padding: 0;
        pointer-events: none;
      }
      .tab-accent-line { display: none; }
      .tab-bar {
        max-width: 960px;
        margin: 0 auto;
        justify-content: flex-end;
        padding: 0 32px;
        height: 64px;
        align-items: center;
        gap: 6px;
        pointer-events: auto;
      }
      .tab-btn {
        flex: 0 0 auto;
        flex-direction: row;
        border: 1.5px solid var(--border-med);
        border-radius: 10px;
        padding: 7px 16px;
        gap: 7px;
        background: var(--bg-white);
      }
      .tab-icon { font-size: 15px; }
      .tab-label {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.02em;
        white-space: nowrap;
      }
      /* Hide the <br> line-break on desktop (space char in HTML handles word gap) */
      .tab-label br { display: none; }
      .tab-badge {
        font-size: 11px;
        height: 20px;
        min-width: 24px;
        padding: 0 8px;
        border-radius: 10px;
      }
      /* Active pill states (override card-style) */
      .tab-btn[data-tab="events"].active  { border-color: var(--flamingo); }
      .tab-btn[data-tab="library"].active { border-color: var(--violet); }
      .tab-btn[data-tab="places"].active  { border-color: var(--teal); }

      /* === DATE STRIP — constrained === */
      .date-strip {
        top: 64px; /* header height on desktop */
        max-width: 960px;
        margin: 0 auto;
        border-radius: 0 0 12px 12px;
        border-left: 2px solid #FCD34D;
        border-right: 2px solid #FCD34D;
      }
      .date-strip-inner {
        max-width: 960px;
        padding: 0 24px;
      }
      .date-btn { width: 64px; }
      .date-btn .day-name { font-size: 10px; }
      .date-btn .day-num  { font-size: 22px; }
      .date-btn .day-count { font-size: 10px; }

      /* === AGE FILTER BAR (Library) === */
      .age-filter-bar {
        top: calc(64px + var(--date-h));
        max-width: 960px;

// Returns {lat, lng} for a library branch name, or null if not found
function _libCoords(venueName) {
  if (!venueName) return null;
  const lower = venueName.toLowerCase();
  for (const entry of LIBRARY_BRANCH_COORDS) {
    if (entry.keywords.some(kw => lower.includes(kw))) {
      return { lat: entry.lat, lng: entry.lng };
    }
  }
  return null;
}

// ─── TAB SWITCHING ────────────────────────────────────────────────
function switchTab(tab) {
  _activeTab = tab;
  _activeAgeFilter = 'all';
  updateTabUI();
  updateDateStripVisibility();
  updateAgeFilterVisibility();
  renderContent();
  updateTabUnderline();
  gtag('event', 'tab_switch', { tab_name: tab });
}

function updateTabUI() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === _activeTab);
  });
  const accentLine = document.getElementById('tab-accent-line');
  if (accentLine) accentLine.dataset.active = _activeTab;
  // Desktop: update header border color to match active tab
  const hdr = document.querySelector('.header');
  if (hdr) {
    hdr.classList.remove('tab-library', 'tab-places');
    if (_activeTab === 'library') hdr.classList.add('tab-library');
    else if (_activeTab === 'places') hdr.classList.add('tab-places');
  }
}

function updateDateStripVisibility() {
  const dateStrip = document.getElementById('date-strip');
  if (_activeTab === 'places') {
    dateStrip.classList.add('hidden');
  } else {
    dateStrip.classList.remove('hidden');
    dateStrip.dataset.tab = _activeTab;
  }
}

function updateAgeFilterVisibility() {
  const ageBar = document.getElementById('age-filter-bar');
  if (_activeTab === 'library') {
    ageBar.classList.add('visible');
  } else {
    ageBar.classList.remove('visible');
  }
  resetAgeFilter();
  resetHoodFilter();
}

function updateTabUnderline() {
  // Active state is now handled purely via CSS box-shadow on .tab-btn.active
  // This function updates sticky position CSS vars based on measured heights
  const isDesktop = window.innerWidth >= 960;
  if (isDesktop) {
    // On desktop, tabs are inside the header — no extra height offset
    document.documentElement.style.setProperty('--tab-h', '0px');
    document.documentElement.style.setProperty('--header-h', '64px');
  } else {
    document.documentElement.style.setProperty('--header-h', '68px');
    const tabWrap = document.getElementById('tab-bar-wrap');
    if (tabWrap) {
      const tabH = tabWrap.offsetHeight;
      document.documentElement.style.setProperty('--tab-h', tabH + 'px');
    }
  }
}

  _activeAgeFilter = 'all';

    chip.classList.toggle('active', chip.dataset.age === 'all');
  });
}

// ─── NEIGHBORHOOD FILTER ─────────────────────────────────────────
function getLibraryHoodsForDay() {
  // Get all library events across all dates, filtered by current age filter
  let allLib = _allEvents.filter(ev => ev.source === 'miami_dade_libraries');
  if (_activeAgeFilter !== 'all') {
    allLib = allLib.filter(ev => matchesAgeFilter(ev, _activeAgeFilter));
  }
  // Count events per neighborhood
  const hoodCounts = {};
  allLib.forEach(ev => {
    const hood = ev.neighborhood ? titleCase(ev.neighborhood) : '';
    if (!hood) return;
    hoodCounts[hood] = (hoodCounts[hood] || 0) + 1;
  });
  // Sort alphabetically
  return Object.entries(hoodCounts).sort((a, b) => a[0].localeCompare(b[0]));
}

function toggleHoodDropdown() {
  const overlay = document.getElementById('hood-overlay');
  if (overlay.classList.contains('open')) {
    closeHoodDropdown();
    return;
  }
  // Build options list
  const hoods = getLibraryHoodsForDay();
  const list = document.getElementById('hood-list');
  if (hoods.length === 0) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-3)">No neighborhoods available for this day.</div>';
  } else {
    const checkSvg = `<svg class="hood-checkbox-check" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    list.innerHTML = hoods.map(([hood, count]) => {
      const sel = _activeHoods.has(hood) ? ' selected' : '';
      return `<div class="hood-option${sel}" data-hood="${esc(hood)}" onclick="toggleHoodOption(this)">
        <div class="hood-checkbox">${checkSvg}</div>
        <span class="hood-option-label">${esc(hood)}</span>
        <span class="hood-option-count">${count}</span>
      </div>`;
    }).join('');
  }
  overlay.classList.add('open');
}

function closeHoodDropdown() {
  document.getElementById('hood-overlay').classList.remove('open');
}

function toggleHoodOption(el) {
  const hood = el.dataset.hood;
  el.classList.toggle('selected');
  if (_activeHoods.has(hood)) {
    _activeHoods.delete(hood);
  } else {
    _activeHoods.add(hood);
  }
  updateHoodPill();
  renderContent();
  gtag('event', 'neighborhood_filter', { neighborhood: hood, active_count: _activeHoods.size });
}

function clearHoodFilter() {
  _activeHoods.clear();
  document.querySelectorAll('.hood-option').forEach(el => el.classList.remove('selected'));
  updateHoodPill();
  renderContent();
}

function updateHoodPill() {
  const pill = document.getElementById('hood-pill');
  if (_activeHoods.size === 0) {
    pill.textContent = '📍 All Areas';
    pill.classList.remove('filtered');
  } else {
    const label = _activeHoods.size === 1
      ? `📍 ${[..._activeHoods][0]}`
      : `📍 Areas`;
    pill.innerHTML = `${label} <span class="hood-count">${_activeHoods.size}</span>`;
    pill.classList.add('filtered');
  }
}

function resetHoodFilter() {
  _activeHoods.clear();
  updateHoodPill();
}

// ─── DATE STRIP ──────────────────────────────────────────────────
function buildDateStrip() {
  const inner = document.getElementById('date-strip-inner');
  const today = new Date();
  const dayNames = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  let html = '';
  for (let i = 0; i < 14; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    const key = toDateKey(d);
    const dn = dayNames[d.getDay()];
    const num = String(d.getDate()).padStart(2, '0');
    html += `<button class="date-btn" data-date="${key}" onclick="selectDate('${key}')">
      <span class="day-name">${dn}</span>
      <span class="day-num">${num}</span>
      <span class="day-dot"></span>
      <span class="day-count" data-date="${key}"></span>
    </button>`;

}

function updateDateStripCounts() {
  // Count events per day based on active tab + filters
  const isLibrary = _activeTab === 'library';
  let events;
  if (isLibrary) {
    events = _allEvents.filter(ev => ev.source === 'miami_dade_libraries');
    if (_activeAgeFilter !== 'all') {
      events = events.filter(ev => matchesAgeFilter(ev, _activeAgeFilter));
    }
    if (_activeHoods.size > 0) {
      events = events.filter(ev => {
        const hood = ev.neighborhood ? titleCase(ev.neighborhood) : '';
        return _activeHoods.has(hood);
      });
    }
  } else {
    events = _allEvents.filter(ev => ev.source !== 'miami_dade_libraries');
  }
  // Build count map
  const countMap = {};
  for (const ev of events) {
    const key = toDateKey(new Date(ev.start_date));
    countMap[key] = (countMap[key] || 0) + 1;
  }
  // Update DOM
  document.querySelectorAll('.day-count').forEach(el => {
    const key = el.dataset.date;
    const count = countMap[key] || 0;
    if (count > 0) {
      el.textContent = `(${count})`;
      el.classList.add('has-events');
    } else {
      el.textContent = '';
      el.classList.remove('has-events');
    }
  });
}

let _scrollObserver = null;
let _ignoreScrollUpdate = false;

function selectDate(key, fromScroll) {
  _activeDate = key;
  document.querySelectorAll('.date-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.date === key);
  });
  const activeBtn = document.querySelector(`.date-btn[data-date="${key}"]`);
  if (activeBtn) activeBtn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });

  if (!fromScroll) {
    // User tapped a date — scroll to that section instead of re-rendering
    const section = document.getElementById(`section-${key}`);
    if (section) {
      _ignoreScrollUpdate = true;
      const stickyOffset = _getStickyOffset();
      const top = section.getBoundingClientRect().top + window.scrollY - stickyOffset;
      window.scrollTo({ top, behavior: 'smooth' });
      setTimeout(() => { _ignoreScrollUpdate = false; }, 800);
    } else {
      // Section doesn't exist (no events that day) — re-render won't help, just scroll top
      renderContent();
    }
    gtag('event', 'date_select', { date: key, tab: _activeTab });
  }
}

function _getStickyOffset() {
  // Calculate total sticky header height so scroll-to-section lands just below all fixed/sticky bars
  const dateH = document.getElementById('date-strip')?.offsetHeight || 72;
  const ageBar = document.getElementById('age-filter-bar');
  const ageH = (ageBar && ageBar.classList.contains('visible')) ? ageBar.offsetHeight : 0;
  if (window.innerWidth >= 960) {
    // Desktop: header (64px) + flamingo border (3px) + location bar (48px) + date strip
    const locH = document.getElementById('location-bar')?.offsetHeight || 48;
    return 67 + locH + dateH + ageH + 8;
  }
  // Mobile: header + tab bar wrap + date strip
  const headerH = 68;
  const tabH = document.getElementById('tab-bar-wrap')?.offsetHeight || 68;
  return headerH + tabH + dateH + ageH + 8;
}

function _setupScrollObserver() {
  if (_scrollObserver) _scrollObserver.disconnect();

  const sections = document.querySelectorAll('.section-header[data-date]');
  if (sections.length === 0) return;

  const offset = _getStickyOffset();
  _scrollObserver = new IntersectionObserver((entries) => {
    if (_ignoreScrollUpdate) return;
    // Find the topmost visible section header
    let topEntry = null;
    for (const entry of entries) {
      if (entry.isIntersecting) {
        if (!topEntry || entry.boundingClientRect.top < topEntry.boundingClientRect.top) {
          topEntry = entry;
        }
      }
    }
    if (topEntry) {
      const dateKey = topEntry.target.dataset.date;
      if (dateKey && dateKey !== _activeDate) {
        selectDate(dateKey, true);
      }
    }
  }, {
    rootMargin: `-${offset}px 0px -60% 0px`,
    threshold: 0
  });

  sections.forEach(s => _scrollObserver.observe(s));
}

function _getDateKeys() {
  const today = new Date();
  const keys = [];
  for (let i = 0; i < 14; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    keys.push(toDateKey(d));
  }
  return keys;
}

function jumpToDate(val) {
  if (!val) return;
  const btn = document.querySelector(`.date-btn[data-date="${val}"]`);
  if (btn) selectDate(val);
}

// ─── LOAD ─────────────────────────────────────────────────────────
async function loadEvents() {
  const { data, error } = await db
    .from('events')
    .select('id, title, editorial_headline, description, parent_summary, start_date, end_date, age_min, age_max, image_url, venue_name, neighborhood, is_free, price_min, price_max, source, activity_type, address, source_url, practical_notes, lat, lng')
    .eq('is_canceled', false)
    .eq('is_kid_friendly', true)
    .gte('start_date', new Date().toISOString().slice(0, 10))
    .order('start_date', { ascending: true })
    .limit(400);

  if (error) { showError(error.message); return; }
  // Defense-in-depth: filter out teen/adult events client-side
  // even if they slipped through backend is_kid_friendly checks
  // Current time in Eastern (handles EST/EDT automatically)
  const nowET = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/New_York' }));

  _allEvents = (data || []).filter(ev => {
    const ageMin = ev.age_min;
    const ageMax = ev.age_max;
    // Skip events where age_min >= 13 and no young-kid overlap
    if (ageMin != null && ageMin >= 13 && (ageMax == null || ageMax >= 13)) return false;
    // Hide events whose end time (or start time) has already passed in ET
    const endStr = ev.end_date || ev.start_date;
    if (endStr) {
      const endET = new Date(new Date(endStr).toLocaleString('en-US', { timeZone: 'America/New_York' }));
      if (endET < nowET) return false;
    }
    return true;
  });
  buildDateStrip();
  // After 6PM, default to tomorrow — library/kid events are done for the day
  const now = new Date();
  const defaultDate = now.getHours() >= 18
    ? new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1)
    : now;
  const defaultKey = toDateKey(defaultDate);
  _activeDate = defaultKey;
  // Render content first (continuous scroll), then highlight and scroll to default date
  renderContent();
  updateAllBadges();
  // Highlight the default date in the strip
  document.querySelectorAll('.date-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.date === defaultKey);
  });
  // Scroll to the default date section after a tick (DOM needs to settle)
  setTimeout(() => {
    const section = document.getElementById(`section-${defaultKey}`);
    if (section) {
      const stickyOffset = _getStickyOffset();
      const top = section.getBoundingClientRect().top + window.scrollY - stickyOffset;
      window.scrollTo({ top: Math.max(0, top), behavior: 'auto' });
    }
    updateTabUnderline();
  }, 100);
}

function updateAllBadges() {
  const localEvents = _allEvents.filter(ev => ev.source !== 'miami_dade_libraries');
  const libraryEvents = _allEvents.filter(ev => ev.source === 'miami_dade_libraries');
  const localGroups = groupByProgram(localEvents);
  const libGroups = groupByProgram(libraryEvents);
  updateTabBadge('events', localGroups.length);
  updateTabBadge('library', libGroups.length);
  updateTabBadge('places', 15);
}

function renderContent() {
  if (_activeTab === 'events') {
    renderLocalEvents();
  } else if (_activeTab === 'library') {
    renderLibraryPrograms();
  } else if (_activeTab === 'places') {
    renderPlaces();
  }
  updateDateStripCounts();
}

function renderLocalEvents() {
  const content = document.getElementById('content');
  const allLocal = _allEvents.filter(ev => ev.source !== 'miami_dade_libraries');

  // Group events by date
  const dateKeys = _getDateKeys();
  let html = '';
  let totalEvents = 0;
  let cardIdx = 0;

  for (const key of dateKeys) {
    const dayEvents = allLocal.filter(ev => toDateKey(new Date(ev.start_date)) === key);
    if (dayEvents.length === 0) continue;

    const dateObj = parseDateKey(key);
    const label = fmtDisplayDate(dateObj);
    const programGroups = groupByProgram(dayEvents);

    // Sort groups by distance to user if location is set
    if (_userLat !== null && _userLng !== null) {
      programGroups.sort((a, b) => {
        const dist = (g) => {
          const e = g[0];
          if (e.lat == null || e.lng == null) return Infinity;
          return haversine(_userLat, _userLng, e.lat, e.lng);
        };
        return dist(a) - dist(b);
      });
    }

    totalEvents += programGroups.length;

    html += `
      <div class="section-header" data-date="${key}" id="section-${key}">
        <div class="section-header-left">
          <div class="section-date display">${esc(label)}</div>
          <div class="section-bar"></div>
          <div class="section-count">${programGroups.length} event${programGroups.length !== 1 ? 's' : ''}</div>
        </div>
      </div>
      <div class="events-list">`;
    programGroups.forEach((group) => { html += eventCard(group, cardIdx++); });
    html += `</div>`;
  }

  if (totalEvents === 0) {
    html = `
      <div class="section-header">
        <div class="section-header-left">
          <div class="section-date display">Coming Up</div>
          <div class="section-bar"></div>
        </div>
      </div>
      <div class="empty-state">
        <div class="empty-icon">🌴</div>
        <h3>Nothing listed yet</h3>
        <p>No events coming up — check back soon.</p>
      </div>`;
  }

  html += `<div class="footer"><span class="footer-text display">Your EZPZ Miami Play &mdash; Book</span></div>`;
  content.innerHTML = html;
  updateTabBadge('events', totalEvents);
  window.scrollTo({ top: 0, behavior: 'auto' });
  _setupScrollObserver();
}

function renderLibraryPrograms() {
  _libGradIdx = 0; // reset gradient rotation
  const content = document.getElementById('content');

  // Get all library events with filters applied
  let allLibrary = _allEvents.filter(ev => ev.source === 'miami_dade_libraries');
  if (_activeAgeFilter !== 'all') {
    allLibrary = allLibrary.filter(ev => matchesAgeFilter(ev, _activeAgeFilter));
  }
  if (_activeHoods.size > 0) {
    allLibrary = allLibrary.filter(ev => {
      const hood = ev.neighborhood ? titleCase(ev.neighborhood) : '';
      return _activeHoods.has(hood);
    });
  }

  const dateKeys = _getDateKeys();
  let html = '';
  let totalPrograms = 0;

  for (const key of dateKeys) {
    const dayEvents = allLibrary.filter(ev => toDateKey(new Date(ev.start_date)) === key);
    if (dayEvents.length === 0) continue;

    const dateObj = parseDateKey(key);
    const label = fmtDisplayDate(dateObj);
    const programGroups = groupByProgram(dayEvents);
    // Sort by distance to nearest branch when user location is set
    if (_userLat !== null) {
      const _groupMinDist = (group) => {
        let best = Infinity;
        for (const ev of group) {
          const c = _libCoords(ev.venue_name || ev.neighborhood || '');
          if (!c) continue;
          const d = haversine(_userLat, _userLng, c.lat, c.lng);
          if (d < best) best = d;
        }
        return best;
      };
      programGroups.sort((a, b) => _groupMinDist(a) - _groupMinDist(b));
    }
    totalPrograms += programGroups.length;

    html += `
      <div class="section-header" data-date="${key}" id="section-${key}">
        <div class="section-header-left">
          <div class="section-date display">${esc(label)}</div>
          <div class="section-bar violet"></div>

        </div>

      <div class="library-list-wrap">`;

  if (totalPrograms === 0) {
    const filterNote = _activeHoods.size > 0 ? ' or neighborhood' : '';
    html = `
      <div class="section-header">
        <div class="section-header-left">
          <div class="section-date display">Coming Up</div>
          <div class="section-bar violet"></div>
        </div>
      </div>
      <div class="empty-state">
        <div class="empty-icon">📚</div>
        <h3>No programs found</h3>
        <p>No library programs match your filter — try another age group${filterNote}.</p>
      </div>`;
  }

  html += `<div class="footer"><span class="footer-text display">Your EZPZ Miami Play &mdash; Book</span></div>`;
  content.innerHTML = html;
  updateTabBadge('library', totalPrograms);
  window.scrollTo({ top: 0, behavior: 'auto' });
  _setupScrollObserver();

  // Attach expand handlers (multi-branch cards — click card to toggle)
  document.querySelectorAll('.expandable-card').forEach(card => {
    card.onclick = (e) => {
      if (e.target.closest('.library-branch-btn')) return;
      card.classList.toggle('expanded');
    };
  });
}

const LIB_GRADIENTS = [
  'linear-gradient(to right, #8B5CF6, #EC4899)',
  'linear-gradient(to right, #EC4899, #F59E0B)',
  'linear-gradient(to right, #6366F1, #8B5CF6)',
  'linear-gradient(to right, #F59E0B, #EC4899)',
];
let _libGradIdx = 0;

function renderLibraryGroup(group) {
  const title = groupTitle(group);
  const ageLbl = groupAgeLabel(group);
  const gradient = LIB_GRADIENTS[_libGradIdx++ % LIB_GRADIENTS.length];

  // SVG icon templates (matching Local Events style)
  const iconClock = `<svg class="library-meta-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
  const iconPin = `<svg class="library-meta-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
  const iconTag = `<svg class="library-meta-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>`;
  const iconUser = `<svg class="library-meta-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;

  // Build branch map
  const branchMap = new Map();
  for (const ev of group) {
    const venue = ev.venue_name || ev.neighborhood || 'Unknown';
    if (!branchMap.has(venue)) branchMap.set(venue, []);
    branchMap.get(venue).push(ev);
  }

  const isSingle = branchMap.size === 1;
  const firstEvents = [...branchMap.values()][0];
  const firstVenue = [...branchMap.keys()][0];
  const firstTime = fmtTimeRange(firstEvents[0].start_date, firstEvents[0].end_date);
  const firstHood = firstEvents[0].neighborhood ? titleCase(firstEvents[0].neighborhood) : '';

  if (isSingle) {
    // ── Single branch: clickable card with billboard + summary + meta grid ──
    const summary = firstEvents[0].parent_summary || firstEvents[0].description || '';
    const singleCoords = _libCoords(firstVenue);
    const distPillSingle = singleCoords ? _distPill(singleCoords.lat, singleCoords.lng) : '';
    return `
      <div class="library-group" onclick="openModal('${esc(firstEvents[0].id)}')">
        <div class="library-billboard">
          <div class="library-billboard-inner">
            <div class="billboard-top-row">
              <span class="library-pill">Library Program</span>
              ${distPillSingle}
            </div>
            <div class="library-title-name" style="background-image: ${gradient}">${esc(title)}</div>
          </div>
        </div>
        ${summary ? `<p class="library-summary">"${esc(summary)}"</p>` : ''}
        <div class="library-card-top">
          <div class="library-meta-grid">
            <div class="library-meta-item">
              ${iconClock}
              <div><div class="library-meta-label">Time</div><div class="library-meta-value">${firstTime || 'See details'}</div></div>
            </div>
            <div class="library-meta-item">
              ${iconPin}
              <div><div class="library-meta-label">Branch</div><div class="library-meta-value">${esc(firstHood || firstVenue)}</div></div>
            </div>
            <div class="library-meta-item">
              ${iconTag}
              <div><div class="library-meta-label">Price</div><div class="library-meta-value" style="color: var(--free)">Free</div></div>
            </div>
            <div class="library-meta-item">
              ${iconUser}
              <div><div class="library-meta-label">Ages</div><div class="library-meta-value">${esc(ageLbl)}</div></div>
            </div>
          </div>
        </div>
      </div>`;
  }

  // ── Multiple branches: clickable card with billboard + summary + meta grid + expanding rows ──
  const multiSummary = group[0].parent_summary || group[0].description || '';
  // Closest branch distance (via LIBRARY_BRANCH_COORDS lookup — library events have no lat/lng in DB)
  let distPillMulti = '';
  if (_userLat !== null) {
    let bestDist = Infinity, bestCoords = null;
    for (const [venue] of branchMap) {
      const c = _libCoords(venue);
      if (!c) continue;
      const d = haversine(_userLat, _userLng, c.lat, c.lng);
      if (d < bestDist) { bestDist = d; bestCoords = c; }
    }
    if (bestCoords) distPillMulti = _distPill(bestCoords.lat, bestCoords.lng);
  }
  let html = `
    <div class="library-group expandable-card">
      <div class="library-billboard">
        <div class="library-billboard-inner">
          <div class="billboard-top-row">
            <span class="library-pill">Library Program</span>
            ${distPillMulti}
          </div>
          <div class="library-title-name" style="background-image: ${gradient}">${esc(title)}</div>
        </div>
      </div>
      ${multiSummary ? `<p class="library-summary">"${esc(multiSummary)}"</p>` : ''}
      <div class="library-card-top">
        <div class="library-meta-grid">
          <div class="library-meta-item">
            ${iconClock}
            <div><div class="library-meta-label">Time</div><div class="library-meta-value">${firstTime || 'Varies'}</div></div>
          </div>
          <div class="library-meta-item">
            ${iconPin}
            <div><div class="library-meta-label">Branches</div><div class="library-meta-value">${branchMap.size} Locations <span class="chevron">▾</span></div></div>
          </div>
          <div class="library-meta-item">
            ${iconTag}
            <div><div class="library-meta-label">Price</div><div class="library-meta-value" style="color: var(--free)">Free</div></div>
          </div>
          <div class="library-meta-item">
            ${iconUser}
            <div><div class="library-meta-label">Ages</div><div class="library-meta-value">${esc(ageLbl)}</div></div>
          </div>
        </div>
      </div>
      <div class="library-branches">`;

  // Sort branches by distance when user location is set
  let branchEntries = [...branchMap.entries()];
  if (_userLat !== null) {
    branchEntries.sort(([venueA], [venueB]) => {
      const ca = _libCoords(venueA), cb = _libCoords(venueB);
      const da = ca ? haversine(_userLat, _userLng, ca.lat, ca.lng) : Infinity;
      const db = cb ? haversine(_userLat, _userLng, cb.lat, cb.lng) : Infinity;
      return da - db;
    });
  }

  for (const [venue, events] of branchEntries) {
    const time = fmtTimeRange(events[0].start_date, events[0].end_date);
    const hood = events[0].neighborhood ? titleCase(events[0].neighborhood) : '';
    const bc = _libCoords(venue);
    const branchDist = (bc && _userLat !== null)
      ? ` · <span style="color:var(--teal);font-weight:700">📍 ${fmtDistance(haversine(_userLat, _userLng, bc.lat, bc.lng))}</span>`
      : '';
    html += `
      <div class="library-branch">
        <div class="library-branch-info">
          <div class="library-branch-name">${esc(venue)}</div>
          <div class="library-branch-meta">${time}${hood ? ' · ' + esc(hood) : ''}${branchDist}</div>
        </div>
        <button class="library-branch-btn" onclick="event.stopPropagation(); openModal('${esc(events[0].id)}')">Details</button>
      </div>`;
  }

  html += `</div></div>`;
  return html;
}

          </div>

          </div>
        </div>
        ${venue.desc ? `<p class="venue-desc">"${esc(venue.desc)}"</p>` : ''}
        <div class="venue-footer-actions">

          ${venueEvents.length > 0 ? `<button class="venue-cta">View ${venueEvents.length} upcoming event${venueEvents.length !== 1 ? 's' : ''}</button>` : ''}

      </div>`;

  if (venueEvents.length > 0) {
    html += `<div class="venue-events">`;
    venueEvents.slice(0, 10).forEach(ev => {
      const date = fmtDisplayDate(parseDateKey(toDateKey(new Date(ev.start_date))));

  html += `</div>`;

}

// ─── MODAL ────────────────────────────────────────────────────────
function openModal(id, e) {
  if (e) {
    if (e.metaKey || e.ctrlKey || e.shiftKey || e.button === 1) return;
    e.preventDefault();
  }
  history.pushState({ modalId: id }, '', '?id=' + id);
  _showModal(id);
  gtag('event', 'event_card_click', { event_id: id, tab: _activeTab });
}

function _showModal(id) {
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('modal-content').innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';
  document.getElementById('modal-cta').style.display = 'none';
  fetchAndRenderModal(id);
}

function closeModal() {
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.remove('open');
  setTimeout(() => { document.body.style.overflow = ''; }, 300);
  if (history.state && history.state.modalId) {
    history.pushState({}, '', location.pathname);
  }
}

function onOverlayClick(e) {
  if (e.target === e.currentTarget) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

window.addEventListener('popstate', e => {
  const overlay = document.getElementById('modal-overlay');
  if (e.state && e.state.modalId) {
    _showModal(e.state.modalId);
  } else if (overlay.classList.contains('open')) {
    overlay.classList.remove('open');
    setTimeout(() => { document.body.style.overflow = ''; }, 300);
  }
});

async function fetchAndRenderModal(id) {
  const { data, error } = await db.from('events').select('*').eq('id', id).single();
  if (error || !data) {
    document.getElementById('modal-content').innerHTML =
      '<div class="m-body"><p style="color:var(--text-2);padding:16px 0">Event not found.</p></div>';
    return;
  }

  _modalEvent = data;
  document.getElementById('modal-content').innerHTML = renderModal(data);

  const ctaLink = document.getElementById('modal-cta-link');
  if (data.source_url) {
    ctaLink.href = data.source_url;
    ctaLink.textContent = data.is_free ? 'Register / RSVP' : 'View & Get Tickets';
    ctaLink.style.display = 'flex';
    ctaLink.onclick = function() {
      gtag('event', 'ticket_click', {
        event_title: data.editorial_headline || data.title,
        event_source: data.source,
        is_free: data.is_free,
        venue: data.venue_name || '',
        page: 'listing'
      });
    };
  } else {
    ctaLink.style.display = 'none';
  }

  const mapsBtn = document.getElementById('modal-maps-btn');
  const mq = data.address
    ? data.address
    : (data.venue_name ? data.venue_name + ', Miami, FL' : '');
  if (mq) {
    mapsBtn.href = 'https://maps.google.com/?q=' + encodeURIComponent(mq);
    mapsBtn.style.display = 'flex';
    mapsBtn.onclick = function() {
      gtag('event', 'maps_click', { event_title: data.editorial_headline || data.title, venue: data.venue_name || '', page: 'listing' });
    };
  } else {
    mapsBtn.style.display = 'none';
  }

  document.getElementById('modal-cta').style.display = 'flex';
  document.getElementById('modal-content').scrollTop = 0;
}

  infoRows.push(`<div class="m-info-row"><span class="m-info-icon">💵</span><div><div class="m-info-label">Cost</div><div class="m-info-value ${ev.is_free ? 'green' : ''}">${esc(mPriceStr(ev))}</div></div></div>`);
