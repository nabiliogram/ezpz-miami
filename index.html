// ─── HELPERS ──────────────────────────────────────────────────────

function toDateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function parseDateKey(key) {
  const [y, m, d] = key.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function fmtDisplayDate(d) {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[d.getMonth()]} ${d.getDate()}`;
}
function titleCase(str) {
  if (!str) return str;
  return str.replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
}
function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const h = d.getUTCHours(), m = d.getUTCMinutes();
  if (h === 0 && m === 0) return '';
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  const mm = m === 0 ? '' : `:${String(m).padStart(2, '0')}`;
  return `${h12}${mm} ${ampm}`;
}
function fmtTimeRange(start, end) {
  const s = fmtTime(start);
  if (!s) return '';
  const e = fmtTime(end);
  if (!e) return s;
  return `${s} – ${e}`;
}
function fmtFullDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${days[d.getUTCDay()]}, ${months[d.getUTCMonth()]} ${d.getUTCDate()}, ${d.getUTCFullYear()}`;
}
function priceLabel(ev) {
  if (ev.is_free) return 'Free';
  if (ev.price_min != null) {
    const lo = ev.price_min, hi = ev.price_max;
    return (lo === hi || hi == null) ? `$${lo}` : `$${lo}–$${hi}`;
  }
  return 'See event';
}
function mPriceStr(ev) {
  if (ev.is_free) return 'Free';
  if (ev.price_min != null && ev.price_max != null && ev.price_min === ev.price_max) return `$${ev.price_min}`;
  if (ev.price_min != null && ev.price_max != null) return `$${ev.price_min}–$${ev.price_max}`;
  if (ev.price_min != null) return `From $${ev.price_min}`;
  return 'See event page';
}
function ageLabel(min, max) {
  if (min == null && max == null) return 'All ages';
  if (min == null) min = 0;
  if (min === max) max = null;
  if (min === 0 && (max == null || max >= 12)) return 'All ages';
  if (max == null) return `${min}+`;
  if (min === 0) return `0–${max}`;
  return `${min}–${max}`;
}
function mAgeLabel(min, max) {
  if (min == null && max == null) return 'All ages welcome';
  if (min == null) min = 0;
  if (min === max) max = null;
  if (min === 0 && (max == null || max >= 12)) return 'All ages welcome';
  if (max == null) return `Ages ${min}+`;
  return `Ages ${min}–${max}`;
}
function groupAgeLabel(group) {
  const keys = new Set(group.map(e => `${e.age_min ?? ''}-${e.age_max ?? ''}`));
  if (keys.size === 1) return ageLabel(group[0].age_min, group[0].age_max);
  return 'Multiple ages';
}
function pickGradient(activityType) {
  const map = {
    'craft': GRADIENTS[0], 'workshop': GRADIENTS[0],
    'performance': GRADIENTS[1], 'storytime': GRADIENTS[1], 'music': GRADIENTS[1],
    'outdoor': GRADIENTS[2], 'sports': GRADIENTS[2], 'festival': GRADIENTS[2],
  };
  return map[(activityType || '').toLowerCase()] || GRADIENTS[0];
}
function renderNotes(notes) {
  if (!notes) return '';
  try {
    const parsed = JSON.parse(notes);
    if (Array.isArray(parsed)) return parsed.map(item => esc(item)).join('<br>');
  } catch (e) {}
  return esc(notes);
}
function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function showError(msg) {
  document.getElementById('content').innerHTML = `
    <div class="empty-state"><div class="empty-icon">⚠️</div>
    <h3>Could not load events</h3><p>${esc(msg)}</p></div>`;
}

// ─── PROGRAM GROUPING ─────────────────────────────────────────────
function familyMatch(title) {
  for (const f of PROGRAM_FAMILIES) { if (f.pattern.test(title)) return f; }
  return null;
}
function programKey(title) {
  const fam = familyMatch(title);
  if (fam) return fam.key;
  return title.toLowerCase()
    .replace(/^online event:\s*/i, '').replace(/^new[!\s]+/i, '')
    .replace(/\s*for\s+(babies|toddlers|preschoolers|infants|teens|tweens|kids|children|families|all ages)(\s+and\s+(caregivers|adults))?(\s+en dos idiomas.*)?$/i, '')
    .replace(/\s+en dos idiomas.*$/i, '').replace(/\s+y\s+m[aá]s.*$/i, '')
    .replace(/[^a-z0-9 ]/g, ' ').replace(/\s+/g, ' ').trim();
}
function groupByProgram(events) {
  const map = new Map();
  for (const ev of events) { const key = programKey(ev.title); if (!map.has(key)) map.set(key, []); map.get(key).push(ev); }
  return [...map.values()];
}
function groupTitle(group) {
  const fam = familyMatch(group[0].title);
  if (fam) return fam.label;
  return cleanProgramTitle(group[0].title);
}
function cleanProgramTitle(title) {
  if (!title) return '';
  return title
    .replace(/^Online Event:\s*/i, '').replace(/^New[!\s]+/i, '')
    .replace(/\s*for\s+(Babies|Toddlers|Preschoolers|Infants|Teens|Tweens|Kids|Children|Families|All Ages)(\s+and\s+(Caregivers|Adults))?(\s+en dos idiomas.*)?$/i, '')
    .replace(/\s+en dos idiomas.*$/i, '').replace(/\s+y\s+m[aá]s.*$/i, '').trim();
}
function neutralSummary(group) {
  const ageWords = /\btoddler|\bpreschooler|\bbabies?\b|\binfant|\bteen|\btween|\byour\s+\d/i;
  const withSummary = group.filter(e => e.parent_summary);
  if (!withSummary.length) return group[0].description || '';
  const neutral = withSummary.find(e => !ageWords.test(e.parent_summary));
  return (neutral || withSummary[0]).parent_summary;
}
function groupLocation(group) {
  const hoods = new Set(group.map(e => e.neighborhood || ''));
  if (hoods.size === 1 && [...hoods][0]) return titleCase([...hoods][0]);
  const venues = new Set(group.map(e => e.venue_name || ''));
  if (venues.size === 1 && [...venues][0]) return [...venues][0];
  return 'Multiple locations';
}

function matchesAgeFilter(ev, filter) {
  const min = ev.age_min || 0;
  const max = ev.age_max || 18;
  switch (filter) {
    case 'baby': return min <= 1 && max >= 0;
    case 'toddler': return min <= 3 && max >= 1;
    case 'prek': return min <= 5 && max >= 3;
    case 'school': return min <= 12 && max >= 6;
    default: return true;
  }
}

// ─── LOCATION ─────────────────────────────────────────────────────
function haversine(lat1, lng1, lat2, lng2) {
  const R = 3958.8; // Earth radius in miles
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
    Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function fmtDistance(miles) {
  if (miles < 0.5) return '< 0.5 mi';
  if (miles < 10)  return miles.toFixed(1) + ' mi';
  return Math.round(miles) + ' mi';
}

function _distPill(lat, lng) {
  if (_userLat === null || _userLng === null || lat == null || lng == null) return '';
  const d = haversine(_userLat, _userLng, lat, lng);
  return `<span class="card-distance-pill">📍 ${fmtDistance(d)}</span>`;
}

function showLocState(state) {
  // Mobile elements
  const mDefault = document.getElementById('hloc-default');
  const mInput   = document.getElementById('hloc-input');
  const mSet     = document.getElementById('hloc-set');
  // Desktop elements
  const dInvite  = document.getElementById('dloc-invite');
  const dInput   = document.getElementById('dloc-input');
  const dSet     = document.getElementById('dloc-set');

  if (mDefault) mDefault.style.display = state === 'default' ? 'flex' : 'none';
  if (mInput)   mInput.style.display   = state === 'input'   ? 'flex' : 'none';
  if (mSet)     mSet.style.display     = state === 'set'     ? 'flex' : 'none';
  if (dInvite)  dInvite.style.display  = state === 'default' ? 'flex' : 'none';
  if (dInput)   dInput.style.display   = state === 'input'   ? 'flex' : 'none';
  if (dSet)     dSet.style.display     = state === 'set'     ? 'flex' : 'none';
}

function _updateLocBadges(zip, label) {
  const text = label ? `📍 ${zip} · ${label}` : `📍 ${zip}`;
  const mBadge = document.getElementById('hloc-badge-text');
  const dBadge = document.getElementById('dloc-badge-text');
  if (mBadge) mBadge.textContent = text;
  if (dBadge) dBadge.textContent = text;
}

function initLocation() {
  try {
    const saved = localStorage.getItem('ezpz_zip');
    if (saved) {
      const { zip, lat, lng, label } = JSON.parse(saved);
      _userLat = lat; _userLng = lng; _userZip = zip; _userLocLabel = label;
      document.body.classList.add('location-active');
      _updateLocBadges(zip, label);
      showLocState('set');
      return;
    }
  } catch(e) {}
  showLocState('default');
}

function applyZip(zip) {
  const entry = ZIP_COORDS[zip];
  if (!entry) {
    alert('Zip code not found. Try a Miami-Dade zip like 33133, 33139, or 33125.');
    return;
  }
  _userLat = entry.lat; _userLng = entry.lng; _userZip = zip; _userLocLabel = entry.label;
  try { localStorage.setItem('ezpz_zip', JSON.stringify({ zip, lat: entry.lat, lng: entry.lng, label: entry.label })); } catch(e) {}
  document.body.classList.add('location-active');
  _updateLocBadges(zip, entry.label);
  showLocState('set');
  renderContent();
  gtag('event', 'location_set', { method: 'zip', zip });
}

function tryZipSubmit(inputId) {
  const field = document.getElementById(inputId);
  const zip = field ? field.value.trim() : '';
  if (zip.length === 5 && /^\d{5}$/.test(zip)) { applyZip(zip); }
  else if (zip.length > 0) { alert('Please enter a 5-digit Miami-Dade zip code.'); }
}

function tryGPS() {
  if (!navigator.geolocation) { alert('Geolocation is not supported by your browser.'); return; }
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      _userLat = pos.coords.latitude;
      _userLng = pos.coords.longitude;
      _userZip = 'GPS'; _userLocLabel = null;
      try { localStorage.setItem('ezpz_zip', JSON.stringify({ zip: 'GPS', lat: _userLat, lng: _userLng, label: null })); } catch(e) {}
      document.body.classList.add('location-active');
      _updateLocBadges('My Area', null);
      showLocState('set');
      renderContent();
      gtag('event', 'location_set', { method: 'gps' });
    },
    () => { alert('Could not get your location. Try entering a zip code instead.'); }
  );
}

function clearLocation() {
  _userLat = null; _userLng = null; _userZip = null; _userLocLabel = null;
  try { localStorage.removeItem('ezpz_zip'); } catch(e) {}
  document.body.classList.remove('location-active');
  showLocState('default');
  renderContent();
  gtag('event', 'location_clear');
}

// ─── INIT ─────────────────────────────────────────────────────────
loadEvents();
initLocation();

// Re-measure sticky offsets on resize (mobile ↔ desktop switch)
window.addEventListener('resize', () => { updateTabUnderline(); });

// Auto-open modal if URL has ?id= on initial load (shared link)
const _initId = new URLSearchParams(location.search).get('id');
if (_initId) _showModal(_initId);
</script>
