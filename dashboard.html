<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EZPZ Miami — MVP Dashboard</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232736;
    --border: #2e3348;
    --text: #e8eaf0;
    --text-dim: #8b8fa3;
    --accent-pink: #f857a6;
    --accent-blue: #5b7fff;
    --accent-green: #34d399;
    --accent-amber: #fbbf24;
    --accent-purple: #a78bfa;
    --accent-teal: #2dd4bf;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #1a1d27 0%, #232736 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo {
    font-size: 24px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent-pink), var(--accent-blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .header-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 500;
  }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .target-date {
    font-size: 13px;
    color: var(--text-dim);
  }
  .target-date strong { color: var(--accent-amber); }
  .days-left {
    background: linear-gradient(135deg, var(--accent-pink), var(--accent-blue));
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 700;
    color: white;
  }

  /* Summary strip */
  .summary-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .summary-card {
    background: var(--surface);
    padding: 20px 24px;
    text-align: center;
  }
  .summary-card .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .summary-card .value {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -1px;
  }
  .summary-card .sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* Main content */
  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px;
  }

  /* Workstream section */
  .workstream {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .ws-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid var(--border);
  }
  .ws-header:hover { background: var(--surface2); }
  .ws-title-area { display: flex; align-items: center; gap: 14px; }
  .ws-icon {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .ws-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .ws-subtitle {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .ws-stats { display: flex; align-items: center; gap: 20px; }
  .ws-progress-bar {
    width: 160px;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .ws-progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s ease;
  }
  .ws-percent {
    font-size: 14px;
    font-weight: 700;
    min-width: 40px;
    text-align: right;
  }
  .ws-toggle {
    color: var(--text-dim);
    font-size: 18px;
    transition: transform 0.3s ease;
  }
  .ws-toggle.open { transform: rotate(180deg); }

  /* Milestone */
  .ws-body { padding: 0; }
  .milestone {
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
  }
  .milestone:last-child { border-bottom: none; }
  .milestone-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .milestone-title {
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .milestone-week {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 10px;
    background: var(--surface2);
    color: var(--text-dim);
    font-weight: 500;
  }
  .priority {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 8px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .priority.critical { background: #dc262622; color: #f87171; border: 1px solid #dc262644; }
  .priority.high { background: #f5970022; color: var(--accent-amber); border: 1px solid #f5970044; }
  .priority.medium { background: #5b7fff22; color: var(--accent-blue); border: 1px solid #5b7fff44; }

  /* Tasks */
  .task-list { list-style: none; }
  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 6px 0;
    font-size: 13px;
    line-height: 1.5;
    color: var(--text-dim);
  }
  .task-check {
    width: 18px;
    height: 18px;
    border-radius: 5px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .task-check:hover { border-color: var(--accent-green); }
  .task-check.done {
    background: var(--accent-green);
    border-color: var(--accent-green);
  }
  .task-check.done::after {
    content: '✓';
    color: var(--bg);
    font-size: 11px;
    font-weight: 800;
  }
  .task-item.done .task-text {
    text-decoration: line-through;
    color: #4a4e62;
  }
  .task-item.active .task-text { color: var(--text); }

  /* Cost tracker */
  .cost-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .cost-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .cost-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
  }
  .cost-item {
    background: var(--surface2);
    border-radius: 12px;
    padding: 16px;
  }
  .cost-item .svc { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .cost-item .tier { font-size: 11px; color: var(--text-dim); margin-bottom: 8px; }
  .cost-item .price { font-size: 20px; font-weight: 800; }
  .cost-item .price.free { color: var(--accent-green); }
  .cost-item .price.paid { color: var(--accent-amber); }
  .cost-item .note { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

  /* Weekly timeline */
  .timeline {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }
  .week-col {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  .week-col.current { border-color: var(--accent-pink); }
  .week-head {
    padding: 14px 16px;
    font-size: 13px;
    font-weight: 700;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .week-col.current .week-head {
    background: linear-gradient(135deg, #f857a611, #5b7fff11);
  }
  .week-label { font-size: 10px; color: var(--text-dim); font-weight: 500; }
  .week-tasks { padding: 12px 16px; }
  .week-task {
    font-size: 12px;
    padding: 6px 0;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid #2e334822;
  }
  .week-task:last-child { border-bottom: none; }
  .week-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Section titles */
  .section-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 16px;
    margin-top: 8px;
    font-weight: 600;
  }

  /* Responsive */
  @media (max-width: 900px) {
    .summary-strip { grid-template-columns: repeat(2, 1fr); }
    .timeline { grid-template-columns: repeat(2, 1fr); }
    .main { padding: 16px; }
  }
  @media (max-width: 600px) {
    .summary-strip { grid-template-columns: 1fr; }
    .timeline { grid-template-columns: 1fr; }
    .header { flex-direction: column; gap: 12px; }
  }
</style>
</head>

// RENDER LOGIC (no need to edit below)
// ============================================================

function calculateDaysLeft() {
  const now = new Date();
  const diff = MVP_TARGET - now;
  return Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
}

function getCurrentWeek() {
  const now = new Date();
  const diff = now - SPRINT_START;
  const weekNum = Math.floor(diff / (1000 * 60 * 60 * 24 * 7)) + 1;
  return Math.min(Math.max(weekNum, 1), 4);
}

function countTasks() {
  let total = 0, done = 0;
  WORKSTREAMS.forEach(ws => {
    ws.milestones.forEach(m => {
      m.tasks.forEach(t => {
        total++;
        if (t.done) done++;
      });
    });
  });
  return { total, done };
}

function renderHeader() {
  const days = calculateDaysLeft();
  document.getElementById('daysLeft').textContent = `${days} days left`;

  const { total, done } = countTasks();
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('overallPercent').textContent = `${pct}%`;
  document.getElementById('overallSub').textContent = `${done} of ${total} tasks`;
  document.getElementById('tasksDone').textContent = done;
  document.getElementById('tasksSub').textContent = `of ${total} total`;

  const week = getCurrentWeek();
  document.getElementById('currentWeek').textContent = week;
  document.getElementById('weekDates').textContent = WEEKS[week - 1]?.dates || '';

  const totalCost = COSTS.reduce((s, c) => s + c.price, 0);
  document.getElementById('totalCost').textContent = totalCost === 0 ? '$0' : `~$${totalCost}`;
}

function renderTimeline() {
  const container = document.getElementById('timeline');
  const currentWeek = getCurrentWeek();
  container.innerHTML = WEEKS.map(w => {
    const isCurrent = w.num === currentWeek;
    return `
      <div class="week-col ${isCurrent ? 'current' : ''}">
        <div class="week-head">
          <span>Week ${w.num}: ${w.label}</span>
          <span class="week-label">${w.dates}</span>
        </div>
        <div class="week-tasks">
          ${w.tasks.map(t => {
            const c = WS_COLORS[t.ws] || WS_COLORS[0];
            return `<div class="week-task">
              <div class="week-dot" style="background:${c.dot}"></div>
              ${t.text}
            </div>`;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function renderWorkstreams() {
  const container = document.getElementById('workstreams');
  container.innerHTML = WORKSTREAMS.map(ws => {
    const totalTasks = ws.milestones.reduce((s, m) => s + m.tasks.length, 0);
    const doneTasks = ws.milestones.reduce((s, m) => s + m.tasks.filter(t => t.done).length, 0);
    const pct = totalTasks > 0 ? Math.round((doneTasks / totalTasks) * 100) : 0;
    const c = WS_COLORS[ws.id];

    return `
      <div class="workstream">
        <div class="ws-header" onclick="toggleWS(${ws.id})">
          <div class="ws-title-area">
            <div class="ws-icon" style="background:${c.bg}">${c.icon}</div>
            <div>
              <div class="ws-title">${ws.title}</div>
              <div class="ws-subtitle">${ws.subtitle}</div>
            </div>
          </div>
          <div class="ws-stats">
            <div class="ws-progress-bar">
              <div class="ws-progress-fill" style="width:${pct}%;background:${ws.color}"></div>
            </div>
            <div class="ws-percent" style="color:${ws.color}">${pct}%</div>
            <div class="ws-toggle" id="toggle-${ws.id}">▼</div>
          </div>
        </div>
        <div class="ws-body" id="body-${ws.id}">
          ${ws.milestones.map(m => `
            <div class="milestone">
              <div class="milestone-header">
                <div class="milestone-title">
                  ${m.title}
                  <span class="milestone-week">${m.week}</span>
                </div>
                <span class="priority ${m.priority}">${m.priority}</span>
              </div>
              <ul class="task-list">
                ${m.tasks.map(t => `
                  <li class="task-item ${t.done ? 'done' : 'active'}">
                    <div class="task-check ${t.done ? 'done' : ''}"></div>
                    <span class="task-text">${t.text}</span>
                  </li>
                `).join('')}
              </ul>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function renderCosts() {
  const container = document.getElementById('costGrid');
  container.innerHTML = COSTS.map(c => `
    <div class="cost-item">
      <div class="svc">${c.service}</div>
      <div class="tier">${c.tier}</div>
      <div class="price ${c.price === 0 ? 'free' : 'paid'}">${c.price === 0 ? 'Free' : `~$${c.price}/mo`}</div>
      <div class="note">${c.note}</div>
    </div>
  `).join('');
}

function toggleWS(id) {
  const body = document.getElementById(`body-${id}`);
  const toggle = document.getElementById(`toggle-${id}`);
  if (body.style.display === 'none') {
    body.style.display = 'block';
    toggle.classList.add('open');
  } else {
    body.style.display = 'none';
    toggle.classList.remove('open');
  }
}

// Init
renderHeader();
renderTimeline();
renderWorkstreams();
renderCosts();
</script>
