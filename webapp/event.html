<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EZPZ Miami — Event Details</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #FFFFFF;
      --bg-subtle:    #F9F8F6;
      --border:       #EBEBEB;
      --border-heavy: #111111;
      --text-1:       #111111;
      --text-2:       #6B6560;
      --text-3:       #B0AAA5;
      --accent:       #BE7A54;
      --accent-bg:    #FAF1EB;
      --free:         #2A7A47;
      --free-bg:      #EAF4EE;
      --header-h:     54px;
      --cta-h:        80px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─────────────────────────────────────────────
       TOP NAV
    ───────────────────────────────────────────── */
    .topnav {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--header-h);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-2);
      padding: 6px 0;
      transition: color 0.12s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .back-btn:hover { color: var(--text-1); }
    .back-btn svg { flex-shrink: 0; }
    .nav-logo {
      font-size: 15px;
      font-weight: 800;
      color: var(--text-1);
      text-decoration: none;
      letter-spacing: -0.01em;
    }

    /* ─────────────────────────────────────────────
       HERO
    ───────────────────────────────────────────── */
    .hero-wrap {
      width: 100%;
      height: 220px;
      overflow: hidden;
      background: var(--accent-bg);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .hero-placeholder {
      font-size: 60px;
      line-height: 1;
    }
    @media (min-width: 600px) {
      .hero-wrap { height: 300px; }
    }

    /* ─────────────────────────────────────────────
       PAGE
    ───────────────────────────────────────────── */
    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px calc(var(--cta-h) + 24px);
    }

    /* ─────────────────────────────────────────────
       TITLE BLOCK
    ───────────────────────────────────────────── */
    .title-block {
      padding: 24px 0 22px;
      border-bottom: 1px solid var(--border);
    }
    .event-date-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .event-title {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.25;
      letter-spacing: -0.02em;
      color: var(--text-1);
      margin-bottom: 10px;
    }
    .event-organizer {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-3);
      margin-bottom: 16px;
    }
    /* Quick meta row right under title */
    .title-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .title-meta-item {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-2);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .title-meta-sep {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }
    .price-pill {
      font-size: 11.5px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 6px;
    }
    .price-pill.is-free { background: var(--free-bg); color: var(--free); }
    .price-pill.is-paid { background: var(--accent-bg); color: var(--accent); }

    /* ─────────────────────────────────────────────
       SECTIONS
    ───────────────────────────────────────────── */
    .section {
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
    }
    .section:last-child { border-bottom: none; }
    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-3);
      margin-bottom: 14px;
    }

    /* ─────────────────────────────────────────────
       SUMMARY (AI-generated)
    ───────────────────────────────────────────── */
    .summary-text {
      font-size: 16px;
      font-weight: 400;
      line-height: 1.75;
      color: var(--text-1);
      padding-left: 16px;
      border-left: 2.5px solid var(--accent);
    }
    .practical-notes {
      font-size: 13.5px;
      line-height: 1.65;
      color: var(--text-2);
      margin-top: 14px;
      padding: 12px 14px;
      background: var(--bg-subtle);
      border-radius: 8px;
    }

    /* ─────────────────────────────────────────────
       INFO ROWS (plan your visit)
    ───────────────────────────────────────────── */
    .info-rows {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .info-row:last-child { border-bottom: none; }
    .info-icon {
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .info-body {
      flex: 1;
      min-width: 0;
    }
    .info-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-3);
      margin-bottom: 3px;
    }
    .info-value {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-1);
      line-height: 1.35;
    }
    .info-value.accent { color: var(--accent); }
    .info-value.green  { color: var(--free); }
    .info-sub {
      font-size: 12.5px;
      font-weight: 500;
      color: var(--text-3);
      margin-top: 2px;
    }
    .map-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 8px;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      padding: 6px 14px;
      border: 1.5px solid var(--accent);
      border-radius: 8px;
      transition: background 0.12s, color 0.12s;
    }
    .map-link:hover {
      background: var(--accent);
      color: white;
    }
    .btn-icon.wa {
      color: #25D366;
      border-color: #25D366;
    }
    .btn-icon.wa:hover {
      background: #25D366;
      color: white;
      border-color: #25D366;
    }

    /* ─────────────────────────────────────────────
       DESCRIPTION
    ───────────────────────────────────────────── */
    .description-text {
      font-size: 14.5px;
      line-height: 1.75;
      color: var(--text-2);
      white-space: pre-wrap;
    }

    /* ─────────────────────────────────────────────
       TAGS
    ───────────────────────────────────────────── */
    .tags-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tag {
      font-size: 12px;
      font-weight: 600;
      background: var(--bg-subtle);
      color: var(--text-2);
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
    }

    /* ─────────────────────────────────────────────
       CTA BAR (sticky bottom)
    ───────────────────────────────────────────── */
    .cta-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 50;
      height: var(--cta-h);
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      display: none;
      align-items: center;
      gap: 10px;
    }
    .btn-primary {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      height: 48px;
      background: var(--text-1);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      background: var(--bg-subtle);
      border: 1.5px solid var(--border);
