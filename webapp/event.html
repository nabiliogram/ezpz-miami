<script>
// 芒聰聙芒聰聙芒聰聙 CONFIG 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
const SUPABASE_URL = 'https://pomjqbjxosbfozvbvgsj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBvbWpxYmp4b3NiZm96dmJ2Z3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NDk1NTIsImV4cCI6MjA4OTUyNTU1Mn0.csIFsMkappk45CLTfFVGM4b44sqewyhmlyqK8U_SF14';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentEvent = null;

// 芒聰聙芒聰聙芒聰聙 LOAD 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
async function loadEvent() {
  const id = new URLSearchParams(window.location.search).get('id');
  if (!id) { renderError('No event ID provided.'); return; }

  const { data, error } = await db.from('events').select('*').eq('id', id).single();
  if (error || !data) { renderError('Event not found.'); return; }

  currentEvent = data;
  document.title = `${data.editorial_headline || data.title} 芒聙聰 EZPZ Miami`;
  renderEvent(data);
}

// 芒聰聙芒聰聙芒聰聙 RENDER 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function renderEvent(ev) {
  const root = document.getElementById('root');

  // Hero
  const heroHtml = ev.image_url
    ? `<div class="hero-wrap">
         <img src="${esc(ev.image_url)}" alt="${esc(ev.title)}"
              onerror="this.parentNode.innerHTML='<div class=hero-placeholder>${srcIcon(ev.source)}</div>'" />
       </div>`
    : `<div class="hero-wrap"><div class="hero-placeholder">${srcIcon(ev.source)}</div></div>`;

  // Date label
  const dateLabel = fmtFullDate(ev.start_date);
  const timeStr   = fmtTime(ev.start_date);
  const endTime   = ev.end_date ? fmtTime(ev.end_date) : '';
  const dur       = fmtDuration(ev.start_date, ev.end_date);

  // Price
  const priceHtml = (() => {
    if (ev.is_free) return `<span class="price-pill is-free">Free</span>`;
    const label = priceStr(ev);
    if (label && label !== 'See event for pricing') return `<span class="price-pill is-paid">${esc(label)}</span>`;
    return '';
  })();

  // Title meta row
  const metaParts = [];
  if (timeStr) metaParts.push(`<span class="title-meta-item">${timeStr}</span>`);
  if (ev.venue_name) metaParts.push(`<span class="title-meta-item">冒聼聯聧 ${esc(ev.venue_name)}</span>`);
  if (priceHtml) metaParts.push(priceHtml);
  const titleMeta = metaParts.length
    ? `<div class="title-meta">${metaParts.join('<span class="title-meta-sep"></span>')}</div>`
    : '';

  // What to expect (AI summary)
  const summarySection = (ev.parent_summary || ev.description) ? `
    <div class="section">
      <div class="section-label">What to expect</div>
      <p class="summary-text">${esc(ev.parent_summary || ev.description)}</p>
      ${ev.practical_notes ? `<div class="practical-notes">冒聼聯聥 ${esc(ev.practical_notes)}</div>` : ''}
    </div>` : '';

  // Plan your visit
  const infoRows = [];
  infoRows.push(`
    <div class="info-row">
      <span class="info-icon">冒聼聯聟</span>
      <div class="info-body">
        <div class="info-label">Date</div>
        <div class="info-value accent">${esc(dateLabel)}</div>
      </div>
    </div>`);

  if (timeStr) infoRows.push(`
    <div class="info-row">
      <span class="info-icon">冒聼聲聬</span>
      <div class="info-body">
        <div class="info-label">Time</div>
        <div class="info-value">${timeStr}${endTime ? ' 芒聙聯 ' + endTime : ''}</div>
        ${dur ? `<div class="info-sub">${dur}</div>` : ''}
      </div>
    </div>`);

  infoRows.push(`
    <div class="info-row">
      <span class="info-icon">冒聼聯聧</span>
      <div class="info-body">
        <div class="info-label">Location</div>
        <div class="info-value">${esc(ev.neighborhood || ev.venue_name || 'TBA')}</div>
        ${ev.neighborhood && ev.venue_name ? `<div class="info-sub">${esc(ev.venue_name)}</div>` : ''}
        ${ev.address ? `
          <div class="info-sub" style="margin-top:4px">${esc(ev.address)}</div>
          <a class="map-link" href="https://maps.google.com/?q=${encodeURIComponent(ev.address)}" target="_blank" rel="noopener">
            Open in Maps 芒聠聮
          </a>` : ''}
      </div>
    </div>`);

  infoRows.push(`
    <div class="info-row">
      <span class="info-icon">冒聼聮碌</span>
      <div class="info-body">
        <div class="info-label">Cost</div>
        <div class="info-value ${ev.is_free ? 'green' : ''}">${esc(priceStr(ev))}</div>
      </div>
    </div>`);

  // Ages
  const ageTxt = ageLabel(ev.age_min, ev.age_max);
  infoRows.push(`
    <div class="info-row">
      <span class="info-icon">冒聼聭露</span>
      <div class="info-body">
        <div class="info-label">Ages</div>
        <div class="info-value">${esc(ageTxt)}</div>
        ${ev.activity_type ? `<div class="info-sub" style="text-transform:capitalize">${esc(ev.activity_type)}</div>` : ''}
      </div>
    </div>`);

  if (ev.indoor_outdoor) infoRows.push(`
    <div class="info-row">
      <span class="info-icon">${ev.indoor_outdoor === 'indoor' ? '冒聼聫聽' : ev.indoor_outdoor === 'outdoor' ? '芒聵聙茂赂聫' : '冒聼聰聞'}</span>
      <div class="info-body">
        <div class="info-label">Setting</div>
        <div class="info-value" style="text-transform:capitalize">${esc(ev.indoor_outdoor)}</div>
      </div>
    </div>`);

  const infoSection = `
    <div class="section">
      <div class="section-label">Plan your visit</div>
      <div class="info-rows">${infoRows.join('')}</div>
    </div>`;

  // About (full description if different from summary)
  const fullDesc = ev.full_description || (ev.parent_summary ? ev.description : '') || '';
  const aboutSection = fullDesc ? `
    <div class="section">
      <div class="section-label">About this event</div>
      <p class="description-text">${esc(fullDesc.trim())}</p>
    </div>` : '';

  // Tags
  const tagsSection = (ev.tags || []).length > 0 ? `
    <div class="section">
      <div class="tags-row">${ev.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>
    </div>` : '';

  root.innerHTML = `
    ${heroHtml}
    <div class="page">
      <div class="title-block">
        <div class="event-date-label">${esc(dateLabel)}</div>
        <h1 class="event-title">${esc(ev.editorial_headline || ev.title)}</h1>
        ${ev.editorial_headline ? `<div class="event-organizer">${esc(ev.title)}</div>` : (ev.organizer_name ? `<div class="event-organizer">by ${esc(ev.organizer_name)}</div>` : '')}
        ${titleMeta}
      </div>
      ${summarySection}
      ${infoSection}
      ${aboutSection}
      ${tagsSection}
    </div>`;

  // CTA bar
  if (ev.source_url) {
    const ctaLink = document.getElementById('cta-link');
    ctaLink.href = ev.source_url;
    ctaLink.textContent = ev.is_free ? 'Register / RSVP' : 'View & Get Tickets';
    document.getElementById('cta-bar').style.display = 'flex';
  }
}

// 芒聰聙芒聰聙芒聰聙 ACTIONS 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function shareEvent() {
  const ev = currentEvent;
  if (!ev) return;
  const text = `${ev.title}\n${fmtFullDate(ev.start_date)}${ev.venue_name ? ' 脗路 ' + ev.venue_name : ''}\n${ev.source_url || window.location.href}`;
  if (navigator.share) {
    navigator.share({ title: ev.title, text, url: ev.source_url || window.location.href }).catch(() => {});
  } else {
    navigator.clipboard?.writeText(text).then(() => {
      const btn = document.querySelector('.btn-icon[title="Share"]');
      if (btn) { btn.textContent = '芒聹聯'; setTimeout(() => { btn.innerHTML = shareIconSvg(); }, 2000); }
    });
  }
}

function shareIconSvg() {
  return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>`;
}

function addToCalendar() {
  const ev = currentEvent;
  if (!ev) return;
  const fmt = iso => iso ? new Date(iso).toISOString().replace(/[-:]/g,'').split('.')[0]+'Z' : '';
  const url = `https://calendar.google.com/calendar/render?action=TEMPLATE`
    + `&text=${encodeURIComponent(ev.title)}`
    + `&dates=${fmt(ev.start_date)}/${fmt(ev.end_date || ev.start_date)}`
    + `&location=${encodeURIComponent(ev.address || ev.venue_name || '')}`
    + `&details=${encodeURIComponent((ev.parent_summary || ev.description || '').slice(0,200))}`;
  window.open(url, '_blank');
}

function fmtFullDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  // Use UTC values 芒聙聰 times are stored as Miami local time labeled as UTC
  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${days[d.getUTCDay()]}, ${months[d.getUTCMonth()]} ${d.getUTCDate()}, ${d.getUTCFullYear()}`;
}
function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  // Read UTC values 芒聙聰 times are stored as Miami local time labeled as UTC
  const h = d.getUTCHours(), m = d.getUTCMinutes();
  if (h === 0 && m === 0) return '';
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12  = h % 12 || 12;
  const mm   = m === 0 ? '' : `:${String(m).padStart(2, '0')}`;
  return `${h12}${mm} ${ampm}`;
}
function fmtDuration(start, end) {
  if (!start || !end) return null;
  const mins = Math.round((new Date(end) - new Date(start)) / 60000);
  if (mins <= 0 || mins > 600) return null;
  if (mins < 60) return `${mins} min`;
  const h = Math.floor(mins / 60), m = mins % 60;
  return m ? `${h}h ${m}m` : `${h}h`;
}
function ageLabel(min, max) {
  if (min == null && max == null) return 'All ages welcome';
  if (min == null) min = 0;
  if (min === 0 && (max == null || max >= 12)) return 'All ages welcome';
  if (max == null) return `Ages ${min}+`;
  return `Ages ${min}芒聙聯${max}`;
}
function priceStr(ev) {
  if (ev.is_free) return 'Free';
  if (ev.price_min != null && ev.price_max != null && ev.price_min === ev.price_max) return `$${ev.price_min}`;
  if (ev.price_min != null && ev.price_max != null) return `$${ev.price_min}芒聙聯$${ev.price_max}`;
  if (ev.price_min != null) return `From $${ev.price_min}`;
  return 'See event page';
}
function srcIcon(source) {
  const map = {
    miami_dade_libraries: '冒聼聯職', eventbrite: '冒聼聨聼', the_underline: '冒聼聦驴',
    miami_childrens_museum: '冒聼聨隆', arsht_center: '冒聼聨颅',
    deering_estate: '冒聼聫聸', pinecrest_gardens: '冒聼聦潞', magic_13: '芒聹篓',
  };
  return map[source] || '冒聼聦麓';
}
function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
