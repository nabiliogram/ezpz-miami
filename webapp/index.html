<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EZPZ Miami — Weekend Playbook for Miami Parents</title>
  <meta name="description" content="The easiest way to find kid-friendly events in Miami this weekend." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300&family=Montserrat:wght@800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --flamingo:     #FF4477;
      --coral:        #FF8C70;
      --violet:       #8B5CF6;
      --teal:         #0D9488;
      --yellow:       #FACC15;
      --bg:           #FDFCFB;
      --bg-white:     #FFFFFF;
      --bg-date:      #FFFBEB;
      --bg-yellow:    #FFFBEB;
      --text-1:       #0F172A;
      --text-2:       #475569;
      --text-3:       #94A3B8;
      --border:       #F1F5F9;
      --border-med:   #E2E8F0;
      --free:         #059669;
      --free-bg:      #ECFDF5;
      --header-h:     68px;
      --date-h:       72px;
      --tab-h:        68px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .display { font-family: 'Montserrat', sans-serif; }

    /* ─────────────────────────────────────────────
       HEADER
    ───────────────────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--header-h);
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 20px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      flex-direction: column;
      text-decoration: none;
    }
    .logo-name {
      font-family: 'Montserrat', sans-serif;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      color: var(--flamingo);
      line-height: 1;
    }
    .logo-tag {
      font-family: 'Montserrat', sans-serif;
      font-size: 8px;
      font-weight: 800;
      color: var(--yellow);
      text-transform: uppercase;
      letter-spacing: 0.25em;
      line-height: 1;
      margin-top: 3px;
    }
    .cal-btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--flamingo);
      transition: opacity 0.15s;
      overflow: hidden;
    }
    .cal-btn:hover { opacity: 0.7; }
    .cal-btn svg { pointer-events: none; position: relative; z-index: 0; }
    #date-picker {
      position: absolute; inset: 0; opacity: 0;
      width: 100%; height: 100%; cursor: pointer; z-index: 1; font-size: 16px;
    }

    /* ─────────────────────────────────────────────
       TAB BAR
    ───────────────────────────────────────────── */
    .tab-bar {
      position: sticky;
      top: var(--header-h);
      z-index: 95;
      background: var(--bg-white);
      border-bottom: 1px solid var(--border);
      display: flex;
      height: auto;
      max-width: 720px;
      margin: 0 auto;
      margin-bottom: 8px;
    }
    .tab-btn {
      flex: 1;
      border: none;
      border-right: 1px solid var(--border);
      background: transparent;
      color: var(--text-2);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      position: relative;
      transition: color 0.15s, background 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 12px 6px;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.2;
    }
    .tab-btn:last-of-type { border-right: none; }
    .tab-btn:hover { color: var(--text-1); }
    /* Active tab background tints */
    .tab-btn[data-tab="events"].active {
      background: rgba(255, 68, 119, 0.05);
      color: var(--flamingo);
    }
    .tab-btn[data-tab="library"].active {
      background: rgba(139, 92, 246, 0.05);
      color: var(--violet);
    }
    .tab-btn[data-tab="places"].active {
      background: rgba(13, 148, 136, 0.05);
      color: var(--teal);
    }
    .tab-label {
      text-align: center;
    }
    .tab-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 18px;
      padding: 0 6px;
      border-radius: 9px;
      background: var(--border);
      font-size: 11px;
      font-weight: 700;
      color: var(--text-2);
      line-height: 1;
    }
    .tab-btn[data-tab="events"].active .tab-badge {
      background: var(--flamingo);
      color: white;
    }
    .tab-btn[data-tab="library"].active .tab-badge {
      background: var(--violet);
      color: white;
    }
    .tab-btn[data-tab="places"].active .tab-badge {
      background: var(--teal);
      color: white;
    }
    .tab-underline {
      position: absolute;
      bottom: 0;
      height: 3px;
      background: var(--flamingo);
      transition: left 0.3s ease, width 0.3s ease, background 0.3s ease;
      border-radius: 2px;
    }
    .tab-btn[data-tab="library"] ~ .tab-underline.on-library {
      background: var(--violet);
    }
    .tab-btn[data-tab="places"] ~ .tab-underline.on-places {
      background: var(--teal);
    }

    /* ─────────────────────────────────────────────
       DATE PICKER STRIP
    ───────────────────────────────────────────── */
    .date-strip {
      position: sticky;
      top: calc(var(--header-h) + var(--tab-h));
      z-index: 90;
      background: var(--bg-date);
      border-bottom: 1px solid #FDE68A;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .date-strip.hidden { display: none; }
    .date-strip::-webkit-scrollbar { display: none; }
    .date-strip-inner {
      display: flex;
      min-width: max-content;
      max-width: 720px;
      margin: 0 auto;
      padding: 0 4px;
    }
    .date-btn {
      flex-shrink: 0;
      width: 56px;
      padding: 10px 0 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      border: none;
      background: transparent;
      cursor: pointer;
      transition: background 0.15s;
      border-radius: 0;
    }
    .date-btn:hover { background: rgba(255, 255, 255, 0.5); }
    .date-btn.active { background: rgba(255, 255, 255, 0.6); }
    .date-btn .day-name {
      font-family: 'Montserrat', sans-serif;
      font-size: 8px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      color: var(--text-3);
    }
    .date-btn.active .day-name { color: var(--text-2); }
    .date-btn .day-num {
      font-family: 'Montserrat', sans-serif;
      font-size: 16px;
      font-weight: 900;
      color: var(--text-3);
    }
    .date-btn.active .day-num { color: var(--flamingo); }
    .date-btn .day-dot {
      width: 16px;
      height: 3px;
      border-radius: 2px;
      background: var(--flamingo);
      opacity: 0;
      margin-top: 1px;
    }
    .date-btn.active .day-dot { opacity: 1; }
    /* Date color variants */
    .date-strip[data-tab="library"] .date-btn.active .day-num { color: var(--violet); }
    .date-strip[data-tab="library"] .date-btn.active .day-dot { background: var(--violet); }
    .date-strip[data-tab="places"] .date-btn.active .day-num { color: var(--teal); }
    .date-strip[data-tab="places"] .date-btn.active .day-dot { background: var(--teal); }

    /* ─────────────────────────────────────────────
       AGE FILTER BAR (Library tab)
    ───────────────────────────────────────────── */
    .age-filter-bar {
      display: none;
      max-width: 720px;
      margin: 0 auto;
      padding: 12px 12px;
      background: var(--bg-white);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .age-filter-bar::-webkit-scrollbar { display: none; }
    .age-filter-bar.visible { display: flex; }
    .age-filter-inner {
      display: flex;
      gap: 8px;
      min-width: max-content;
    }
    .age-chip {
      flex-shrink: 0;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1.5px solid var(--border-med);
      background: var(--bg-white);
      color: var(--text-2);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .age-chip:hover { border-color: var(--violet); }
    .age-chip.active {
      border-color: var(--violet);
      background: var(--violet);
      color: white;
    }

    /* ─────────────────────────────────────────────
       PAGE & SECTION HEADER
    ───────────────────────────────────────────── */
    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 12px 0;
    }
    .section-header {
      padding: 28px 12px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }
    .section-header-left {
      flex: 1;
    }
    .section-date {
      font-family: 'Montserrat', sans-serif;
      font-size: 36px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--text-1);
    }
    .section-bar {
      width: 56px;
      height: 6px;
      background: var(--flamingo);
      margin-top: 10px;
    }
    .section-bar.violet { background: var(--violet); }
    .section-bar.teal { background: var(--teal); }
    .section-count {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-3);
      margin-top: 6px;
    }

    /* ─────────────────────────────────────────────
       EVENT CARD
    ───────────────────────────────────────────── */
    .events-list {
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .event-card {
      background: var(--bg-white);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .event-card:active { opacity: 0.85; }
    @media (hover: hover) {
      .event-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
    }

    /* Billboard header */
    .card-billboard {
      width: 100%;
      position: relative;
      overflow: hidden;
      background: var(--text-1);
      padding: 20px 24px;
    }
    .card-billboard::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.08;
      background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28"><rect width="28" height="28" fill="none"/><rect x="0" y="0" width="14" height="14" fill="white" fill-opacity="0.15"/><rect x="14" y="14" width="14" height="14" fill="white" fill-opacity="0.15"/></svg>');
      background-size: 28px 28px;
    }
    .billboard-content {
      position: relative;
      z-index: 2;
      width: 100%;
    }
    .category-pill {
      display: inline-block;
      font-family: 'Montserrat', sans-serif;
      font-size: 7px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 2px 7px;
      border-radius: 3px;
      background: var(--bg-white);
      color: var(--text-1);
      margin-bottom: 10px;
    }
    .card-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 26px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      line-height: 1.1;
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-image: linear-gradient(to right, var(--coral), var(--flamingo));
      word-break: break-word;
      overflow-wrap: break-word;
    }
    .billboard-ghost {
      position: absolute;
      bottom: -8px;
      right: -8px;
      font-family: 'Montserrat', sans-serif;
      font-size: 72px;
      font-weight: 900;
      text-transform: uppercase;
      color: rgba(255,255,255,0.03);
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
      line-height: 1;
    }

    /* Card body */
    .card-body {
      padding: 20px 24px 24px;
    }
    .card-summary {
      font-size: 14px;
      font-weight: 500;
      font-style: italic;
      line-height: 1.65;
      color: var(--text-2);
      margin-bottom: 24px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Metadata grid */
    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 28px;
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }
    .meta-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .meta-icon {
      flex-shrink: 0;
      margin-top: 2px;
      color: var(--text-3);
    }
    .meta-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 8px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-3);
    }
    .meta-value {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      color: var(--text-1);
      margin-top: 1px;
    }
    .meta-value.is-free { color: var(--free); }

    /* ─────────────────────────────────────────────
       LIBRARY SECTION (Card-based)
    ───────────────────────────────────────────── */
    .library-group {
      margin-bottom: 16px;
      background: var(--bg-white);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .library-billboard {
      position: relative;
      overflow: hidden;
      background: var(--text-1);
      padding: 18px 20px;
    }
    .library-billboard::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.08;
      background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28"><rect width="28" height="28" fill="none"/><rect x="0" y="0" width="14" height="14" fill="white" fill-opacity="0.15"/><rect x="14" y="14" width="14" height="14" fill="white" fill-opacity="0.15"/></svg>');
      background-size: 28px 28px;
    }
    .library-billboard-inner {
      position: relative;
      z-index: 2;
    }
    .library-billboard .library-pill {
      display: inline-block;
      font-family: 'Montserrat', sans-serif;
      font-size: 7px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 2px 7px;
      border-radius: 3px;
      background: var(--bg-white);
      color: var(--text-1);
      margin-bottom: 8px;
    }
    .library-title-name {
      font-family: 'Montserrat', sans-serif;
      font-size: 20px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      line-height: 1.1;
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      word-break: break-word;
      overflow-wrap: break-word;
    }
    .library-card-top {
      padding: 16px 20px 0;
    }
    .library-meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 24px;
      padding-bottom: 16px;
    }
    .library-meta-item {
      display: flex;
      align-items: flex-start;
      gap: 7px;
    }
    .library-meta-icon {
      flex-shrink: 0;
      margin-top: 2px;
      color: var(--violet);
    }
    .library-meta-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 8px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-3);
    }
    .library-meta-value {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      color: var(--text-1);
      margin-top: 1px;
    }
    .library-card-actions {
      padding: 0 20px 16px;
      display: flex;
      gap: 8px;
    }
    .library-details-btn {
      padding: 8px 16px;
      background: var(--violet);
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .library-details-btn:hover { opacity: 0.85; }
    .library-locations-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 8px 14px;
      background: rgba(139, 92, 246, 0.08);
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      color: var(--violet);
      cursor: pointer;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .library-locations-btn:hover { background: rgba(139, 92, 246, 0.14); }
    .library-locations-btn .chevron {
      font-size: 10px;
      transition: transform 0.2s;
    }
    .library-group.expanded .library-locations-btn .chevron { transform: rotate(180deg); }
    .library-branches {
      display: none;
      flex-direction: column;
      gap: 0;
      border-top: 1px solid var(--border);
    }
    .library-group.expanded .library-branches { display: flex; }
    .library-branch {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .library-branch:first-child { border-top: none; }
    .library-branch-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
      min-width: 0;
    }
    .library-branch-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-1);
    }
    .library-branch-meta {
      font-size: 12px;
      color: var(--text-2);
    }
    .library-branch-btn {
      flex-shrink: 0;
      padding: 6px 12px;
      border: none;
      background: var(--violet);
      color: white;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .library-branch-btn:hover { opacity: 0.85; }

    /* ─────────────────────────────────────────────
       VENUES SECTION (Places Tab)
    ───────────────────────────────────────────── */
    .venues-list {
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .venue-card {
      background: var(--bg-white);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-top: 3px solid var(--teal);
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }
    .venue-card-top {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 16px;
      padding: 20px;
    }
    .venue-logo {
      width: 96px;
      height: 96px;
      border-radius: 14px;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .venue-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 8px;
    }
    .venue-logo-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Montserrat', sans-serif;
      font-size: 32px;
      font-weight: 900;
      color: white;
      background: linear-gradient(135deg, var(--teal), var(--violet));
    }
    .venue-info {
      flex: 1;
      min-width: 0;
    }
    .venue-name {
      font-family: 'Montserrat', sans-serif;
      font-size: 18px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      line-height: 1.15;
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-image: linear-gradient(to right, var(--teal), #0d9488);
      margin-bottom: 10px;
    }
    .venue-meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 16px;
    }
    .venue-meta-item {
      display: flex;
      align-items: flex-start;
      gap: 7px;
    }
    .venue-meta-icon {
      flex-shrink: 0;
      margin-top: 2px;
      color: var(--teal);
    }
    .venue-meta-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 8px;
      font-weight: 900;
      text-transform: uppercase;

// State
let _allEvents = [];
let _activeDate = null;
let _activeTab = 'events';
let _activeAgeFilter = 'all';
let _modalEvent = null;

// ─── TAB SWITCHING ────────────────────────────────────────────────
function switchTab(tab) {
  _activeTab = tab;
  _activeAgeFilter = 'all';
  updateTabUI();
  updateDateStripVisibility();
  updateAgeFilterVisibility();
  renderContent();
  updateTabUnderline();
}

function updateTabUI() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === _activeTab);
  });
}

function updateDateStripVisibility() {
  const dateStrip = document.getElementById('date-strip');
  if (_activeTab === 'places') {
    dateStrip.classList.add('hidden');
  } else {
    dateStrip.classList.remove('hidden');
    dateStrip.dataset.tab = _activeTab;
  }
}

function updateAgeFilterVisibility() {
  const ageBar = document.getElementById('age-filter-bar');
  if (_activeTab === 'library') {
    ageBar.classList.add('visible');
  } else {
    ageBar.classList.remove('visible');
  }
  resetAgeFilter();
}

function updateTabUnderline() {
  const underline = document.querySelector('.tab-underline');
  const activeBtn = document.querySelector('.tab-btn.active');
  if (activeBtn && underline) {
    const rect = activeBtn.getBoundingClientRect();
    const tabBar = document.getElementById('tab-bar');
    const tabBarRect = tabBar.getBoundingClientRect();
    underline.style.left = (rect.left - tabBarRect.left) + 'px';
    underline.style.width = rect.width + 'px';
    underline.className = 'tab-underline';
    if (_activeTab === 'library') underline.classList.add('on-library');
    if (_activeTab === 'places') underline.classList.add('on-places');
  }
}

// ─── AGE FILTER ───────────────────────────────────────────────────
function setAgeFilter(age) {
  _activeAgeFilter = age;
  document.querySelectorAll('.age-chip').forEach(chip => {
    chip.classList.toggle('active', chip.dataset.age === age);
  });
  renderContent();
}

function resetAgeFilter() {
  _activeAgeFilter = 'all';
  document.querySelectorAll('.age-chip').forEach(chip => {
    chip.classList.toggle('active', chip.dataset.age === 'all');
  });
}

// ─── DATE STRIP ──────────────────────────────────────────────────
function buildDateStrip() {
  const inner = document.getElementById('date-strip-inner');
  const today = new Date();
  const dayNames = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  let html = '';
  for (let i = 0; i < 14; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    const key = toDateKey(d);
    const dn = dayNames[d.getDay()];
    const num = String(d.getDate()).padStart(2, '0');
    html += `<button class="date-btn" data-date="${key}" onclick="selectDate('${key}')">
      <span class="day-name">${dn}</span>
      <span class="day-num">${num}</span>
      <span class="day-dot"></span>
    </button>`;
  }
  inner.innerHTML = html;
}

function selectDate(key) {
  _activeDate = key;
  document.querySelectorAll('.date-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.date === key);
  });
  const activeBtn = document.querySelector(`.date-btn[data-date="${key}"]`);
  if (activeBtn) activeBtn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  renderContent();
  updateAllBadges();
}

function jumpToDate(val) {
  if (!val) return;
  const btn = document.querySelector(`.date-btn[data-date="${val}"]`);
  if (btn) selectDate(val);
}

// ─── LOAD ─────────────────────────────────────────────────────────
async function loadEvents() {
  const { data, error } = await db
    .from('events')
    .select('id, title, editorial_headline, description, parent_summary, start_date, end_date, age_min, age_max, image_url, venue_name, neighborhood, is_free, price_min, price_max, source, activity_type, address, source_url, practical_notes')
    .eq('is_canceled', false)
    .eq('is_kid_friendly', true)
    .gte('start_date', new Date().toISOString().slice(0, 10))
    .order('start_date', { ascending: true })
    .limit(400);

  if (error) { showError(error.message); return; }
  _allEvents = data || [];
  buildDateStrip();
  selectDate(toDateKey(new Date()));
  updateAllBadges();
  setTimeout(() => updateTabUnderline(), 100);
}

function updateAllBadges() {
  const dayEvents = _allEvents.filter(ev => toDateKey(new Date(ev.start_date)) === _activeDate);
  const localEvents = dayEvents.filter(ev => ev.source !== 'miami_dade_libraries');
  const libraryEvents = dayEvents.filter(ev => ev.source === 'miami_dade_libraries');
  const programGroups = groupByProgram(libraryEvents);
  updateTabBadge('events', localEvents.length);
  updateTabBadge('library', programGroups.length);
  updateTabBadge('places', 15);
}

// ─── RENDER ───────────────────────────────────────────────────────
function renderContent() {
  if (_activeTab === 'events') {
    renderLocalEvents();
  } else if (_activeTab === 'library') {
    renderLibraryPrograms();
  } else if (_activeTab === 'places') {
    renderPlaces();
  }
}

function renderLocalEvents() {
  const content = document.getElementById('content');
  const dayEvents = _allEvents.filter(ev => toDateKey(new Date(ev.start_date)) === _activeDate);

  // Filter out library events and excluded venue sources (unless they're one-offs)
  const localEvents = dayEvents.filter(ev => {
    if (ev.source === 'miami_dade_libraries') return false;
    return true;
  });

  const dateObj = parseDateKey(_activeDate);
  const label = fmtDisplayDate(dateObj);

  if (localEvents.length === 0) {
    content.innerHTML = `
      <div class="section-header">
        <div class="section-header-left">
          <div class="section-date display">${esc(label)}</div>
          <div class="section-bar"></div>

      </div>
      <div class="empty-state">
        <div class="empty-icon">🌴</div>
        <h3>Nothing listed yet</h3>
        <p>No events on this day — try another date or check back soon.</p>
      </div>`;
    updateTabBadge('events', 0);
    return;
  }

  const programGroups = groupByProgram(localEvents);
  let html = `
    <div class="section-header" data-date="${_activeDate}">
      <div class="section-header-left">
        <div class="section-date display">${esc(label)}</div>
        <div class="section-bar"></div>
        <div class="section-count">${programGroups.length} event${programGroups.length !== 1 ? 's' : ''}</div>
      </div>
    </div>

  programGroups.forEach((group, idx) => { html += eventCard(group, idx); });

  html += `</div><div class="footer"><span class="footer-text display">Your EZPZ Miami Play &mdash; Book</span></div>`;
  content.innerHTML = html;
  updateTabBadge('events', programGroups.length);
  window.scrollTo({ top: 0, behavior: 'auto' });
}

  _libGradIdx = 0; // reset gradient rotation
  const content = document.getElementById('content');
  const dayEvents = _allEvents.filter(ev => toDateKey(new Date(ev.start_date)) === _activeDate);

  const visitUrl = venue.website && venue.website !== '#' ? venue.website : null;

  let html = `
    <div class="venue-card" data-venue-id="${venue.id}">
      ${visitUrl ? `<a class="venue-visit-btn" href="${esc(visitUrl)}" target="_blank" rel="noopener">Visit Site →</a>` : ''}
      <div class="venue-card-top">
        <div class="venue-logo">${logoHtml}</div>
        <div class="venue-info">
          <div class="venue-name">${esc(venue.name)}</div>
          <div class="venue-meta-grid">
            <div class="venue-meta-item">
              ${iconClock}
              <div><div class="venue-meta-label">Hours</div><div class="venue-meta-value">${esc(venue.hours)}</div></div>
            </div>
            <div class="venue-meta-item">
              ${iconPin}
              <div><div class="venue-meta-label">Location</div><div class="venue-meta-value">${esc(venue.neighborhood)}</div></div>
            </div>
            <div class="venue-meta-item">
              ${iconTag}
              <div><div class="venue-meta-label">Price</div><div class="venue-meta-value${priceClass}">${esc(venue.priceLabel)}</div></div>
            </div>
            <div class="venue-meta-item">
              ${iconUser}
              <div><div class="venue-meta-label">Ages</div><div class="venue-meta-value">${esc(venue.ages)}</div></div>
            </div>
          </div>
        </div>
      </div>`;

  if (venue.desc) {
    html += `<div class="venue-desc">"${esc(venue.desc)}"</div>`;
  }

  if (venueEvents.length > 0) {
    html += `<button class="venue-cta">View ${venueEvents.length} upcoming event${venueEvents.length !== 1 ? 's' : ''}</button>`;
    html += `<div class="venue-events">`;

    venueEvents.slice(0, 10).forEach(ev => {
      const date = fmtDisplayDate(parseDateKey(toDateKey(new Date(ev.start_date))));
      const summary = ev.parent_summary || ev.description || '';
      const shortSummary = summary.length > 80 ? summary.slice(0, 80) + '...' : summary;
      html += `
        <div class="venue-event-row">
          <span class="venue-event-badge">${esc(date)}</span>
          <div class="venue-event-title">${esc(ev.editorial_headline || ev.title)}</div>
          ${shortSummary ? `<div class="venue-event-desc">${esc(shortSummary)}</div>` : ''}
          <a class="venue-event-link" data-event-id="${esc(ev.id)}">View details →</a>
        </div>`;
    });

    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

function updateTabBadge(tab, count) {
  const btn = document.querySelector(`.tab-btn[data-tab="${tab}"] .tab-badge`);
  if (btn) btn.textContent = count;
}

function eventCard(group, idx) {
  const ev = group[0];
  const isGroup = group.length > 1;
  const gradient = GRADIENTS[idx % GRADIENTS.length];

  const headline = isGroup
    ? esc(groupTitle(group))
    : (ev.editorial_headline ? esc(ev.editorial_headline) : esc(ev.title));

  const body = isGroup
    ? esc(neutralSummary(group))
    : (ev.parent_summary ? esc(ev.parent_summary) : (ev.description ? esc(ev.description) : ''));

  const time = fmtTimeRange(ev.start_date, ev.end_date);
  const location = isGroup
    ? esc(groupLocation(group))
    : (ev.neighborhood ? esc(titleCase(ev.neighborhood)) : (ev.venue_name ? esc(ev.venue_name) : ''));
  const price = priceLabel(ev);
  const priceClass = ev.is_free ? ' is-free' : '';
  const ages = isGroup ? groupAgeLabel(group) : ageLabel(ev.age_min, ev.age_max);
  const category = ev.activity_type ? esc(titleCase(ev.activity_type)) : 'Event';

  const onclick = isGroup ? '' : `onclick="openModal('${esc(ev.id)}', event)"`;

  return `
    <a class="event-card" href="#" ${onclick}>
      <div class="card-billboard">
        <div class="billboard-content">
          <span class="category-pill">${category}</span>
          <div class="card-title" style="background-image: ${gradient}">${headline}</div>
        </div>
        <span class="billboard-ghost">${headline}</span>
      </div>
      <div class="card-body">
        ${body ? `<p class="card-summary">"${body}"</p>` : ''}
        <div class="meta-grid">
          <div class="meta-item">
            <svg class="meta-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <div><div class="meta-label">Time</div><div class="meta-value">${time || 'See details'}</div></div>
          </div>
          <div class="meta-item">
            <svg class="meta-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <div><div class="meta-label">Neighborhood</div><div class="meta-value">${location || 'Miami'}</div></div>
          </div>
          <div class="meta-item">
            <svg class="meta-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
            <div><div class="meta-label">Price</div><div class="meta-value${priceClass}">${price}</div></div>
          </div>
          <div class="meta-item">
            <svg class="meta-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <div><div class="meta-label">Ages</div><div class="meta-value">${ages}</div></div>
          </div>
        </div>
      </div>
    </a>`;
}

// ─── MODAL ────────────────────────────────────────────────────────
function openModal(id, e) {
  if (e) {
    if (e.metaKey || e.ctrlKey || e.shiftKey || e.button === 1) return;
    e.preventDefault();
  }
  history.pushState({ modalId: id }, '', '?id=' + id);
  _showModal(id);
}

function _showModal(id) {
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('modal-content').innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';
  document.getElementById('modal-cta').style.display = 'none';
  fetchAndRenderModal(id);
}

function closeModal() {
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.remove('open');
  setTimeout(() => { document.body.style.overflow = ''; }, 300);
  if (history.state && history.state.modalId) {
    history.pushState({}, '', location.pathname);
  }
}

function onOverlayClick(e) {
  if (e.target === e.currentTarget) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

window.addEventListener('popstate', e => {
  const overlay = document.getElementById('modal-overlay');
  if (e.state && e.state.modalId) {
    _showModal(e.state.modalId);
  } else if (overlay.classList.contains('open')) {
    overlay.classList.remove('open');
    setTimeout(() => { document.body.style.overflow = ''; }, 300);
  }
});

async function fetchAndRenderModal(id) {
  const { data, error } = await db.from('events').select('*').eq('id', id).single();
  if (error || !data) {
    document.getElementById('modal-content').innerHTML =
      '<div class="m-body"><p style="color:var(--text-2);padding:16px 0">Event not found.</p></div>';
    return;
  }

  _modalEvent = data;
  document.getElementById('modal-content').innerHTML = renderModal(data);

  const ctaLink = document.getElementById('modal-cta-link');
  if (data.source_url) {
    ctaLink.href = data.source_url;
    ctaLink.textContent = data.is_free ? 'Register / RSVP' : 'View & Get Tickets';
    ctaLink.style.display = 'flex';
  } else {
    ctaLink.style.display = 'none';
  }

  const mapsBtn = document.getElementById('modal-maps-btn');
  const mq = data.address
    ? data.address
    : (data.venue_name ? data.venue_name + ', Miami, FL' : '');
  if (mq) {
    mapsBtn.href = 'https://maps.google.com/?q=' + encodeURIComponent(mq);
    mapsBtn.style.display = 'flex';
  } else {
    mapsBtn.style.display = 'none';
  }

  document.getElementById('modal-cta').style.display = 'flex';
  document.getElementById('modal-content').scrollTop = 0;
}

function renderModal(ev) {
  const gradient = pickGradient(ev.activity_type);
  const dateLabel = fmtFullDate(ev.start_date);
  const timeStr = fmtTimeRange(ev.start_date, ev.end_date);
  const category = ev.activity_type ? titleCase(ev.activity_type) : 'Event';
  const headline = ev.editorial_headline || ev.title;

  const priceHtml = ev.is_free
    ? `<span class="m-pill free">Free</span>`
    : (ev.price_min != null ? `<span class="m-pill paid">${esc(mPriceStr(ev))}</span>` : '');

  const metaParts = [];
  if (timeStr) metaParts.push(`<span class="m-meta-item">${timeStr}</span>`);
  if (ev.venue_name) metaParts.push(`<span class="m-meta-item">📍 ${esc(titleCase(ev.neighborhood) || ev.venue_name)}</span>`);
  if (priceHtml) metaParts.push(priceHtml);
  const metaRow = metaParts.length
    ? `<div class="m-meta">${metaParts.join('<span class="m-meta-sep"></span>')}</div>` : '';

  const summary = ev.parent_summary || ev.description || '';
  const summaryBlock = summary ? `
    <div class="m-summary-wrap">
      <p class="m-summary">${esc(summary)}</p>
      ${ev.practical_notes ? `<div class="m-practical">${renderNotes(ev.practical_notes)}</div>` : ''}
    </div>` : '';

  const infoRows = [];
  infoRows.push(`<div class="m-info-row"><span class="m-info-icon">📅</span><div><div class="m-info-label">Date</div><div class="m-info-value accent">${esc(dateLabel)}</div></div></div>`);
  if (timeStr) infoRows.push(`<div class="m-info-row"><span class="m-info-icon">🕐</span><div><div class="m-info-label">Time</div><div class="m-info-value">${timeStr}</div></div></div>`);
  infoRows.push(`<div class="m-info-row"><span class="m-info-icon">📍</span><div><div class="m-info-label">Location</div><div class="m-info-value">${esc(titleCase(ev.neighborhood) || ev.venue_name || 'Miami, FL')}</div>${ev.neighborhood && ev.venue_name ? `<div class="m-info-sub">${esc(ev.venue_name)}</div>` : ''}</div></div>`);
  infoRows.push(`<div class="m-info-row"><span class="m-info-icon">💵</span><div><div class="m-info-label">Cost</div><div class="m-info-value ${ev.is_free ? 'green' : ''}">${esc(mPriceStr(ev))}</div></div></div>`);
  infoRows.push(`<div class="m-info-row"><span class="m-info-icon">👶</span><div><div class="m-info-label">Ages</div><div class="m-info-value">${esc(mAgeLabel(ev.age_min, ev.age_max))}</div>${ev.activity_type ? `<div class="m-info-sub" style="text-transform:capitalize">${esc(ev.activity_type)}</div>` : ''}</div></div>`);

  return `
    <div class="m-billboard">
      <div class="m-billboard-inner">
        <div class="m-date-label">${esc(dateLabel)}</div>
        <span class="m-category">${esc(category)}</span>
        <h2 class="m-title" style="background-image: ${gradient}">${esc(headline)}</h2>
        ${ev.editorial_headline ? `<div class="m-organizer">${esc(ev.title)}</div>` : ''}
      </div>
      <span class="m-billboard-ghost">${esc(headline)}</span>
    </div>
    <div class="m-body">
      ${metaRow}
      ${summaryBlock}
      <div class="m-info">${infoRows.join('')}</div>
    </div>`;
}

function shareWhatsApp() {
  const ev = _modalEvent;
  if (!ev) return;
  const title = ev.editorial_headline || ev.title;
  const date  = fmtFullDate(ev.start_date);
  const time  = fmtTime(ev.start_date);
  const venue = ev.venue_name ? '📍 ' + ev.venue_name : '';
  const url   = ev.source_url || (location.origin + location.pathname + '?id=' + ev.id);
  const text  = [title, date + (time ? ' at ' + time : ''), venue, '', 'Found on EZPZ Miami 🌴', url]
    .filter(Boolean).join('\n');
  window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
}

function calendarModal() {
  const ev = _modalEvent;
  if (!ev) return;
  const fmt = iso => iso ? new Date(iso).toISOString().replace(/[-:]/g,'').split('.')[0]+'Z' : '';
  const url = 'https://calendar.google.com/calendar/render?action=TEMPLATE'
    + '&text=' + encodeURIComponent(ev.title)
    + '&dates=' + fmt(ev.start_date) + '/' + fmt(ev.end_date || ev.start_date)
    + '&location=' + encodeURIComponent(ev.address || ev.venue_name || '')
    + '&details=' + encodeURIComponent((ev.parent_summary || ev.description || '').slice(0, 200));
  window.open(url, '_blank');
}

// ─── HELPERS ──────────────────────────────────────────────────────

function toDateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function parseDateKey(key) {
  const [y, m, d] = key.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function fmtDisplayDate(d) {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[d.getMonth()]} ${d.getDate()}`;
}
function titleCase(str) {
  if (!str) return str;
  return str.replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
}
function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const h = d.getUTCHours(), m = d.getUTCMinutes();
  if (h === 0 && m === 0) return '';
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  const mm = m === 0 ? '' : `:${String(m).padStart(2, '0')}`;
  return `${h12}${mm} ${ampm}`;
}
function fmtTimeRange(start, end) {
  const s = fmtTime(start);
  if (!s) return '';
  const e = fmtTime(end);
  if (!e) return s;
  return `${s} – ${e}`;
}
function fmtFullDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${days[d.getUTCDay()]}, ${months[d.getUTCMonth()]} ${d.getUTCDate()}, ${d.getUTCFullYear()}`;
}
function priceLabel(ev) {
  if (ev.is_free) return 'Free';
  if (ev.price_min != null) {
    const lo = ev.price_min, hi = ev.price_max;
    return (lo === hi || hi == null) ? `$${lo}` : `$${lo}–$${hi}`;
  }
  return 'See event';
}
function mPriceStr(ev) {
  if (ev.is_free) return 'Free';
  if (ev.price_min != null && ev.price_max != null && ev.price_min === ev.price_max) return `$${ev.price_min}`;
  if (ev.price_min != null && ev.price_max != null) return `$${ev.price_min}–$${ev.price_max}`;
  if (ev.price_min != null) return `From $${ev.price_min}`;
  return 'See event page';
}
function ageLabel(min, max) {
  if (min == null && max == null) return 'All ages';
  if (min == null) min = 0;
  if (min === max) max = null;
  if (min === 0 && (max == null || max >= 12)) return 'All ages';
  if (max == null) return `${min}+`;
  if (min === 0) return `0–${max}`;
  return `${min}–${max}`;
}
function mAgeLabel(min, max) {
  if (min == null && max == null) return 'All ages welcome';
  if (min == null) min = 0;
  if (min === max) max = null;
  if (min === 0 && (max == null || max >= 12)) return 'All ages welcome';
  if (max == null) return `Ages ${min}+`;
  return `Ages ${min}–${max}`;
}
function groupAgeLabel(group) {
  const keys = new Set(group.map(e => `${e.age_min ?? ''}-${e.age_max ?? ''}`));
  if (keys.size === 1) return ageLabel(group[0].age_min, group[0].age_max);
  return 'Multiple ages';
}
function pickGradient(activityType) {
  const map = {
    'craft': GRADIENTS[0], 'workshop': GRADIENTS[0],
    'performance': GRADIENTS[1], 'storytime': GRADIENTS[1], 'music': GRADIENTS[1],
    'outdoor': GRADIENTS[2], 'sports': GRADIENTS[2], 'festival': GRADIENTS[2],
  };
  return map[(activityType || '').toLowerCase()] || GRADIENTS[0];
}
function renderNotes(notes) {
  if (!notes) return '';
  try {
    const parsed = JSON.parse(notes);
    if (Array.isArray(parsed)) return parsed.map(item => esc(item)).join('<br>');
  } catch (e) {}
  return esc(notes);
}
function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function showError(msg) {
  document.getElementById('content').innerHTML = `
    <div class="empty-state"><div class="empty-icon">⚠️</div>
    <h3>Could not load events</h3><p>${esc(msg)}</p></div>`;
}

// ─── PROGRAM GROUPING ─────────────────────────────────────────────
function familyMatch(title) {
  for (const f of PROGRAM_FAMILIES) { if (f.pattern.test(title)) return f; }
  return null;
}
function programKey(title) {
  const fam = familyMatch(title);
  if (fam) return fam.key;
  return title.toLowerCase()
    .replace(/^online event:\s*/i, '').replace(/^new[!\s]+/i, '')
    .replace(/\s*for\s+(babies|toddlers|preschoolers|infants|teens|tweens|kids|children|families|all ages)(\s+and\s+(caregivers|adults))?(\s+en dos idiomas.*)?$/i, '')
    .replace(/\s+en dos idiomas.*$/i, '').replace(/\s+y\s+m[aá]s.*$/i, '')
    .replace(/[^a-z0-9 ]/g, ' ').replace(/\s+/g, ' ').trim();
}
function groupByProgram(events) {
  const map = new Map();
  for (const ev of events) { const key = programKey(ev.title); if (!map.has(key)) map.set(key, []); map.get(key).push(ev); }
  return [...map.values()];
}
function groupTitle(group) {
  const fam = familyMatch(group[0].title);
  if (fam) return fam.label;
  return cleanProgramTitle(group[0].title);
}
function cleanProgramTitle(title) {
  if (!title) return '';
  return title
    .replace(/^Online Event:\s*/i, '').replace(/^New[!\s]+/i, '')
    .replace(/\s*for\s+(Babies|Toddlers|Preschoolers|Infants|Teens|Tweens|Kids|Children|Families|All Ages)(\s+and\s+(Caregivers|Adults))?(\s+en dos idiomas.*)?$/i, '')
    .replace(/\s+en dos idiomas.*$/i, '').replace(/\s+y\s+m[aá]s.*$/i, '').trim();
}
function neutralSummary(group) {
  const ageWords = /\btoddler|\bpreschooler|\bbabies?\b|\binfant|\bteen|\btween|\byour\s+\d/i;
  const withSummary = group.filter(e => e.parent_summary);
  if (!withSummary.length) return group[0].description || '';
  const neutral = withSummary.find(e => !ageWords.test(e.parent_summary));
  return (neutral || withSummary[0]).parent_summary;
}
function groupLocation(group) {
  const hoods = new Set(group.map(e => e.neighborhood || ''));
  if (hoods.size === 1 && [...hoods][0]) return titleCase([...hoods][0]);
  const venues = new Set(group.map(e => e.venue_name || ''));
  if (venues.size === 1 && [...venues][0]) return [...venues][0];
  return 'Multiple locations';
}

function matchesAgeFilter(ev, filter) {
  const min = ev.age_min || 0;
  const max = ev.age_max || 18;
  switch (filter) {
    case 'baby': return min <= 1 && max >= 0;
    case 'toddler': return min <= 3 && max >= 1;
    case 'prek': return min <= 5 && max >= 3;
    case 'school': return min <= 12 && max >= 6;
    default: return true;
  }
}

// ─── INIT ─────────────────────────────────────────────────────────
loadEvents();

// Auto-open modal if URL has ?id= on initial load (shared link)
const _initId = new URLSearchParams(location.search).get('id');
if (_initId) _showModal(_initId);
