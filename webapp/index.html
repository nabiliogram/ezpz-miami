<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EZPZ Miami — Weekend Playbook for Miami Parents</title>
  <meta name="description" content="The easiest way to find kid-friendly events in Miami this weekend." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300&family=Montserrat:wght@800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --flamingo:     #FF4477;
      --coral:        #FF8C70;
      --violet:       #8B5CF6;
      --yellow:       #FACC15;
      --bg:           #FDFCFB;
      --bg-white:     #FFFFFF;
      --bg-date:      #FFFBEB;
      --text-1:       #0F172A;
      --text-2:       #475569;
      --text-3:       #94A3B8;
      --border:       #F1F5F9;
      --border-med:   #E2E8F0;
      --free:         #059669;
      --free-bg:      #ECFDF5;
      --header-h:     68px;
      --date-h:       72px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .display { font-family: 'Montserrat', sans-serif; }

    /* ─────────────────────────────────────────────
       HEADER
    ───────────────────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--header-h);
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 20px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      flex-direction: column;
      text-decoration: none;
    }
    .logo-name {
      font-family: 'Montserrat', sans-serif;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      color: var(--flamingo);
      line-height: 1;
    }
    .logo-tag {
      font-family: 'Montserrat', sans-serif;
      font-size: 8px;
      font-weight: 800;
      color: var(--yellow);
      text-transform: uppercase;
      letter-spacing: 0.25em;
      line-height: 1;
      margin-top: 3px;
    }
    .cal-btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--flamingo);
      transition: opacity 0.15s;
      overflow: hidden;
    }
    .cal-btn:hover { opacity: 0.7; }
    .cal-btn svg { pointer-events: none; position: relative; z-index: 0; }
    #date-picker {
      position: absolute; inset: 0; opacity: 0;
      width: 100%; height: 100%; cursor: pointer; z-index: 1; font-size: 16px;
    }

    /* ─────────────────────────────────────────────
       DATE PICKER STRIP
    ───────────────────────────────────────────── */
    .date-strip {
      position: sticky;
      top: var(--header-h);
      z-index: 90;
      background: var(--bg-date);
      border-bottom: 1px solid #FDE68A;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .date-strip::-webkit-scrollbar { display: none; }
    .date-strip-inner {
      display: flex;
      min-width: max-content;
      max-width: 720px;
      margin: 0 auto;
      padding: 0 4px;
    }
    .date-btn {
      flex-shrink: 0;
      width: 56px;
      padding: 10px 0 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      border: none;
      background: transparent;
      cursor: pointer;
      transition: background 0.15s;
      border-radius: 0;
    }
    .date-btn:hover { background: rgba(255, 255, 255, 0.5); }
    .date-btn.active { background: rgba(255, 255, 255, 0.6); }
    .date-btn .day-name {
      font-family: 'Montserrat', sans-serif;
      font-size: 8px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      color: var(--text-3);
    }
    .date-btn.active .day-name { color: var(--text-2); }
    .date-btn .day-num {
      font-family: 'Montserrat', sans-serif;
      font-size: 16px;
      font-weight: 900;
      color: var(--text-3);
    }
    .date-btn.active .day-num { color: var(--flamingo); }
    .date-btn .day-dot {
      width: 16px;
      height: 3px;
      border-radius: 2px;
      background: var(--flamingo);
      opacity: 0;
      margin-top: 1px;
    }
    .date-btn.active .day-dot { opacity: 1; }

    /* ─────────────────────────────────────────────
       PAGE & SECTION HEADER
    ───────────────────────────────────────────── */
    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 12px 100px;
    }
    .section-header {
      padding: 28px 12px 0;
    }
    .section-date {
      font-family: 'Montserrat', sans-serif;
      font-size: 36px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--text-1);
    }
    .section-bar {
      width: 56px;
      height: 6px;
      background: var(--flamingo);
      margin-top: 10px;
    }
    .section-count {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-3);
      margin-top: 6px;
    }

    /* ─────────────────────────────────────────────
       EVENT CARD
    ───────────────────────────────────────────── */
    .events-list {
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .event-card {
      background: var(--bg-white);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .event-card:active { opacity: 0.85; }
    @media (hover: hover) {
      .event-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
    }

    /* Billboard header */
    .card-billboard {
      height: 112px;
      width: 100%;
      position: relative;
      overflow: hidden;
      background: var(--text-1);
      display: flex;
      align-items: center;
      padding: 0 24px;
    }
    .card-billboard::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.08;
      background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28"><rect width="28" height="28" fill="none"/><rect x="0" y="0" width="14" height="14" fill="white" fill-opacity="0.15"/><rect x="14" y="14" width="14" height="14" fill="white" fill-opacity="0.15"/></svg>');
      background-size: 28px 28px;
    }
    .billboard-content {
      position: relative;
      z-index: 2;
      width: 100%;
    }
    .category-pill {
      display: inline-block;
      font-family: 'Montserrat', sans-serif;
      font-size: 7px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 2px 7px;
      border-radius: 3px;
      background: var(--bg-white);
      color: var(--text-1);
      margin-bottom: 8px;
    }
    .card-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 28px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.04em;
      line-height: 1;
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      /* default gradient, overridden per card */
      background-image: linear-gradient(to right, var(--coral), var(--flamingo));
      /* 2-line clamp */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .billboard-ghost {
      position: absolute;
      bottom: -8px;
      right: -8px;
      font-family: 'Montserrat', sans-serif;
      font-size: 72px;
      font-weight: 900;
      text-transform: uppercase;
      color: rgba(255,255,255,0.03);
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
      line-height: 1;
    }

    /* Card body */
    .card-body {
      padding: 20px 24px 24px;
    }
    .card-summary {
      font-size: 14px;
      font-weight: 500;
      font-style: italic;
      line-height: 1.65;
      color: var(--text-2);
      margin-bottom: 24px;
      /* 3-line clamp */
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Metadata grid */
    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 28px;
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }
    .meta-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .meta-icon {
      flex-shrink: 0;
      margin-top: 2px;
      color: var(--text-3);
    }
    .meta-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 8px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-3);
    }
    .meta-value {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      color: var(--text-1);
      margin-top: 1px;
    }
    .meta-value.is-free { color: var(--free); }

    /* ─────────────────────────────────────────────
       LOADING & EMPTY STATES
    ───────────────────────────────────────────── */
    .spinner-wrap {
      display: flex;
      justify-content: center;
      padding: 80px 0;
    }
    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid var(--border-med);
      border-top-color: var(--flamingo);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 90px 20px;
    }
    .empty-icon { font-size: 38px; margin-bottom: 18px; }
    .empty-state h3 { font-size: 17px; font-weight: 700; color: var(--text-1); margin-bottom: 8px; }
    .empty-state p { font-size: 14px; color: var(--text-2); line-height: 1.6; }

    /* ─────────────────────────────────────────────
       FOOTER
    ───────────────────────────────────────────── */
    .footer {
      padding: 48px 0;
      text-align: center;
    }
    .footer-text {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.35em;
      color: var(--border-med);
      font-style: italic;
    }

    /* ─────────────────────────────────────────────
       RESPONSIVE
    ───────────────────────────────────────────── */
    @media (max-width: 480px) {
      .section-date { font-size: 30px; }
      .card-billboard { height: 100px; }
      .card-title { font-size: 24px; }
      .billboard-ghost { font-size: 56px; }
    }
    @media (min-width: 721px) {
      .section-date { font-size: 40px; }
      .card-billboard { height: 120px; padding: 0 28px; }
      .card-title { font-size: 32px; }
      .card-body { padding: 24px 28px 28px; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <a class="logo" href="#">
      <span class="logo-name">EZPZ Miami</span>
      <span class="logo-tag">The Play &mdash; Book</span>
    </a>
    <button class="cal-btn" aria-label="Jump to date">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2.5"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <input type="date" id="date-picker" onchange="jumpToDate(this.value)" tabindex="-1" aria-hidden="true" />
    </button>
  </div>
</header>

<!-- Date picker strip -->
<nav class="date-strip" id="date-strip">
  <div class="date-strip-inner" id="date-strip-inner">
    <!-- populated by JS -->
  </div>
</nav>

<!-- Events feed -->
<main class="page" id="content">
  <div class="spinner-wrap"><div class="spinner"></div></div>
</main>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────
const SUPABASE_URL = 'https://pomjqbjxosbfozvbvgsj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_8-9VIQPLrYfqxsoyGWjf8A_BO7UCLso';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// Gradient palette — cycles per card
const GRADIENTS = [
  'linear-gradient(to right, #FF8C70, #FF4477)',  // coral → flamingo
  'linear-gradient(to right, #FF4477, #8B5CF6)',  // flamingo → violet
  'linear-gradient(to right, #FACC15, #FF8C70)',  // yellow → coral
  'linear-gradient(to right, #8B5CF6, #FF4477)',  // violet → flamingo
  'linear-gradient(to right, #FF4477, #FACC15)',  // flamingo → yellow
  'linear-gradient(to right, #FF8C70, #8B5CF6)',  // coral → violet
];

let _allEvents = [];
let _activeDate = null; // ISO string yyyy-mm-dd

// ─── DATE STRIP ──────────────────────────────────────────────────
function buildDateStrip() {
  const inner = document.getElementById('date-strip-inner');
  const today = new Date();
  const dayNames = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const monthShort = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let html = '';

  for (let i = 0; i < 14; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    const key = toDateKey(d);
    const dn = dayNames[d.getDay()];
    const num = String(d.getDate()).padStart(2, '0');
    html += `<button class="date-btn" data-date="${key}" onclick="selectDate('${key}')">
      <span class="day-name">${dn}</span>
      <span class="day-num">${num}</span>
      <span class="day-dot"></span>
    </button>`;
  }
  inner.innerHTML = html;
}

function selectDate(key) {
  _activeDate = key;

  // Update active state
  document.querySelectorAll('.date-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.date === key);
  });

  // Scroll the active button into view in the strip
  const activeBtn = document.querySelector(`.date-btn[data-date="${key}"]`);
  if (activeBtn) {
    activeBtn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }

  renderForDate(key);
}

function jumpToDate(val) {
  if (!val) return;
  // If date is in the strip, select it
  const btn = document.querySelector(`.date-btn[data-date="${val}"]`);
  if (btn) {
    selectDate(val);
  } else {
    // Scroll to nearest date section if outside strip range
    const section = document.querySelector(`.day-section[data-date="${val}"]`);
    if (section) {
      const offset = 68 + 72 + 12;
      const y = section.getBoundingClientRect().top + window.scrollY - offset;
      window.scrollTo({ top: y, behavior: 'smooth' });
    }
  }
}

// ─── LOAD ─────────────────────────────────────────────────────────
async function loadEvents() {
  const { data, error } = await db
    .from('events')
    .select('id, title, editorial_headline, description, parent_summary, start_date, end_date, age_min, age_max, image_url, venue_name, neighborhood, is_free, price_min, price_max, source, activity_type')
    .eq('is_canceled', false)
    .eq('is_kid_friendly', true)
    .gte('start_date', new Date().toISOString().slice(0, 10))
    .order('start_date', { ascending: true })
    .limit(400);

  if (error) {
    showError(error.message);
    return;
  }

  _allEvents = data || [];

  // Default to today
  const todayKey = toDateKey(new Date());
  buildDateStrip();
  selectDate(todayKey);
}

// ─── RENDER ───────────────────────────────────────────────────────
function renderForDate(dateKey) {
  const content = document.getElementById('content');

  // Filter events to selected date
  const dayEvents = _allEvents.filter(ev => {
    const d = new Date(ev.start_date);
    return toDateKey(d) === dateKey;
  });

  if (dayEvents.length === 0) {
    const dateObj = parseDateKey(dateKey);
    const label = fmtDisplayDate(dateObj);
    content.innerHTML = `
      <div class="section-header">
        <div class="section-date display">${esc(label)}</div>
        <div class="section-bar"></div>
      </div>
      <div class="empty-state">
        <div class="empty-icon">🌴</div>
        <h3>Nothing listed yet</h3>
        <p>No events on this day — try another date or check back soon.</p>
      </div>`;
    return;
  }

  const programGroups = groupByProgram(dayEvents);
  const dateObj = parseDateKey(dateKey);
  const label = fmtDisplayDate(dateObj);

  let html = `
    <div class="section-header" data-date="${dateKey}">
      <div class="section-date display">${esc(label)}</div>
      <div class="section-bar"></div>
      <div class="section-count">${programGroups.length} event${programGroups.length !== 1 ? 's' : ''}</div>
    </div>
    <div class="events-list">`;

  programGroups.forEach((group, idx) => {
    html += eventCard(group, idx);
  });

  html += `</div>
    <div class="footer"><span class="footer-text display">Miami &middot; Playbook</span></div>`;

  content.innerHTML = html;
  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'auto' });
}

function eventCard(group, idx) {
  const ev = group[0];
  const isGroup = group.length > 1;
  const gradient = GRADIENTS[idx % GRADIENTS.length];

  const headline = isGroup
    ? esc(groupTitle(group))
    : (ev.editorial_headline ? esc(ev.editorial_headline) : esc(ev.title));

  const body = isGroup
    ? esc(neutralSummary(group))
    : (ev.parent_summary ? esc(ev.parent_summary) : (ev.description ? esc(ev.description) : ''));

  const time = fmtTimeRange(ev.start_date, ev.end_date);
  const location = isGroup
    ? esc(groupLocation(group))
    : (ev.neighborhood ? esc(titleCase(ev.neighborhood)) : (ev.venue_name ? esc(ev.venue_name) : ''));
  const price = priceLabel(ev);
  const priceClass = ev.is_free ? ' is-free' : '';
  const ages = isGroup ? groupAgeLabel(group) : ageLabel(ev.age_min, ev.age_max);
  const category = ev.activity_type ? esc(titleCase(ev.activity_type)) : 'Event';

  const ids = group.map(e => e.id).join(',');
  const href = isGroup ? `event.html?ids=${ids}` : `event.html?id=${esc(ev.id)}`;

  return `
    <a class="event-card" href="${href}">
      <div class="card-billboard">
        <div class="billboard-content">
          <span class="category-pill">${category}</span>
          <div class="card-title" style="background-image: ${gradient}">${headline}</div>
        </div>
        <span class="billboard-ghost">${headline}</span>
      </div>
      <div class="card-body">
        ${body ? `<p class="card-summary">"${body}"</p>` : ''}
        <div class="meta-grid">
          <div class="meta-item">
            <svg class="meta-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <div>
              <div class="meta-label">Time</div>
              <div class="meta-value">${time || 'See details'}</div>
            </div>
          </div>
          <div class="meta-item">
            <svg class="meta-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <div>
              <div class="meta-label">Neighborhood</div>
              <div class="meta-value">${location || 'Miami'}</div>
            </div>
          </div>
          <div class="meta-item">
            <svg class="meta-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
            <div>
              <div class="meta-label">Price</div>
              <div class="meta-value${priceClass}">${price}</div>
            </div>
          </div>
          <div class="meta-item">
            <svg class="meta-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <div>
              <div class="meta-label">Ages</div>
              <div class="meta-value">${ages}</div>
            </div>
          </div>
        </div>
      </div>
    </a>`;
}

// ─── HELPERS ──────────────────────────────────────────────────────

function toDateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function parseDateKey(key) {
  const [y, m, d] = key.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function fmtDisplayDate(d) {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[d.getMonth()]} ${d.getDate()}`;
}

function titleCase(str) {
  if (!str) return str;
  return str.replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
}

function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const h = d.getUTCHours(), m = d.getUTCMinutes();
  if (h === 0 && m === 0) return '';
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  const mm = m === 0 ? '' : `:${String(m).padStart(2, '0')}`;
  return `${h12}${mm} ${ampm}`;
}

function fmtTimeRange(start, end) {
  const s = fmtTime(start);
  if (!s) return '';
  const e = fmtTime(end);
  if (!e) return s;
  return `${s} – ${e}`;
}

function priceLabel(ev) {
  if (ev.is_free) return 'Free';
  if (ev.price_min != null) {
    const lo = ev.price_min, hi = ev.price_max;
    return (lo === hi || hi == null) ? `$${lo}` : `$${lo}–$${hi}`;
  }
  return 'See event';
}

function ageLabel(min, max) {
  if (min == null && max == null) return 'All ages';
  if (min == null) min = 0;
  if (min === max) max = null;
  if (min === 0 && (max == null || max >= 12)) return 'All ages';
  if (max == null) return `${min}+`;
  if (min === 0) return `0–${max}`;
  return `${min}–${max}`;
}

function groupAgeLabel(group) {
  const keys = new Set(group.map(e => `${e.age_min ?? ''}-${e.age_max ?? ''}`));
  if (keys.size === 1) return ageLabel(group[0].age_min, group[0].age_max);
  return 'Multiple ages';
}

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function showError(msg) {
  document.getElementById('content').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">⚠️</div>
      <h3>Could not load events</h3>
      <p>${esc(msg)}</p>
    </div>`;
}

// ─── PROGRAM GROUPING ─────────────────────────────────────────────
const PROGRAM_FAMILIES = [
  { key: 'storytime',  label: 'Storytime at the Library', pattern: /\bstoryt(ime|elling)\b|story time|hora de los cuentos|furry tales/i },
  { key: 'chess',      label: 'Chess Club',               pattern: /\bchess\b/i },
  { key: 'scavenger',  label: 'Scavenger Hunt',           pattern: /scavenger hunt/i },
  { key: 'craft-kits', label: 'Take-Home Craft Kits',     pattern: /craft kit|take and make/i },
];

function familyMatch(title) {
  for (const f of PROGRAM_FAMILIES) {
    if (f.pattern.test(title)) return f;
  }
  return null;
}

function programKey(title) {
  const fam = familyMatch(title);
  if (fam) return fam.key;
  return title
    .toLowerCase()
    .replace(/^online event:\s*/i, '')
    .replace(/^new[!\s]+/i, '')
    .replace(/\s*for\s+(babies|toddlers|preschoolers|infants|teens|tweens|kids|children|families|all ages)(\s+and\s+(caregivers|adults))?(\s+en dos idiomas.*)?$/i, '')
    .replace(/\s+en dos idiomas.*$/i, '')
    .replace(/\s+y\s+m[aá]s.*$/i, '')
    .replace(/[^a-z0-9 ]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function groupByProgram(events) {
  const map = new Map();
  for (const ev of events) {
    const key = programKey(ev.title);
    if (!map.has(key)) map.set(key, []);
    map.get(key).push(ev);
  }
  return [...map.values()];
}

function groupTitle(group) {
  const fam = familyMatch(group[0].title);
  if (fam) return fam.label;
  return cleanProgramTitle(group[0].title);
}

function cleanProgramTitle(title) {
  if (!title) return '';
  return title
    .replace(/^Online Event:\s*/i, '')
    .replace(/^New[!\s]+/i, '')
    .replace(/\s*for\s+(Babies|Toddlers|Preschoolers|Infants|Teens|Tweens|Kids|Children|Families|All Ages)(\s+and\s+(Caregivers|Adults))?(\s+en dos idiomas.*)?$/i, '')
    .replace(/\s+en dos idiomas.*$/i, '')
    .replace(/\s+y\s+m[aá]s.*$/i, '')
    .trim();
}

function neutralSummary(group) {
  const ageWords = /\btoddler|\bpreschooler|\bbabies?\b|\binfant|\bteen|\btween|\byour\s+\d/i;
  const withSummary = group.filter(e => e.parent_summary);
  if (!withSummary.length) return group[0].description || '';
  const neutral = withSummary.find(e => !ageWords.test(e.parent_summary));
  return (neutral || withSummary[0]).parent_summary;
}

function groupLocation(group) {
  const hoods = new Set(group.map(e => e.neighborhood || ''));
  if (hoods.size === 1 && [...hoods][0]) return titleCase([...hoods][0]);
  const venues = new Set(group.map(e => e.venue_name || ''));
  if (venues.size === 1 && [...venues][0]) return [...venues][0];
  return 'Multiple locations';
}

loadEvents();
