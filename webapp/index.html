  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {

    /* 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙

      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--header-h);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(12px);

      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {

    }
    .logo-palm {
      font-size: 21px;
      line-height: 1;
      display: block;
    }
    .logo-name {
      font-size: 17px;

      letter-spacing: -0.02em;
      color: var(--text-1);

    }
    .logo-tag {

    }

    /* Calendar button 芒聙聰 native date input overlays it */

      color: var(--text-2);
      transition: border-color 0.15s, color 0.15s;
      overflow: hidden;
    }
    .cal-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .cal-btn svg {
      pointer-events: none;
      position: relative;
      z-index: 0;
    }
    #date-picker {
      position: absolute;
      inset: 0;
      opacity: 0;
      width: 100%;
      height: 100%;

    /* 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙

    芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 */

    /* 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙

    /* Content side */

      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .event-title {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.4;
      color: var(--text-1);
      transition: color 0.12s ease;
      /* 2-line clamp */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .event-desc {
      font-size: 13.5px;
      font-weight: 400;
      line-height: 1.65;
      color: var(--text-2);
      /* 3-line clamp */
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .event-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 3px;

      font-weight: 700;
      letter-spacing: 0.02em;
      padding: 2px 7px;
      border-radius: 5px;
      white-space: nowrap;
    }
    .price-tag.is-free {
      background: var(--free-bg);
      color: var(--free);
    }
    .price-tag.is-paid {

      color: var(--accent);

    .event-thumb {

      width: 80px;
      height: 80px;
      border-radius: 10px;

      align-items: center;

      height: 100%;

       LOADING & EMPTY STATES
    芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 */

<!-- 芒聰聙芒聰聙 Header 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 -->
<header class="header">
  <div class="header-inner">
    <a class="logo" href="#">
      <span class="logo-palm">冒聼聦麓</span>
      <div>
        <span class="logo-name">EZPZ Miami</span>
        <span class="logo-tag">Weekend Playbook</span>
      </div>
    </a>

    <button class="cal-btn" aria-label="Jump to date">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2.5"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <input type="date" id="date-picker" onchange="jumpToDate(this.value)" tabindex="-1" aria-hidden="true" />
    </button>

<!-- 芒聰聙芒聰聙 Footer 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 -->

<script>
// 芒聰聙芒聰聙芒聰聙 CONFIG 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
const SUPABASE_URL = 'https://pomjqbjxosbfozvbvgsj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBvbWpxYmp4b3NiZm96dmJ2Z3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NDk1NTIsImV4cCI6MjA4OTUyNTU1Mn0.csIFsMkappk45CLTfFVGM4b44sqewyhmlyqK8U_SF14';

// 芒聰聙芒聰聙芒聰聙 LOAD 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
async function loadEvents() {
  const { data, error } = await db
    .from('events')
    .select('id, title, editorial_headline, description, parent_summary, start_date, image_url, venue_name, neighborhood, is_free, price_min, price_max, source, activity_type')

  if (error) {

// 芒聰聙芒聰聙芒聰聙 RENDER 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function render(events) {
  const content = document.getElementById('content');

  if (events.length === 0) {
    content.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">冒聼聦麓</div>
        <h3>No upcoming events</h3>
        <p>New events are added every day 芒聙聰 check back soon.</p>
      </div>`;
    return;
  }

  const groups = groupByDay(events);
  let html = '';

  Object.entries(groups).forEach(([dateKey, { label, dateStr, events: evs }]) => {
    const count = evs.length;
    html += `
      <section class="day-section" data-date="${dateKey}">
        <div class="day-label">${esc(label)}</div>
        <div class="day-headline">
          <span class="day-date">${esc(dateStr)}</span>
          <span class="day-count">${count} event${count !== 1 ? 's' : ''}</span>
        </div>
        <hr class="day-rule" />
        ${evs.map(eventRow).join('')}
      </section>`;
  });

  content.innerHTML = html;
  document.getElementById('footer').style.display = 'flex';
  document.getElementById('footer-rule').style.display = 'block';
}

function groupByDay(events) {
  // Times are stored as Miami local time (labeled UTC), so read raw UTC values
  const now = new Date();
  const todayKey = `${now.getUTCFullYear()}-${String(now.getUTCMonth()+1).padStart(2,'0')}-${String(now.getUTCDate()).padStart(2,'0')}`;
  const tomorrowDate = new Date(now);
  tomorrowDate.setUTCDate(now.getUTCDate() + 1);
  const tomorrowKey = `${tomorrowDate.getUTCFullYear()}-${String(tomorrowDate.getUTCMonth()+1).padStart(2,'0')}-${String(tomorrowDate.getUTCDate()).padStart(2,'0')}`;

  const groups = {};
  const dayNames  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  events.forEach(ev => {
    const d = new Date(ev.start_date);
    const key = `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;

    if (!groups[key]) {
      const dow  = dayNames[d.getUTCDay()];
      const mon  = monthNames[d.getUTCMonth()];
      const dom  = d.getUTCDate();
      let label, dateStr;
      if (key === todayKey) {
        label   = 'Today';
        dateStr = `${dow}, ${mon} ${dom}`;
      } else if (key === tomorrowKey) {
        label   = 'Tomorrow';
        dateStr = `${dow}, ${mon} ${dom}`;
      } else {
        label   = dow;
        dateStr = `${mon} ${dom}`;
      }
      groups[key] = { label, dateStr, events: [] };
    }
    groups[key].events.push(ev);
  });

  return groups;
}

function eventRow(ev) {
  const time     = fmtTime(ev.start_date);
  // Prefer neighborhood for location; fall back to venue_name
  const location = ev.neighborhood ? esc(ev.neighborhood) : (ev.venue_name ? esc(ev.venue_name) : '');
  // Prefer editorial content; fall back to raw scraped content
  const headline = ev.editorial_headline ? esc(ev.editorial_headline) : esc(ev.title);
  const body     = ev.parent_summary    ? esc(ev.parent_summary)    : (ev.description ? esc(ev.description) : '');
  const price    = priceTag(ev);

  // Thumbnail
  const thumbInner = ev.image_url
    ? `<img src="${esc(ev.image_url)}" alt="" loading="lazy"
           onerror="this.style.display='none';this.nextSibling.style.display='block'"
       /><span class="thumb-icon" style="display:none">${srcIcon(ev.source)}</span>`
    : `<span class="thumb-icon">${srcIcon(ev.source)}</span>`;

  // Meta row: time 脗路 location 脗路 price
  const metaParts = [];
  if (time)     metaParts.push(`<span class="meta-time">${time}</span>`);
  if (time && location) metaParts.push(`<span class="meta-sep">脗路</span>`);
  if (location) metaParts.push(`<span class="meta-venue">${location}</span>`);
  if (price)    metaParts.push(price);

  return `
    <a class="event-row" href="event.html?id=${esc(ev.id)}">
      <div class="event-content">
        <div class="event-title">${headline}</div>
        ${body ? `<p class="event-desc">${body}</p>` : ''}
        ${metaParts.length ? `<div class="event-meta">${metaParts.join('')}</div>` : ''}
      </div>
      <div class="event-thumb">${thumbInner}</div>
    </a>`;
}

// 芒聰聙芒聰聙芒聰聙 CALENDAR JUMP 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function jumpToDate(val) {
  if (!val) return;
  // Find exact section, or nearest section on/after that date
  const all = [...document.querySelectorAll('.day-section[data-date]')];
  let target = all.find(s => s.dataset.date === val)
            || all.find(s => s.dataset.date >= val);
  if (target) {
    const offset = 58 + 12; // header height + gap
    const y = target.getBoundingClientRect().top + window.scrollY - offset;
    window.scrollTo({ top: y, behavior: 'smooth' });
  }
}

// 芒聰聙芒聰聙芒聰聙 HELPERS 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  // Read UTC values 芒聙聰 times are stored as Miami local time labeled as UTC
  const h = d.getUTCHours(), m = d.getUTCMinutes();
  if (h === 0 && m === 0) return ''; // all-day / no time set
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12  = h % 12 || 12;
  const mm   = m === 0 ? '' : `:${String(m).padStart(2, '0')}`;
  return `${h12}${mm} ${ampm}`;
}

function priceTag(ev) {
  if (ev.is_free) return `<span class="price-tag is-free">Free</span>`;
  if (ev.price_min != null) {
    const lo = ev.price_min, hi = ev.price_max;
    const label = (lo === hi || hi == null) ? `$${lo}` : `$${lo}芒聙聯$${hi}`;
    return `<span class="price-tag is-paid">${label}</span>`;
  }
  return '';
}

function srcIcon(source) {
  const map = {
    miami_dade_libraries:   '冒聼聯職',
    eventbrite:             '冒聼聨聼',
    the_underline:          '冒聼聦驴',
    miami_childrens_museum: '冒聼聨隆',
    arsht_center:           '冒聼聨颅',
    deering_estate:         '冒聼聫聸',
    pinecrest_gardens:      '冒聼聦潞',
    magic_13:               '芒聹篓',
  };
  return map[source] || '冒聼聦麓';
}

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function showError(msg) {
  document.getElementById('content').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">芒職聽茂赂聫</div>
      <h3>Could not load events</h3>
      <p>${esc(msg)}</p>
    </div>`;
}

// 芒聰聙芒聰聙芒聰聙 INIT 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙

</script>
